  <style>

<body>
<div class="container">
  <div class="heading">
    <h1>🏭 Small Scale Industry & Business | OC Chapter 3</h1>
    <p>📌 MSMED Act · Importance · Advantages · Challenges · 11 Steps to Setup SSI</p>
  </div>
  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔎 Search: SSI meaning, MSMED classification, advantages of small scale, challenges, steps to setup, labour intensive, export contribution...">
      <button class="icon-btn" id="voiceBtn">🎤</button>
    </div>
    <div id="suggestionsList" class="suggestions-dropdown"></div>
  </div>
  <div class="result-container" id="resultsContainer">
    <div class="not-found">🏭 Type above — Explore Small Scale Industry: Meaning, Importance, Advantages, Challenges, and 11 Steps to Setup ✨</div>
  </div>
</div>
<div class="popup-overlay" id="popupModal">
  <div class="popup-box">
    <button class="close-popup" id="closeModalBtn">✖</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  // ==================== DATABASE: SMALL SCALE INDUSTRY (11th OC Chapter 3) ====================
  const qaDatabase = [];

  function addQA(question, answer, category, keywords = []) {
    qaDatabase.push({ id: qaDatabase.length+1, question, answer, category, keywords: keywords.map(k=>k.toLowerCase()) });
  }

  // ---------- MEANING & DEFINITION / MSMED ----------
  addQA("What is the meaning of Small Scale Industry (SSI)?", "Small Scale Industries are those industries in which manufacturing, providing services, and production are done on small scale or micro scale. Traditionally, industries organized on a small scale producing goods with help of machines, labour and power are considered as SSI. Capital investment in plant and machinery is the primary criteria.", "Meaning", ["ssi meaning", "small scale industry definition"]);
  addQA("What is the MSMED Act 2006?", "MSMED stands for Micro, Small and Medium Enterprises Development Act, 2006. It classifies businesses into Manufacturing and Services sectors based on investment in plant & machinery or equipment. It provides the legal framework for classification of micro, small and medium enterprises.", "MSMED", ["msmed act", "msmed 2006"]);
  addQA("What is the classification of businesses under MSMED Act 2006?", "Businesses are classified into two sectors: 1) Manufacturing Sector 2) Services Sector. Based on investment: Micro (Manufacturing: up to ₹25 lakhs; Services: up to ₹10 lakhs), Small (Manufacturing: ₹25 lakhs to ₹5 crores; Services: ₹10 lakhs to ₹2 crores), Medium (Manufacturing: ₹5-10 crores; Services: ₹2-5 crores).", "MSMED", ["classification", "msmed limits"]);
  addQA("What is the definition of Small Scale Industry as per traditional norms?", "Investment in fixed assets like plant and equipment either held on ownership terms or on lease or hire purchase should not be more than one crore rupees. The unit cannot be owned, controlled or auxiliary for any other industrial unit.", "Meaning", ["definition old"]);
  addQA("What is Micro Manufacturing Sector as per MSMED?", "A manufacturing unit where investment in plant and machinery does not exceed ₹25 lakhs is classified as Micro Manufacturing Sector.", "MSMED", ["micro manufacturing"]);

  // ---------- IMPORTANCE OF SSI (7 points) ----------
  addQA("What is the importance of Small Scale Industries?", "1) Job Opportunities - second largest employment generator 2) Regional Balance - can be setup with minimal capital 3) Increase Competitive Strength - low cost products 4) Maximum Use of Natural Resources - labour intensive, local resources 5) Reduces Migration - creates rural employment 6) Support to Large Scale Industries - supply raw material, spare parts 7) Developing New Entrepreneurs - attracts young first generation entrepreneurs.", "Importance", ["importance of ssi", "role of small scale"]);
  addQA("How do SSI contribute to regional balance?", "SSI can be setup with minimum amount of capital using simple technologies and local resources. They help develop backward regions and contribute to balanced development of the country.", "Importance", []);
  addQA("How do SSI support large scale industries?", "Many large scale industries depend on SSI for raw materials, semi-finished goods, and spare parts. SSI act as ancillaries to large industries.", "Importance", []);

  // ---------- ADVANTAGES OF SSI (11 points) ----------
  addQA("What are the advantages of Small Scale Industries?", "1) Large Employment - labour abundant country 2) Less Capital Requirement 3) Utilization of Domestic Resources 4) Increases Industrial Output 5) Contribution to Export - nearly 40% of industrial exports 6) Equitable Distribution - reduces inequalities 7) Earning Foreign Exchange 8) Opportunities for Entrepreneurship 9) Cost Efficiency 10) Reduces Migration 11) Flexibility in Operation.", "Advantages", ["advantages of ssi", "benefits of small scale"]);
  addQA("What percentage of industrial exports do SSI contribute?", "Nearly 40% of the industrial exports are contributed by Small Scale Industries. Products like hosiery, gems & jewellery, handicrafts, coir products, processed food, engineering goods contribute substantially.", "Advantages", ["export contribution"]);
  addQA("Why is SSI called labour intensive?", "SSI uses more labour than other factors of production. India is labour abundant, and SSI creates large employment opportunities with low gestation period. They provide jobs to unskilled and semi-skilled workers.", "Advantages", ["labour intensive"]);
  addQA("How does SSI promote equitable distribution?", "Large scale industries lead to income inequalities. SSI being labour intensive distributes income among more number of workers, resulting in both economic and social welfare.", "Advantages", []);
  addQA("What makes SSI cost efficient?", "SSI can adopt micro production methods offering better quality and more variety at lower cost. Their expenses are lower compared to large scale industries due to lower overheads.", "Advantages", []);

  // ---------- CHALLENGES / PROBLEMS OF SSI (9 points) ----------
  addQA("What are the challenges faced by Small Scale Industries?", "1) Old Methods of Production - outdated technology 2) Inadequate Finance - lack of working capital 3) Problem of Raw Material - inadequate supply 4) Labour Problem - unskilled workers, low wages, high absenteeism 5) Marketing Problem - dependence on middlemen 6) Problem of Transport - lack of facilities 7) Sickness - internal & external causes 8) Power Shortage and Irregular Supply 9) Global Competition due to LPG policies.", "Challenges", ["problems of ssi", "challenges before ssi"]);
  addQA("What is sickness in SSI? What are its causes?", "Sickness refers to industrial units facing continuous losses. Internal causes: lack of skilled labour, managerial skills, marketing skills. External causes: delayed payments, shortage of working capital, inadequate loans, lack of demand.", "Challenges", ["sickness"]);
  addQA("Why is marketing a problem for SSI?", "Marketing is weaker area for SSI. They depend excessively on middlemen who exploit them with low prices and delayed payments. Direct marketing is not feasible due to lack of infrastructure.", "Challenges", ["marketing problem"]);
  addQA("How does power shortage affect SSI?", "Higher power costs, load shedding, frequent power cuts, irregular supply, voltage fluctuation, and rising power charges badly affect productivity of small scale industries.", "Challenges", ["power shortage"]);

  // ---------- STEPS IN SETTING UP SSI (11 steps) ----------
  addQA("What are the steps in setting up a Small Scale business?", "1) Decision of Business Area 2) Study of Business Environment 3) Selection of Product 4) Selection of Place 5) Selection of Technology 6) Business Proposal 7) Finance 8) Registration 9) Actual Arrangements of Resources (Physical, Power, Staffing) 10) Production and Marketing of Product 11) Review or Feedback for Future Changes.", "Setup Steps", ["steps to setup ssi", "setting up small business"]);
  addQA("What is the first step in setting up a Small Scale business?", "Decision of Business Area. The entrepreneur must decide the type of business (proprietorship, partnership, corporation) and analyze his strengths and weaknesses to determine suitable business type and size.", "Setup Steps", ["first step"]);
  addQA("Why is registration important for SSI?", "Registration with District Industries Centre (DIC) is worthwhile. The entrepreneur submits application with relevant documents to local DIC. Registration helps in availing government benefits, subsidies, and assistance.", "Setup Steps", ["registration"]);
  addQA("What are the physical resources needed while setting up SSI?", "Physical resources include allocating space for operations, choosing production methods, purchasing machinery, and hiring employees for different departments.", "Setup Steps", []);
  addQA("What is business proposal or project appraisal?", "Project appraisal is assessment of a project. The entrepreneur appraises the project from economic, financial, technical, market, social and managerial point of view before setting up enterprise.", "Setup Steps", ["project appraisal"]);

  // ---------- ADDITIONAL TOPICS ----------
  addQA("What are examples of Traditional Small Scale Industries?", "Handloom, Coir, Handicrafts, Sericulture, Khadi, Village industries.", "Examples", ["traditional industries"]);
  addQA("What are examples of Modern Small Scale Industries?", "Bicycle parts, Electronic appliances, Sewing machines, Engineering goods, Spare parts manufacturing, Pharma products.", "Examples", ["modern industries"]);
  addQA("True/False: Small Scale Industries use advanced technology.", "False. Generally SSI use outdated technology and old methods of production, resulting in low productivity.", "True/False", []);
  addQA("True/False: Small Scale Industries contribute nearly 40% to industrial exports.", "True. SSI contribute nearly 40% of India's industrial exports through products like handicrafts, gems, engineering goods, etc.", "True/False", []);
  addQA("Fill in blank: India is ______ abundant country.", "labour", "Fillup", []);
  addQA("Fill in blank: SSI requires ______ capital as compared to large scale industries.", "less", "Fillup", []);
  addQA("Where does an entrepreneur register SSI?", "District Industries Centre (DIC). The entrepreneur obtains prescribed form from DIC and submits application with relevant documents.", "Setup Steps", ["dic registration"]);
  addQA("What is the recent amendment to MSMED Act 2006?", "The classification basis changed from 'investment in plant & machinery' to 'annual turnover'. Micro: turnover ≤ ₹5 crore; Small: ₹5-75 crore; Medium: ₹75-250 crore. This enhances ease of doing business.", "MSMED", ["amendment", "new classification"]);

  // Tables: MSMED Classification Table
  function getMSMEDTable() {
    return `<table class="responsive-table"><thead><tr><th>Category</th><th>Manufacturing Sector (Investment)</th><th>Services Sector (Investment)</th></tr></thead><tbody>
      <tr><td>📌 Micro</td><td>Does not exceed ₹25 lakhs</td><td>Does not exceed ₹10 lakhs</td></tr>
      <tr><td>🏭 Small</td><td>More than ₹25 lakhs but ≤ ₹5 crores</td><td>More than ₹10 lakhs but ≤ ₹2 crores</td></tr>
      <tr><td>⚙️ Medium</td><td>More than ₹5 crores but ≤ ₹10 crores</td><td>More than ₹2 crores but ≤ ₹5 crores</td></tr>
    </tbody></table>`;
  }
  
  function getStepsTable() {
    return `<table class="responsive-table"><thead><tr><th>Step</th><th>Description</th></tr></thead><tbody>
      <tr><td>1</td><td>Decision of Business Area - decide proprietorship/partnership/corporation</td></tr>
      <tr><td>2</td><td>Study of Business Environment - industrial policy, economic policy</td></tr>
      <tr><td>3</td><td>Selection of Product - market research, competition analysis</td></tr>
      <tr><td>4</td><td>Selection of Place - nearness to market, raw material, labour</td></tr>
      <tr><td>5</td><td>Selection of Technology - determine money, material, equipment</td></tr>
      <tr><td>6</td><td>Business Proposal - project appraisal (economic, financial, technical)</td></tr>
      <tr><td>7</td><td>Finance - arrange capital (own or borrowed)</td></tr>
      <tr><td>8</td><td>Registration - with District Industries Centre (DIC)</td></tr>
      <tr><td>9</td><td>Arrangement of Resources - physical, power, staffing</td></tr>
      <tr><td>10</td><td>Production and Marketing</td></tr>
      <tr><td>11</td><td>Review or Feedback for Future Changes</td></tr>
    </tbody></table>`;
  }

  // Search and display logic
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(q) {
    const lower = q.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower))
    ).slice(0, 16);
  }

  function updateSuggestions() {
    const val = searchInput.value.trim();
    if(!val) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>🏭</span> <strong>${item.question.substring(0,70)}</strong> <span style="margin-left:auto; background:#e8f5e9; padding:2px 12px; border-radius:30px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(q = null) {
    let query = (q !== null) ? q : searchInput.value.trim();
    if(!query) { resultsContainer.innerHTML = `<div class="not-found">✨ Type keywords: SSI Meaning, MSMED Classification, Advantages, Challenges, Steps to Setup, Labour Intensive, Export 40% ✨</div>`; return; }
    const matches = getMatches(query);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results. Try: Small Scale Industry, importance of SSI, advantages, challenges, steps to setup, MSMED Act.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      let extra = "";
      const qtext = item.question.toLowerCase();
      if (qtext.includes("classification") && item.category === "MSMED") extra = getMSMEDTable();
      if (qtext.includes("steps in setting up") || (qtext.includes("steps to setup"))) extra = getStepsTable();
      if (qtext.includes("advantages") && item.category === "Advantages") extra = `<div class="formula-box">✅ Key: Large Employment, Less Capital, Export 40%, Equitable Distribution, Cost Efficiency, Flexibility.</div>`;
      if (qtext.includes("challenges") || qtext.includes("problems")) extra = `<div class="formula-box">⚠️ Major: Old tech, Inadequate finance, Raw material, Labour, Marketing, Transport, Sickness, Power shortage, Global competition.</div>`;
      
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">📌 ${escapeHtml(item.category)}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / Explanation:</strong><br>${escapeHtml(item.answer)}${extra}</div>
        <div class="action-buttons">
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}">📖 Detailed Explanation</button>
          <button class="extraTableBtn" data-type="${item.category}">📋 Reference Table</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a = btn.getAttribute("data-a"), cat = btn.getAttribute("data-cat");
      showDetailPopup(q, a, cat);
    }));
    document.querySelectorAll(".extraTableBtn").forEach(btn => btn.addEventListener("click", () => {
      const type = btn.getAttribute("data-type");
      let content = `<div class="lang-section"><strong>📚 Small Scale Industry - Quick Reference</strong><br>`;
      content += `<h4>🏭 MSMED Classification (2006)</h4>${getMSMEDTable()}`;
      content += `<hr><h4>📋 11 Steps to Setup SSI</h4>${getStepsTable()}`;
      content += `<hr><div class="formula-box">💡 SSI contributes 40% to industrial exports | Labour intensive | Less capital requirement | Faces 9 major challenges</div>`;
      content += `</div>`;
      document.getElementById("popupModal").style.display = "flex";
      document.getElementById("modalContent").innerHTML = `<h2 style="color:#1b5e20;">🏭 SSI Complete Overview</h2>${content}<button id="closeModalInside" style="background:#2e7d32; margin-top:20px; padding:10px 26px; border-radius:40px; color:white;">Close</button>`;
      document.getElementById("closeModalInside").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
    }));
  }

  function showDetailPopup(question, answer, category) {
    let extraInfo = `<div class="lang-section"><strong>📖 11th OC Chapter 3 - Small Scale Industry & Business</strong><br>✔ SSI: Manufacturing/services on small scale, capital investment criteria<br>✔ MSMED Act 2006: Micro, Small, Medium classification<br>✔ Importance: Jobs, regional balance, support to large industries<br>✔ Advantages: Large employment, less capital, 40% exports, equitable distribution<br>✔ Challenges: Old tech, finance, raw material, marketing, sickness, power, global competition<br>✔ 11 Steps to Setup: from Business Area decision to Review</div>`;
    if(category === "MSMED") extraInfo += `<div class="lang-section"><h4>MSMED Classification Table</h4>${getMSMEDTable()}</div>`;
    if(category === "Setup Steps") extraInfo += `<div class="lang-section"><h4>Complete 11 Steps</h4>${getStepsTable()}</div>`;
    if(category === "Advantages") extraInfo += `<div class="lang-section">🌟 <strong>Top Benefits:</strong> Large employment generation, utilizes domestic resources, contributes 40% to exports, cost efficiency, flexibility, reduces migration.</div>`;
    if(category === "Challenges") extraInfo += `<div class="lang-section">⚠️ <strong>Solutions to Challenges:</strong> Modernization, easy finance schemes, marketing support from government, skill development, reliable power infrastructure.</div>`;
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#1b5e20;">📘 Detailed Explanation</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Answer:</strong><br>${escapeHtml(answer)}</div>
      ${extraInfo}
      <button id="closeDetailModal" style="background:#43a047; padding:10px 26px; border-radius:40px; margin-top:12px; color:white;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
  function escapeAttr(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice search supported in Chrome/Edge."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.onload = () => { resultsContainer.innerHTML = `<div class="not-found">🏭 11th OC | Small Scale Industry & Business | Search Meaning, MSMED, Advantages, Challenges, 11 Setup Steps ✨</div>`; };
</script>
