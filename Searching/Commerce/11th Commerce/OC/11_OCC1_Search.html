<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💼 Nature & Purpose of Business | 11th OC Chapter 1 | Business, Profession, Employment, Industry, Commerce</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #eff6ff, #dbeafe);
      min-height: 100vh;
      padding: 24px 18px;
      color: #1e293b;
      overflow-y: scroll;
      scrollbar-width: thin;
    }
    .container { max-width: 1300px; margin: 0 auto; }
    .heading { text-align: center; margin-bottom: 35px; animation: slideDown 0.5s ease; }
    .heading h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #1e40af, #2563eb, #60a5fa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .heading p { color: #1e40af; margin-top: 10px; font-weight: 600; background: #ffffffcc; display: inline-block; padding: 5px 18px; border-radius: 40px; backdrop-filter: blur(4px);}
    .search-wrapper { position: relative; margin-bottom: 32px; }
    .search-box {
      background: white;
      border-radius: 60px;
      padding: 6px 6px 6px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
      border: 1px solid #93c5fd;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      padding: 15px 0;
      background: transparent;
      color: #0f172a;
      font-weight: 500;
    }
    .icon-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #2563eb, #1e40af);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }
    .icon-btn:hover { transform: scale(1.05); background: #2563eb; }
    .suggestions-dropdown {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      right: 0;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
      z-index: 120;
      max-height: 280px;
      overflow-y: auto;
      display: none;
      border: 1px solid #93c5fd;
    }
    .suggestion-item {
      padding: 14px 24px;
      color: #0f172a;
      cursor: pointer;
      border-bottom: 1px solid #eff6ff;
      display: flex;
      gap: 14px;
      align-items: center;
      transition: 0.2s;
    }
    .suggestion-item:hover { background: #dbeafe; padding-left: 32px; }
    .result-container { display: flex; flex-direction: column; gap: 24px; margin-top: 20px; }
    .result-card {
      background: white;
      border-radius: 32px;
      padding: 1.8rem;
      color: #0f172a;
      box-shadow: 0 12px 30px -10px rgba(0,0,0,0.08);
      transition: 0.25s ease;
      border: 1px solid #bfdbfe;
    }
    .result-card:hover { transform: translateY(-4px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.12); }
    .badge {
      background: #dbeafe;
      color: #1e40af;
      display: inline-block;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .result-card h3 {
      color: #1e3a8a;
      font-size: 1.35rem;
      border-left: 6px solid #3b82f6;
      padding-left: 18px;
      margin-bottom: 18px;
      font-weight: 700;
    }
    .answer-text {
      background: #eff6ff;
      padding: 18px 24px;
      border-radius: 28px;
      line-height: 1.7;
      margin: 12px 0;
      border: 1px solid #bfdbfe;
    }
    .formula-box {
      background: #dbeafe;
      padding: 12px 18px;
      border-radius: 28px;
      font-family: monospace;
      font-size: 0.95rem;
      margin: 14px 0;
      text-align: center;
      border-left: 6px solid #2563eb;
      font-weight: 600;
    }
    .responsive-table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.85rem;
      overflow-x: auto;
      display: block;
      border-radius: 20px;
      overflow: hidden;
    }
    .responsive-table th, .responsive-table td {
      border: 1px solid #e2e8f0;
      padding: 12px 10px;
      text-align: left;
      background: white;
    }
    .responsive-table th { background: #2563eb; color: white; font-weight: 700; }
    .action-buttons { margin-top: 22px; display: flex; gap: 15px; flex-wrap: wrap; }
    .action-buttons button {
      border: none;
      padding: 10px 26px;
      border-radius: 50px;
      font-weight: 700;
      background: #f1f5f9;
      color: #1e293b;
      cursor: pointer;
      transition: 0.2s;
    }
    .action-buttons button:last-child { background: #60a5fa; color: #1e3a8a; box-shadow: 0 2px 8px rgba(96,165,250,0.3);}
    .action-buttons button:hover { transform: scale(0.97); opacity: 0.9; }
    .not-found {
      background: #eff6ff;
      border-radius: 48px;
      padding: 2.5rem;
      text-align: center;
      font-size: 1.1rem;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .popup-box {
      background: white;
      max-width: 950px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 48px;
      padding: 30px 34px;
      position: relative;
      color: #1e293b;
    }
    .close-popup {
      position: absolute;
      top: 18px;
      right: 22px;
      background: #fee2e2;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .lang-section { background: #f8fafc; padding: 18px; border-radius: 28px; margin-bottom: 20px; border-left: 5px solid #60a5fa; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 650px) {
      body { padding: 16px 12px; }
      .heading h1 { font-size: 1.4rem; }
      .result-card h3 { font-size: 1.1rem; }
      .result-card { padding: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="heading">
    <h1>💼 Nature & Purpose of Business | OC Chapter 1</h1>
    <p>📌 Business · Profession · Employment · Industry · Commerce · Auxiliaries to Trade · Business Objectives</p>
  </div>
  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔎 Search: Business, Profession, Employment, Industry types, Commerce, Auxiliaries to Trade, Profit role, Business objectives...">
      <button class="icon-btn" id="voiceBtn">🎤</button>
    </div>
    <div id="suggestionsList" class="suggestions-dropdown"></div>
  </div>
  <div class="result-container" id="resultsContainer">
    <div class="not-found">💼 Type above — Explore Business, Profession, Employment, Industry, Commerce, Auxiliaries to Trade and Business Objectives ✨</div>
  </div>
</div>
<div class="popup-overlay" id="popupModal">
  <div class="popup-box">
    <button class="close-popup" id="closeModalBtn">✖</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  const qaDatabase = [];

  function addQA(question, answer, category, keywords = []) {
    qaDatabase.push({ id: qaDatabase.length+1, question, answer, category, keywords: keywords.map(k=>k.toLowerCase()) });
  }

  // ============ ECONOMIC & NON-ECONOMIC ACTIVITIES ============
  addQA("What is the difference between Economic and Non-Economic Activities?", "Economic activities are undertaken to earn money or livelihood (e.g., working in a factory, running a business). Non-economic activities are performed for personal satisfaction, social, religious or sentimental reasons without monetary expectations (e.g., mother cooking for family, reading books).", "Introduction", ["economic vs non economic"]);
  addQA("What are Economic Activities?", "Actions that involve production, distribution and consumption of goods and services to earn livelihood. Examples: worker working in factory, businessman selling goods, doctor treating patients for fees.", "Introduction", ["economic activities meaning"]);

  // ============ BUSINESS ============
  addQA("What is Business? Define.", "Business represents organized efforts by an individual or group to produce goods and services and sell them in the market to earn profit. According to Prof. Haney: 'Business activities are all those human activities which are directed towards the production and processing of wealth.'", "Business", ["business meaning", "definition of business"]);
  addQA("What are the features/characteristics of Business?", "1) Economic Activity 2) Two Parties (buyer & seller) 3) Profit Motive 4) Production of Goods & Services 5) Exchange of Goods & Services 6) Dealings in Goods & Services 7) Continuity in Dealings 8) Uncertain Returns 9) Element of Risk 10) Customer Satisfaction.", "Business", ["features of business", "characteristics of business"]);
  addQA("What is the role of profit in Business?", "1) Returns to Investors 2) Research & Development (R&D) 3) Growth & Expansion 4) Increases Efficiency 5) Means of Livelihood 6) Reward for Risks 7) Survival of Business.", "Business", ["role of profit"]);

  // ============ PROFESSION ============
  addQA("What is Profession? Give examples.", "Profession is that part of economic activity under which a person uses educational knowledge and special skill to render services for earning income. Examples: Doctor, Lawyer, Chartered Accountant, Architect.", "Profession", ["profession meaning"]);
  addQA("What are the features of Profession?", "1) Aim: Earning money 2) Qualification: Required formal education 3) Financial Returns: Fees 4) Capital: Required for independent practice 5) Registration & Membership: Must register with council (e.g., ICAI, Bar Council) 6) Non-transferability 7) Nature of work: Expert services.", "Profession", ["features of profession"]);

  // ============ EMPLOYMENT ============
  addQA("What is Employment?", "Employment is an economic activity in which people work for others. There is employer-employee relationship. Employer offers work and employee accepts work. Remuneration and terms are agreed by both.", "Employment", ["employment meaning"]);
  addQA("What are the features of Employment?", "1) Aim: Earn money 2) Qualifications: As prescribed by employer 3) Monetary Returns: Wages or salary 4) Capital: No capital required 5) Registration: Not required 6) Non-transferability 7) Nature of work: As per service contract.", "Employment", ["features of employment"]);

  // ============ BUSINESS OBJECTIVES ============
  addQA("What are the objectives of Business?", "Economic Objectives: 1) Earning Profit 2) Searching New Customers 3) Innovations (R&D) 4) Best Possible Use of Resources. Social Objectives: 1) Supplying Quality Products 2) Avoiding Unfair Trade Practices 3) Employment Generation 4) Welfare of Employees 5) Help to Solve Social Problems 6) Contributing to Welfare of Society.", "Objectives", ["business objectives"]);

  // ============ INDUSTRY CLASSIFICATION ============
  addQA("What are the types of Industries?", "Industries are classified into three broad categories: 1) Primary Industry (nature-oriented): Agriculture, Extractive, Genetic 2) Secondary Industry (converts raw material): Manufacturing, Construction 3) Tertiary Industry (service industry): Transport, Banking, Tourism, Entertainment.", "Industry", ["types of industry"]);
  addQA("What is Primary Industry? Give its types.", "Primary industry is concerned with nature. Types: a) Agriculture Industry (farming, cultivation) b) Extractive Industry (draws products from natural resources - mining, fishing, forestry) c) Genetic Industry (reproduction of plants/animals - animal husbandry, sericulture, horticulture).", "Industry", ["primary industry"]);
  addQA("What is Secondary Industry? Give its types.", "Secondary industry depends on primary industries and converts raw material into finished products. Types: a) Manufacturing Industry (transforms raw material - textiles, sugar, paper) b) Construction Industry (builds dams, bridges, roads - creates immovable wealth).", "Industry", ["secondary industry"]);
  addQA("What is Tertiary/Service Industry?", "Tertiary industries provide support services to primary and secondary industries. Includes transport, banking, insurance, tourism, entertainment industry, hotel industry etc.", "Industry", ["tertiary industry"]);

  // ============ COMMERCE & TRADE ============
  addQA("What is Commerce? What does it include?", "Commerce is that part of business activity concerned with distribution of goods and services produced by industry. It bridges the gap between producers and consumers. Commerce is divided into: A) Trade (buying & selling) and B) Auxiliaries to Trade (supporting activities).", "Commerce", ["commerce meaning"]);
  addQA("What is Trade? What are its types?", "Trade denotes buying and selling of goods and services with money or money's worth. Types: 1) Home Trade/Internal Trade (within country) - further divided into Wholesale Trade and Retail Trade. 2) Foreign Trade/External Trade (between countries) - Import, Export, Entrepot Trade.", "Commerce", ["trade types"]);
  addQA("What is Wholesale Trade and Retail Trade?", "Wholesale Trade: Goods purchased and sold in bulk. Wholesaler buys from producer and sells to retailer. Retail Trade: Sale of goods to final consumers. Retailer buys from wholesaler/producer and sells in small quantities to ultimate consumer.", "Commerce", ["wholesale", "retail"]);
  addQA("What is Import, Export and Entrepot Trade?", "Import Trade: Purchasing goods from another country. Export Trade: Selling goods to foreign buyers. Entrepot Trade: Importing goods from one country and re-exporting to another country (combination of import/export).", "Commerce", ["import", "export", "entrepot"]);

  // ============ AUXILIARIES TO TRADE ============
  addQA("What are Auxiliaries to Trade? List them.", "Activities that facilitate smooth flow of goods from manufacturing to consumption centers. They remove hindrances in trade. List: 1) Transport (removes place hindrance) 2) Warehousing (time utility) 3) Insurance (risk coverage) 4) Banking (finance) 5) Advertising (information) 6) Mercantile Agents (bridge buyer-seller) 7) Communication.", "Auxiliaries", ["auxiliaries to trade", "aids to trade"]);

  // ============ COMPARISON TABLES ============
  function getBusinessProfessionEmploymentTable() {
    return `<table class="responsive-table"><thead><tr><th>Basis</th><th>Business</th><th>Profession</th><th>Employment</th></tr></thead><tbody>
      <tr><td>Reward</th><td>Profit</th><td>Fees</th><td>Wages/Salary</th></tr>
      <tr><td>Capital</th><td>Required (varies)</th><td>Limited (except self-employed)</th><td>No capital</th></tr>
      <tr><td>Qualification</th><td>No minimum prescribed</th><td>Expert knowledge & training</th><td>As per employer</th></tr>
      <tr><td>Risk</th><td>High & uncertain</th><td>Moderate</th><td>No risk (fixed pay)</th></tr>
      <tr><td>Registration</th><td>Not mandatory</th><td>Required (Council)</th><td>Not required</th></tr>
      <tr><td>Transferability</th><td>Transferable</th><td>Non-transferable</th><td>Non-transferable</th></tr>
    </tbody></table>`;
  }

  function getIndustryCommerceTable() {
    return `<table class="responsive-table"><thead><tr><th>Basis</th><th>Industry</th><th>Commerce</th></tr></thead><tbody>
      <tr><td>Meaning</th><td>Production of goods/services</th><td>Distribution of goods/services</th></tr>
      <tr><td>Utility Created</th><td>Form utility</th><td>Place, time & possession utility</th></tr>
      <tr><td>Location</th><td>Factories & workshops</th><td>Markets & offices</th></tr>
      <tr><td>Classification</th><td>Primary, Secondary, Tertiary</th><td>Trade & Auxiliaries to Trade</th></tr>
    </tbody><table>`;
  }

  // Search and display
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(q) {
    const lower = q.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower))
    ).slice(0, 16);
  }

  function updateSuggestions() {
    const val = searchInput.value.trim();
    if(!val) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>💼</span> <strong>${item.question.substring(0,70)}</strong> <span style="margin-left:auto; background:#dbeafe; padding:2px 12px; border-radius:30px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(q = null) {
    let query = (q !== null) ? q : searchInput.value.trim();
    if(!query) { resultsContainer.innerHTML = `<div class="not-found">💼 Type keywords: Business, Profession, Employment, Industry types, Commerce, Auxiliaries to Trade, Profit role ✨</div>`; return; }
    const matches = getMatches(query);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results. Try: Business features, Profession characteristics, Employment, Industry classification, Commerce, Trade types.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      let extra = "";
      const qtext = item.question.toLowerCase();
      if (qtext.includes("business profession employment") || (qtext.includes("comparative analysis"))) extra = getBusinessProfessionEmploymentTable();
      if (qtext.includes("industry and commerce") || (qtext.includes("industry vs commerce"))) extra = getIndustryCommerceTable();
      if (item.category === "Auxiliaries") extra = `<div class="formula-box">📦 7 Auxiliaries: Transport (place), Warehousing (time), Insurance (risk), Banking (finance), Advertising (info), Mercantile Agents, Communication.</div>`;
      if (item.category === "Objectives") extra = `<div class="formula-box">🎯 Economic: Profit, Customers, Innovation, Resource use. Social: Quality products, No unfair practices, Employment, Employee welfare, Social problems, Society welfare.</div>`;
      
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">📌 ${escapeHtml(item.category)}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / Explanation:</strong><br>${escapeHtml(item.answer)}${extra}</div>
        <div class="action-buttons">
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}">📖 Detailed Explanation</button>
          <button class="extraTableBtn" data-type="${item.category}">📋 Reference Tables</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a = btn.getAttribute("data-a"), cat = btn.getAttribute("data-cat");
      showDetailPopup(q, a, cat);
    }));
    document.querySelectorAll(".extraTableBtn").forEach(btn => btn.addEventListener("click", () => {
      let content = `<div class="lang-section"><strong>📚 Nature & Purpose of Business - Quick Reference</strong><br>`;
      content += `<h4>📊 Business vs Profession vs Employment</h4>${getBusinessProfessionEmploymentTable()}`;
      content += `<hr><h4>🏭 Industry vs Commerce</h4>${getIndustryCommerceTable()}`;
      content += `<hr><div class="formula-box">💡 Key Facts: Business has 10 features including profit motive, risk, continuity. Industry creates form utility; Commerce creates place, time, possession utility. 3 types of Industry: Primary (nature), Secondary (manufacturing/construction), Tertiary (services). 7 Auxiliaries to Trade.</div>`;
      content += `</div>`;
      document.getElementById("popupModal").style.display = "flex";
      document.getElementById("modalContent").innerHTML = `<h2 style="color:#1e40af;">📊 Nature & Purpose of Business - Complete Reference</h2>${content}<button id="closeModalInside" style="background:#2563eb; margin-top:20px; padding:10px 26px; border-radius:40px; color:white;">Close</button>`;
      document.getElementById("closeModalInside").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
    }));
  }

  function showDetailPopup(question, answer, category) {
    let extraInfo = `<div class="lang-section"><strong>📖 11th OC Chapter 1 - Nature & Purpose of Business</strong><br>✔ Economic Activities: Done for earning money. Non-Economic: Personal satisfaction.<br>✔ Business: Production/distribution for profit. Features: Profit motive, risk, continuity, 2 parties.<br>✔ Profession: Expert services with fees (Doctor, CA, Lawyer). Requires registration.<br>✔ Employment: Working for employer for salary/wages.<br>✔ Industry: Production (Primary, Secondary, Tertiary). Commerce: Distribution (Trade + Auxiliaries).<br>✔ 7 Auxiliaries to Trade: Transport, Warehousing, Insurance, Banking, Advertising, Mercantile Agents, Communication.</div>`;
    if(category === "Business") extraInfo += `<div class="lang-section"><strong>10 Features of Business:</strong> Economic activity, Two parties, Profit motive, Production, Exchange, Dealings, Continuity, Uncertain returns, Risk, Customer satisfaction.</div>`;
    if(category === "Industry") extraInfo += `<div class="lang-section"><strong>Industry Types:</strong> Primary (Agriculture, Extractive, Genetic) → Secondary (Manufacturing, Construction) → Tertiary (Services like transport, banking, tourism).</div>`;
    if(category === "Commerce") extraInfo += `<div class="lang-section"><strong>Trade Types:</strong> Home Trade (Wholesale + Retail) | Foreign Trade (Import + Export + Entrepot)</div>`;
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#1e40af;">📘 Detailed Explanation</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Answer:</strong><br>${escapeHtml(answer)}</div>
      ${extraInfo}
      <button id="closeDetailModal" style="background:#60a5fa; padding:10px 26px; border-radius:40px; margin-top:12px;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
  function escapeAttr(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice search supported in Chrome/Edge."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.onload = () => { resultsContainer.innerHTML = `<div class="not-found">💼 11th OC | Nature & Purpose of Business | Search Business, Profession, Employment, Industry, Commerce, Auxiliaries to Trade ✨</div>`; };
</script>
</body>
</html>
