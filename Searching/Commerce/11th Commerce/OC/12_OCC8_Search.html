<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📊 Introduction to Management | 11th OC Chapter 8 | Art, Science & Profession | Levels of Management</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #fdf2f8, #fce7f3);
      min-height: 100vh;
      padding: 24px 18px;
      color: #1e293b;
      overflow-y: scroll;
      scrollbar-width: thin;
    }
    .container { max-width: 1300px; margin: 0 auto; }
    .heading { text-align: center; margin-bottom: 35px; animation: slideDown 0.5s ease; }
    .heading h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #9d174d, #db2777, #f472b6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .heading p { color: #9d174d; margin-top: 10px; font-weight: 600; background: #ffffffcc; display: inline-block; padding: 5px 18px; border-radius: 40px; backdrop-filter: blur(4px);}
    .search-wrapper { position: relative; margin-bottom: 32px; }
    .search-box {
      background: white;
      border-radius: 60px;
      padding: 6px 6px 6px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
      border: 1px solid #f9a8d4;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      padding: 15px 0;
      background: transparent;
      color: #0f172a;
      font-weight: 500;
    }
    .icon-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #db2777, #be185d);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(219,39,119,0.4);
    }
    .icon-btn:hover { transform: scale(1.05); background: #db2777; }
    .suggestions-dropdown {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      right: 0;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
      z-index: 120;
      max-height: 280px;
      overflow-y: auto;
      display: none;
      border: 1px solid #f9a8d4;
    }
    .suggestion-item {
      padding: 14px 24px;
      color: #0f172a;
      cursor: pointer;
      border-bottom: 1px solid #fdf2f8;
      display: flex;
      gap: 14px;
      align-items: center;
      transition: 0.2s;
    }
    .suggestion-item:hover { background: #fce7f3; padding-left: 32px; }
    .result-container { display: flex; flex-direction: column; gap: 24px; margin-top: 20px; }
    .result-card {
      background: white;
      border-radius: 32px;
      padding: 1.8rem;
      color: #0f172a;
      box-shadow: 0 12px 30px -10px rgba(0,0,0,0.08);
      transition: 0.25s ease;
      border: 1px solid #fbcfe8;
    }
    .result-card:hover { transform: translateY(-4px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.12); }
    .badge {
      background: #fce7f3;
      color: #9d174d;
      display: inline-block;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .result-card h3 {
      color: #be185d;
      font-size: 1.35rem;
      border-left: 6px solid #f472b6;
      padding-left: 18px;
      margin-bottom: 18px;
      font-weight: 700;
    }
    .answer-text {
      background: #fef2f6;
      padding: 18px 24px;
      border-radius: 28px;
      line-height: 1.7;
      margin: 12px 0;
      border: 1px solid #fbcfe8;
    }
    .formula-box {
      background: #fce7f3;
      padding: 12px 18px;
      border-radius: 28px;
      font-family: monospace;
      font-size: 0.95rem;
      margin: 14px 0;
      text-align: center;
      border-left: 6px solid #db2777;
      font-weight: 600;
    }
    .responsive-table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.85rem;
      overflow-x: auto;
      display: block;
      border-radius: 20px;
      overflow: hidden;
    }
    .responsive-table th, .responsive-table td {
      border: 1px solid #e2e8f0;
      padding: 12px 10px;
      text-align: left;
      background: white;
    }
    .responsive-table th { background: #db2777; color: white; font-weight: 700; }
    .action-buttons { margin-top: 22px; display: flex; gap: 15px; flex-wrap: wrap; }
    .action-buttons button {
      border: none;
      padding: 10px 26px;
      border-radius: 50px;
      font-weight: 700;
      background: #f1f5f9;
      color: #1e293b;
      cursor: pointer;
      transition: 0.2s;
    }
    .action-buttons button:last-child { background: #f472b6; color: #831843; box-shadow: 0 2px 8px rgba(244,114,182,0.3);}
    .action-buttons button:hover { transform: scale(0.97); opacity: 0.9; }
    .not-found {
      background: #fdf2f8;
      border-radius: 48px;
      padding: 2.5rem;
      text-align: center;
      font-size: 1.1rem;
      color: #9d174d;
      border: 1px solid #fbcfe8;
    }
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .popup-box {
      background: white;
      max-width: 950px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 48px;
      padding: 30px 34px;
      position: relative;
      color: #1e293b;
    }
    .close-popup {
      position: absolute;
      top: 18px;
      right: 22px;
      background: #fee2e2;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .lang-section { background: #f8fafc; padding: 18px; border-radius: 28px; margin-bottom: 20px; border-left: 5px solid #f472b6; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 650px) {
      body { padding: 16px 12px; }
      .heading h1 { font-size: 1.4rem; }
      .result-card h3 { font-size: 1.1rem; }
      .result-card { padding: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="heading">
    <h1>📊 Introduction to Management | OC Chapter 8</h1>
    <p>📌 Characteristics · Levels of Management · Management as Art, Science & Profession</p>
  </div>
  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔎 Search: Meaning of Management, Characteristics, Levels of Management, Art vs Science vs Profession, Top Level, Middle Level, Lower Level...">
      <button class="icon-btn" id="voiceBtn">🎤</button>
    </div>
    <div id="suggestionsList" class="suggestions-dropdown"></div>
  </div>
  <div class="result-container" id="resultsContainer">
    <div class="not-found">📊 Type above — Explore Management: Definition, Characteristics, 3 Levels, and Management as Art, Science & Profession ✨</div>
  </div>
</div>
<div class="popup-overlay" id="popupModal">
  <div class="popup-box">
    <button class="close-popup" id="closeModalBtn">✖</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  const qaDatabase = [];

  function addQA(question, answer, category, keywords = []) {
    qaDatabase.push({ id: qaDatabase.length+1, question, answer, category, keywords: keywords.map(k=>k.toLowerCase()) });
  }

  // ============ MEANING & DEFINITION ============
  addQA("What is Management? Give its meaning.", "Management is the art of getting things done through others. The word comes from Italian 'maneggiare' (to handle) and Latin 'manus' (hand) + 'agere' (to act). Management involves forecasting, planning, organizing, commanding, coordinating, and controlling to achieve organizational goals.", "Meaning", ["management meaning", "definition of management"]);
  addQA("State the definitions of Management by Mary Parker Follett, Henry Fayol, F.W. Taylor and George Terry.", "1) Mary Parker Follett: 'Management is an art of getting things done through others.' 2) Henry Fayol: 'To manage is to forecast and plan, to organize, to command, to coordinate, and to control.' 3) F.W. Taylor: 'Management is knowing exactly what is to be done and seeing that it is done in the best possible manner.' 4) George Terry: 'Management is the process consisting of planning, organizing, actuating and controlling, performed to determine and accomplish objectives by use of people and resources.'", "Meaning", ["definitions of management"]);

  // ============ CHARACTERISTICS ============
  addQA("What are the characteristics of Management?", "1) Goal Oriented 2) Group Activity 3) Intangible 4) Continuous Process 5) Situational 6) Universal 7) Dynamic.", "Characteristics", ["features of management", "characteristics of management"]);
  addQA("Why is management called a group activity?", "Management is done for coordination of all resources effectively. Activities are done by a team or group under guidance of a manager. Decisions are taken by group (shareholders/BOD) for the group (employees).", "Characteristics", ["group activity"]);
  addQA("Why is management intangible?", "Management cannot be seen physically. It involves collective efforts of synchronization of planning, organizing, decision making, directing, and controlling. However, results can be experienced as increased profit, smooth functioning, goal achievement.", "Characteristics", ["intangible"]);
  addQA("Why is management universal?", "Principles and theories of management are equally applicable everywhere - defence, government, business, education, hospital, politics, social activities, and even family functioning. These principles are flexible and adaptable.", "Characteristics", ["universal"]);
  addQA("Why is management dynamic?", "Management deals with human efforts, different situations. It adopts changes - technological, socio-economical, political, environmental, international. Example: computers replacing typewriters, e-transactions, e-filing.", "Characteristics", ["dynamic"]);

  // ============ LEVELS OF MANAGEMENT ============
  addQA("What are the three levels of Management?", "1) Top Level Management (Board of Directors, CEO, President) 2) Middle Level Management (Department Heads: Finance Manager, Production Manager, HR Manager) 3) Lower Level Management (Supervisors, Foremen, Junior Executives).", "Levels", ["levels of management"]);
  addQA("What are the functions of Top Level Management?", "1) Decide long term objectives 2) Frame plans and policies 3) Ensure proper implementation 4) Create departments and positions 5) Appoint middle level managers 6) Evaluate performance of departments.", "Levels", ["top level functions"]);
  addQA("What are the functions of Middle Level Management?", "1) Link between top and lower level 2) Understand plans from top level 3) Prepare department action plan 4) Assign duties to staff 5) Train staff 6) Appoint lower level staff 7) Give timely reports to top level.", "Levels", ["middle level functions"]);
  addQA("What are the functions of Lower Level Management?", "1) Work as per middle level instructions 2) Assign work to subordinates 3) Give instructions 4) Direct subordinates 5) Solve disputes of subordinates 6) Look after repairs and maintenance 7) Conduct quality check.", "Levels", ["lower level functions"]);

  // ============ MANAGEMENT AS ART, SCIENCE & PROFESSION ============
  addQA("How is management an Art?", "Management as an Art: 1) Personal Skills - every manager has unique style 2) Creativity - finds new ways to achieve goals 3) Regular Practice - practice enables better dealing 4) Personal Abilities - uses own abilities to coordinate and guide.", "ArtScienceProf", ["management as art"]);
  addQA("How is management a Science?", "Management as a Science: 1) Systematic Body of Knowledge - based on experiments and theories 2) Scientific Methods - systematic data collection, analysis 3) Cause and Effect Relationship - appropriate salary motivates workers 4) Universal Applicability - principles apply everywhere. However, it is a social science, not pure science like Physics/Chemistry.", "ArtScienceProf", ["management as science"]);
  addQA("Is management a Profession? Why or why not?", "Management as a Profession (emerging): 1) Formal Education - MBA, management degrees 2) Code of Conduct - based on customs/traditions (no formal body) 3) Expertise - through knowledge and practice 4) Registration - no mandatory registration (unlike CA/Doctor) 5) Restricted Entry - no compulsion of formal education. Conclusion: Management has features of profession but not fully recognized as one.", "ArtScienceProf", ["management as profession"]);

  // ============ ADDITIONAL ============
  addQA("True/False: Management is a pure science.", "False. Management is a social science, not pure science like Physics/Chemistry. It gives qualitative results in same direction but not exact quantitative results.", "True/False", []);
  addQA("True/False: Management is a continuous process.", "True. Management is essential throughout the life of organization - to begin, run smoothly, and control activity. It is never ending.", "True/False", []);
  addQA("Fill in blank: Management is an ______ of getting things done through others.", "art", "Fillup", []);
  addQA("Fill in blank: The word 'manage' comes from Italian word ______.", "maneggiare", "Fillup", []);

  // ============ TABLES ============
  function getLevelsTable() {
    return `<table class="responsive-table"><thead><tr><th>Basis</th><th>Top Level</th><th>Middle Level</th><th>Lower Level</th></tr></thead><tbody>
      <tr><td>Meaning</td><td>Board of Directors, CEO, President</td><td>Department Heads (Finance, Production, HR)</td><td>Supervisors, Foremen, Junior Executives</td></tr>
      <tr><td>Nature of Work</td><td>Framing plans and policies</td><td>Implementation of policies</td><td>Actual execution of planning</td></tr>
      <tr><td>Skills Required</td><td>Conceptual/Decision making</td><td>Combination of conceptual & technical</td><td>More technical skills</td></tr>
      <tr><td>Time Frame</td><td>5 to 20 years (long term)</td><td>1 to 5 years (medium term)</td><td>Up to 1 year (short term)</td></tr>
    </tbody></table>`;
  }

  function getArtScienceTable() {
    return `<table class="responsive-table"><thead><tr><th>Dimension</th><th>Key Points</th><th>Conclusion</th></tr></thead><tbody>
      <tr><td>Art</td><td>Personal skills, creativity, regular practice, personal abilities</td><td>Management requires skill and innovation like an artist</td></tr>
      <tr><td>Science</td><td>Systematic knowledge, scientific methods, cause-effect, universal principles</td><td>Management is a social science (not pure science)</td></tr>
      <tr><td>Profession</td><td>Formal education, code of conduct, expertise, registration (limited)</td><td>Management is an emerging profession</td></tr>
    </tbody></table>`;
  }

  // Search and display
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(q) {
    const lower = q.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower))
    ).slice(0, 16);
  }

  function updateSuggestions() {
    const val = searchInput.value.trim();
    if(!val) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>📊</span> <strong>${item.question.substring(0,70)}</strong> <span style="margin-left:auto; background:#fce7f3; padding:2px 12px; border-radius:30px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(q = null) {
    let query = (q !== null) ? q : searchInput.value.trim();
    if(!query) { resultsContainer.innerHTML = `<div class="not-found">📊 Type keywords: Management meaning, Characteristics, Levels of Management, Art Science Profession, Top Level, Middle Level, Lower Level ✨</div>`; return; }
    const matches = getMatches(query);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results. Try: Definition of management, characteristics, levels of management, management as art, science or profession.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      let extra = "";
      const qtext = item.question.toLowerCase();
      if (qtext.includes("levels of management") && item.category === "Levels") extra = getLevelsTable();
      if (qtext.includes("management as an art") || (qtext.includes("art science") && item.category === "ArtScienceProf")) extra = getArtScienceTable();
      if (item.category === "Characteristics") extra = `<div class="formula-box">⭐ 7 Characteristics: Goal Oriented, Group Activity, Intangible, Continuous Process, Situational, Universal, Dynamic.</div>`;
      
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">📌 ${escapeHtml(item.category)}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / Explanation:</strong><br>${escapeHtml(item.answer)}${extra}</div>
        <div class="action-buttons">
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}">📖 Detailed Explanation</button>
          <button class="extraTableBtn" data-type="${item.category}">📋 Reference Tables</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a = btn.getAttribute("data-a"), cat = btn.getAttribute("data-cat");
      showDetailPopup(q, a, cat);
    }));
    document.querySelectorAll(".extraTableBtn").forEach(btn => btn.addEventListener("click", () => {
      let content = `<div class="lang-section"><strong>📚 Introduction to Management - Quick Reference</strong><br>`;
      content += `<h4>📊 Levels of Management</h4>${getLevelsTable()}`;
      content += `<hr><h4>🎨 Management as Art, Science & Profession</h4>${getArtScienceTable()}`;
      content += `<hr><div class="formula-box">💡 Key Facts: Management is goal oriented, group activity, intangible, continuous, situational, universal, dynamic. 3 Levels: Top (policy), Middle (implementation), Lower (execution). Management = Art (creativity) + Science (principles) + Emerging Profession.</div>`;
      content += `</div>`;
      document.getElementById("popupModal").style.display = "flex";
      document.getElementById("modalContent").innerHTML = `<h2 style="color:#be185d;">📊 Introduction to Management - Complete Reference</h2>${content}<button id="closeModalInside" style="background:#db2777; margin-top:20px; padding:10px 26px; border-radius:40px; color:white;">Close</button>`;
      document.getElementById("closeModalInside").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
    }));
  }

  function showDetailPopup(question, answer, category) {
    let extraInfo = `<div class="lang-section"><strong>📖 11th OC Chapter 8 - Introduction to Management</strong><br>✔ Management: Art of getting things done through others (Mary Parker Follett)<br>✔ Characteristics (7): Goal oriented, Group activity, Intangible, Continuous, Situational, Universal, Dynamic<br>✔ 3 Levels: Top (policy framing), Middle (implementation), Lower (execution)<br>✔ Management as Art: personal skills, creativity, practice<br>✔ Management as Science: systematic knowledge, cause-effect, universal principles<br>✔ Management as Profession: formal education, code of conduct, expertise (emerging)</div>`;
    if(category === "Levels") extraInfo += `<div class="lang-section"><h4>Levels of Management Table</h4>${getLevelsTable()}</div>`;
    if(category === "ArtScienceProf") extraInfo += `<div class="lang-section"><h4>Art, Science & Profession Comparison</h4>${getArtScienceTable()}</div>`;
    if(category === "Characteristics") extraInfo += `<div class="lang-section"><strong>7 Characteristics Details:</strong> Goal Oriented (purposeful activity), Group Activity (team effort), Intangible (cannot be seen, only results), Continuous Process (never ending), Situational (depends on situation), Universal (everywhere applicable), Dynamic (adapts to changes).</div>`;
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#be185d;">📘 Detailed Explanation</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Answer:</strong><br>${escapeHtml(answer)}</div>
      ${extraInfo}
      <button id="closeDetailModal" style="background:#f472b6; padding:10px 26px; border-radius:40px; margin-top:12px;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
  function escapeAttr(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice search supported in Chrome/Edge."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.onload = () => { resultsContainer.innerHTML = `<div class="not-found">📊 11th OC | Introduction to Management | Search Definition, Characteristics, Levels, Art/Science/Profession ✨</div>`; };
</script>
</body>
</html>
