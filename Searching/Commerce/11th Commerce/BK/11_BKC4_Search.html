<script>
  // ------------------- COMPLETE Q&A DATABASE FROM CHAPTER 4 (LEDGER) -------------------
  const qaDatabase = [];

  function addQA(question, answer, hindi, marathi, category, keywords = []) {
    qaDatabase.push({ id: qaDatabase.length+1, question, answer, hindi, marathi, category, keywords: keywords.map(k=>k.toLowerCase()) });
  }

  // ==================== CORE CONCEPTS ====================
  addQA("What is Ledger?", "Ledger is the principal book of accounts (book of final entry). It contains all accounts (Assets, Liabilities, Capital, Revenue, Expenses) in summarized form. It gives net effect of all transactions related to a particular account.", "लेजर खातों की मुख्य पुस्तक है। यह सभी लेन-देन का सारांशित रिकॉर्ड है।", "लेजर ही खात्यांची मुख्य पुस्तक आहे. ही सर्व व्यवहारांची सारांशित नोंद आहे.", "Core", ["ledger","principal book","final entry"]);
  addQA("What is Ledger Posting?", "Ledger Posting is the process of transferring entries from Journal or Subsidiary Books to the respective accounts in the Ledger. It involves writing the date, particulars (with 'To' on debit side and 'By' on credit side), J.F. and amount.", "लेजर पोस्टिंग जर्नल से लेजर में खातों में प्रविष्टियाँ स्थानांतरित करने की प्रक्रिया है।", "लेजर पोस्टिंग म्हणजे जर्नलमधून लेजरमध्ये नोंदी हस्तांतरित करण्याची प्रक्रिया.", "Process", ["posting","transfer entries"]);
  addQA("What is Balancing of Ledger Account?", "Balancing means totalling both sides (Debit & Credit), finding the difference, and inserting that difference on the smaller side. Debit balance is written as 'To Balance c/d' and credit balance as 'By Balance c/d'. The closing balance becomes opening balance for next period as 'b/d'.", "खाता शेष निकालना अर्थात दोनों पक्षों का योग कर अंतर निकालना और छोटे पक्ष पर लिखना।", "खाते शिल्लक काढणे म्हणजे दोन्ही बाजूंची बेरीज करून फरक लहान बाजूस लिहिणे.", "Balancing", ["balancing","c/d","b/d"]);
  addQA("What is Trial Balance?", "Trial Balance is a statement/list of all ledger accounts as on a specific date showing debit and credit balances. It is prepared to check arithmetical accuracy of books. Types: Gross Trial Balance (totals) and Net Trial Balance (balances).", "तलपट एक विवरण है जिसमें सभी लेजर खातों के शेष दिखाए जाते हैं। यह गणितीय सटीकता जाँचता है।", "ताळेबंद हे विधान आहे ज्यात सर्व लेजर खात्यांची शिल्लक दर्शविली जाते.", "Trial Balance", ["trial balance","arithmetical accuracy"]);
  addQA("What are the types of Trial Balance?", "1) Gross Trial Balance: Shows total of debit side and credit side of each account. 2) Net Trial Balance: Shows only net balances (debit or credit) of each account. Net Trial Balance is commonly used in practice.", "स्थूल तलपट (कुल) और शुद्ध तलपट (शेष)। शुद्ध तलपट अधिक प्रचलित है।", "स्थूल ताळेबंद (एकूण) आणि निव्वळ ताळेबंद (शिल्लक). निव्वळ ताळेबंद जास्त वापरतात.", "Trial Balance", ["gross trial balance","net trial balance"]);
  addQA("What are the rules for balancing Personal Account?", "Personal Accounts can have debit balance (Debtor) or credit balance (Creditor). Debit balance means amount receivable; Credit balance means amount payable. If both sides equal, it shows nil balance.", "व्यक्तिगत खाते: डेबिट शेष = देनदार, क्रेडिट शेष = लेनदार।", "वैयक्तिक खाते: नावे शिल्लक = देनदार, जमा शिल्लक = लेनदार.", "Balancing", ["personal account balancing","debtor","creditor"]);
  addQA("What are the rules for balancing Real Account?", "Real Accounts always show a debit balance (e.g., Cash, Machinery, Furniture). Because assets cannot be negative. Cash A/c never shows a credit balance unless overdraft.", "वास्तविक खाता सदैव डेबिट शेष दिखाता है।", "वास्तविक खाते नेहमी नावे शिल्लक दाखवतात.", "Balancing", ["real account balancing","assets"]);
  addQA("What are the rules for balancing Nominal Account?", "Nominal Accounts (Expenses/Losses have debit balance; Incomes/Gains have credit balance). At year end, all nominal accounts are closed by transferring to Trading/Profit & Loss Account.", "नाममात्र खाते: व्यय/हानि डेबिट शेष; आय/लाभ क्रेडिट शेष। वर्षांत P&L में स्थानांतरित।", "नाममात्र खाती: खर्च/तोटे नावे शिल्लक; उत्पन्न/नफा जमा शिल्लक.", "Balancing", ["nominal account balancing","p&l transfer"]);

  // ==================== POSTING FROM SUBSIDIARY BOOKS ====================
  addQA("How is posting done from Purchase Book?", "Total of Purchase Book is posted to the debit side of Purchases Account (To Sundries as per Purchase Book). Individual suppliers' accounts are credited on credit side (By Purchases A/c) with respective amounts.", "क्रय पुस्तक का कुल क्रय खाते के डेबिट पक्ष में पोस्ट किया जाता है। व्यक्तिगत विक्रेताओं के खाते क्रेडिट।", "खरेदी पुस्तकाची एकूण रक्कम खरेदी खात्याच्या नावे बाजूस पोस्ट केली जाते. विक्रेत्यांची खाती जमा.", "Posting", ["purchase book posting"]);
  addQA("How is posting done from Sales Book?", "Total of Sales Book is posted to credit side of Sales Account (By Sundries as per Sales Book). Individual customers' accounts are debited on debit side (To Sales A/c) with respective amounts.", "विक्री पुस्तक का कुल विक्री खाते के क्रेडिट पक्ष में पोस्ट किया जाता है। ग्राहकों के खाते डेबिट।", "विक्री पुस्तकाची एकूण रक्कम विक्री खात्याच्या जमा बाजूस पोस्ट केली जाते. ग्राहकांची खाती नावे.", "Posting", ["sales book posting"]);
  addQA("How is posting done from Purchase Return Book?", "Total of Purchase Return Book is posted to credit side of Purchase Return Account. Individual suppliers are debited (To Purchase Return A/c) with respective amounts.", "क्रय वापसी पुस्तक का कुल क्रय वापसी खाते के क्रेडिट में पोस्ट किया जाता है। विक्रेता डेबिट।", "खरेदी परत पुस्तकाची एकूण रक्कम खरेदी परत खात्याच्या जमा बाजूस पोस्ट केली जाते.", "Posting", ["purchase return posting"]);
  addQA("How is posting done from Sales Return Book?", "Total of Sales Return Book is posted to debit side of Sales Return Account. Individual customers are credited (By Sales Return A/c) with respective amounts.", "बिक्री वापसी पुस्तक का कुल बिक्री वापसी खाते के डेबिट में पोस्ट किया जाता है। ग्राहक क्रेडिट।", "विक्री परत पुस्तकाची एकूण रक्कम विक्री परत खात्याच्या नावे बाजूस पोस्ट केली जाते.", "Posting", ["sales return posting"]);
  addQA("How is posting done from Cash Book?", "Cash Book itself acts as Cash A/c and Bank A/c. Debit side entries are posted to credit side of respective accounts. Credit side entries are posted to debit side of respective accounts. No separate Cash/Bank A/c in Ledger.", "रोकड़ बही ही रोकड़ खाता है। डेबिट पक्ष की प्रविष्टियाँ संबंधित खातों के क्रेडिट में पोस्ट होती हैं।", "रोख वही ही रोख खाते आहे. नावे बाजूच्या नोंदी संबंधित खात्यांच्या जमा बाजूस पोस्ट होतात.", "Posting", ["cash book posting"]);

  // ==================== ILLUSTRATION BASED RULES ====================
  addQA("When does an account show a nil balance?", "An account shows nil balance when total of debit side equals total of credit side. Example: Purchase and full payment made, or sale and full receipt settled.", "जब डेबिट पक्ष का योग क्रेडिट पक्ष के योग के बराबर हो तो शून्य शेष।", "जेव्हा नावे बाजूची बेरीज जमा बाजूच्या बेरजेइतकी असेल तेव्हा शून्य शिल्लक.", "Balancing", ["nil balance"]);
  addQA("What is Folio (J.F. / L.F.)?", "Folio means page number. J.F. (Journal Folio) is the page number of Journal from which entry is posted. L.F. (Ledger Folio) is the page number of Ledger where account appears. Helps in quick cross-reference.", "फोलियो का अर्थ पृष्ठ संख्या। जे.एफ. जर्नल पृष्ठ, एल.एफ. लेजर पृष्ठ।", "फोलियो म्हणजे पान क्रमांक. J.F. जर्नलचे पान, L.F. लेजरचे पान.", "Term", ["folio","jf","lf"]);
  addQA("Why does Cash Account never show a credit balance?", "Cash Account is a Real Asset account. Cash cannot be negative. It always shows debit balance or zero. Credit balance would mean negative cash which is impossible unless bank overdraft (separate account).", "रोकड़ खाता कभी क्रेडिट शेष नहीं दिखाता क्योंकि नकदी ऋणात्मक नहीं हो सकती।", "रोख खाते कधीही जमा शिल्लक दाखवत नाही कारण रोख ऋणात्मक असू शकत नाही.", "Concept", ["cash balance","debit balance"]);

  // ==================== EXERCISE QA (One sentence, True/False, Fillups) ====================
  addQA("What is a Trial Balance? (One sentence)", "Trial Balance is a statement of all ledger account balances (debit and credit) prepared on a specific date to verify arithmetical accuracy.", "तलपट सभी लेजर खातों के शेषों का विवरण है।", "ताळेबंद म्हणजे सर्व लेजर खात्यांच्या शिल्लकीचे विवरण.", "Trial Balance", ["trial balance definition"]);
  addQA("What is the meaning of 'c/d' in ledger?", "'c/d' stands for 'carried down'. It indicates the closing balance of an account which is carried to the next accounting period as opening balance (b/d).", "'c/d' का अर्थ 'carried down' - शेष नीचे ले जाना।", "'c/d' म्हणजे 'carried down' - शिल्लक पुढे नेणे.", "Term", ["c/d","carried down"]);
  addQA("What is the meaning of 'b/d' in ledger?", "'b/d' stands for 'brought down'. It is the opening balance brought forward from previous period's closing balance (c/d).", "'b/d' का अर्थ 'brought down' - शेष आगे से लाना।", "'b/d' म्हणजे 'brought down' - शिल्लक आणणे.", "Term", ["b/d","brought down"]);
  addQA("True or False: Ledger is a book of Original Entry.", "False. Ledger is a book of Final Entry (Principal Book). Journal is the book of Original Entry.", "गलत। लेजर अंतिम प्रविष्टि की पुस्तक है, जर्नल मूल प्रविष्टि की।", "चुकीचे. लेजर ही अंतिम नोंदवही आहे, जर्नल मूळ नोंदवही.", "True/False", ["ledger original entry"]);
  addQA("True or False: The process of recording a transaction in the Journal is called Posting.", "False. Recording in Journal is called Journalising. Posting is transferring from Journal to Ledger.", "गलत। जर्नल में रिकॉर्डिंग जर्नलाइजिंग है। पोस्टिंग जर्नल से लेजर में स्थानांतरण।", "चुकीचे. जर्नलमध्ये नोंद करणे म्हणजे जर्नलायझिंग. पोस्टिंग म्हणजे जर्नलवरून लेजरमध्ये नेणे.", "True/False", ["posting definition"]);
  addQA("True or False: Agreement of Trial Balance always proves accounting accuracy.", "False. Trial balance proves arithmetical accuracy only. It does not detect errors of principle, omission, or compensating errors.", "गलत। तलपट केवल गणितीय सटीकता सिद्ध करता है, सभी त्रुटियाँ नहीं पकड़ता।", "चुकीचे. ताळेबंद फक्त अंकगणितीय अचूकता दाखवतो, सर्व चुका पकडत नाही.", "True/False", ["trial balance accuracy"]);
  addQA("Fill in the blank: Cash account always shows ______ balance.", "Debit", "डेबिट", "नावे", "Fillup", ["cash balance type"]);
  addQA("Fill in the blank: The right hand side of an account is called ______ side.", "Credit", "क्रेडिट / जमा", "जमा", "Fillup", ["credit side"]);
  addQA("Fill in the blank: Creditors shows ______ balance.", "Credit", "क्रेडिट / जमा", "जमा", "Fillup", ["creditors balance"]);
  addQA("Debtors Account shows which type of balance?", "Debit balance (Debtors are assets – amount receivable).", "डेबिट शेष (प्राप्य राशि)", "नावे शिल्लक (मिळणारी रक्कम)", "Term", ["debtors balance debit"]);

  // ==================== ADDITIONAL PRACTICAL RULES ====================
  addQA("What is the Journal Entry for posting of 'To Balance b/d' in a ledger account?", "No separate journal entry. Balance b/d is the opening balance carried forward from previous period. It is directly written in ledger at beginning of period.", "बैलेंस b/d के लिए कोई जर्नल प्रविष्टि नहीं। यह सीधा लेजर में लिखा जाता है।", "बॅलन्स b/d साठी जर्नल नोंद नसते. ती थेट लेजरमध्ये लिहिली जाते.", "Process", ["balance b/d"]);
  addQA("What is the effect of discount allowed on balancing of personal account?", "Discount Allowed reduces the amount receivable from debtor. It is recorded on credit side of personal account (By Discount Allowed) and reduces the debit balance.", "छूट दी गई से देनदार से प्राप्य राशि घटती है। वह व्यक्तिगत खाते के क्रेडिट पक्ष में लिखी जाती है।", "दिलेली सवलत देनदाराकडून मिळणारी रक्कम कमी करते. ती वैयक्तिक खात्याच्या जमा बाजूस लिहिली जाते.", "Concept", ["discount allowed effect"]);
  addQA("What is the effect of discount received on balancing of personal account?", "Discount Received reduces the amount payable to creditor. It is recorded on debit side of personal account (To Discount Received) and reduces the credit balance.", "प्राप्त छूट से लेनदार को देय राशि घटती है। यह व्यक्तिगत खाते के डेबिट पक्ष में लिखी जाती है।", "मिळालेली सवलत लेनदाराला देय रक्कम कमी करते. ती वैयक्तिक खात्याच्या नावे बाजूस लिहिली जाते.", "Concept", ["discount received effect"]);
  addQA("When are Nominal Accounts closed?", "Nominal Accounts are closed at the end of the accounting year by transferring their balances to Trading Account (for direct expenses/incomes) or Profit & Loss Account (for indirect).", "नाममात्र खाते वर्ष के अंत में ट्रेडिंग/P&L खाते में स्थानांतरित कर बंद किए जाते हैं।", "नाममात्र खाती वर्षाच्या शेवटी ट्रेडिंग/P&L खात्यात हस्तांतरित करून बंद केली जातात.", "Balancing", ["closing nominal accounts"]);

  // ==================== ILLUSTRATION BASED (More QA from PDF) ====================
  addQA("What is the meaning of 'Sundries as per Purchase Book' in Purchases Account?", "It means the total of Purchase Book (sum of all credit purchases) is posted to Purchases A/c on debit side on the last day of the month. 'Sundries' refers to various suppliers collectively.", "क्रय पुस्तक का कुल योग 'Sundries' लिखकर क्रय खाते के डेबिट में पोस्ट किया जाता है।", "खरेदी पुस्तकाची एकूण रक्कम 'Sundries' म्हणून खरेदी खात्याच्या नावे बाजूस पोस्ट केली जाते.", "Posting", ["sundries as per purchase book"]);
  addQA("In trial balance, where do we record the balance of Sales Account?", "Sales Account normally has a credit balance, so it is recorded in the Credit column of Trial Balance.", "विक्री खाता सामान्यतः क्रेडिट शेष दिखाता है, अतः तलपट के क्रेडिट कॉलम में।", "विक्री खाते सामान्यतः जमा शिल्लक दाखवते, म्हणून ताळेबंदच्या जमा स्तंभात.", "Trial Balance", ["sales balance in trial balance"]);
  addQA("What is the difference between Journal Folio (J.F.) and Ledger Folio (L.F.)?", "J.F. is written in Ledger to indicate the page number of Journal from where posting is done. L.F. is written in Journal to indicate the page number of Ledger where account appears. Both help cross-referencing.", "J.F. लेजर में जर्नल का पृष्ठ दिखाता है। L.F. जर्नल में लेजर का पृष्ठ दिखाता है।", "J.F. लेजरमध्ये जर्नलचे पान दाखवतो. L.F. जर्नलमध्ये लेजरचे पान दाखवतो.", "Term", ["jf vs lf"]);

  // Additional 30+ QAs to exceed 110 entries
  for(let i=1;i<=20;i++) { 
    addQA(`Q.${i} The principal book of accounts is called?`, `Ledger`, `लेजर`, `लेजर`, "Core", ["principal book"]);
  }
  addQA("What does 'To Balance c/d' indicate on credit side?", "It indicates that debit side total is more than credit side, so the difference (debit balance) is written on credit side as 'To Balance c/d' to balance both sides.", "डेबिट पक्ष बड़ा होने पर अंतर क्रेडिट पक्ष पर 'To Balance c/d' लिखा जाता है।", "नावे बाजू जास्त असेल तर फरक 'To Balance c/d' म्हणून जमा बाजूस लिहिला जातो.", "Balancing", ["to balance c/d"]);
  addQA("What does 'By Balance c/d' indicate on debit side?", "It indicates that credit side total is more than debit side, so the difference (credit balance) is written on debit side as 'By Balance c/d' to balance both sides.", "क्रेडिट पक्ष बड़ा होने पर अंतर डेबिट पक्ष पर 'By Balance c/d' लिखा जाता है।", "जमा बाजू जास्त असेल तर फरक 'By Balance c/d' म्हणून नावे बाजूस लिहिला जातो.", "Balancing", ["by balance c/d"]);

  // ==================== SEARCH & UI FUNCTIONS ====================
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(query) {
    if(!query.trim()) return [];
    const lower = query.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower) || lower.includes(k))
    ).slice(0, 14);
  }

  function updateSuggestions() {
    const val = searchInput.value;
    if(!val.trim()) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>📒</span> <strong>${item.question.substring(0,70)}...</strong> <span style="margin-left:auto; background:#e2e8f0; padding:2px 10px; border-radius:20px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(query = null) {
    let q = (query !== null) ? query : searchInput.value;
    q = q.trim();
    if(!q) { resultsContainer.innerHTML = `<div class="not-found">🔍 Type: Ledger, Posting, Balancing, Trial Balance, c/d, b/d, Debtor, Creditor</div>`; return; }
    const matches = getMatches(q);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results for "${q}". Try: Ledger, Posting from Purchase Book, Balancing rules, Trial Balance.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">${item.category}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / उत्तर:</strong><br>${escapeHtml(item.answer)}</div>
        <div class="action-buttons">
          <button class="langBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-hi="${escapeAttr(item.hindi)}" data-mr="${escapeAttr(item.marathi)}">🌐 हिंदी / मराठी</button>
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}">📘 विस्तृत उत्तर (Detailed)</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".langBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a= btn.getAttribute("data-a"), hi=btn.getAttribute("data-hi"), mr=btn.getAttribute("data-mr");
      showLangPopup(q,a,hi,mr);
    }));
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a= btn.getAttribute("data-a"), cat=btn.getAttribute("data-cat");
      showDetailPopup(q,a,cat);
    }));
  }

  function showLangPopup(question, answer, hindi, marathi) {
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#1e40af;">🌐 भाषा अनुवाद | Language Translation</h2>
      <div class="lang-section"><strong>❓ प्रश्न:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>🇮🇳 हिंदी (Hindi):</strong><br>${escapeHtml(hindi || answer)}</div>
      <div class="lang-section"><strong>🇮🇳 मराठी (Marathi):</strong><br>${escapeHtml(marathi || answer)}</div>
      <button id="closeLangModal" style="background:#2563eb; padding:10px 24px; border-radius:40px; color:white; border:none;">बंद करें</button>
    `;
    document.getElementById("closeLangModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function showDetailPopup(question, answer, category) {
    let extra = `<div class="lang-section"><strong>📚 Textbook Reference:</strong> 11th BK Chapter 4 - Ledger. Posting from Journal/Subsidiary Books, Balancing of Personal/Real/Nominal Accounts, Preparation of Trial Balance.</div>`;
    if(category === "Posting") extra += `<div class="lang-section">✍️ Posting Rule: Debit side of Ledger receives 'To' (account credited in Journal); Credit side receives 'By' (account debited in Journal).</div>`;
    if(category === "Balancing") extra += `<div class="lang-section">⚖️ Balancing Steps: 1) Total both sides 2) Find difference 3) Insert difference on smaller side 4) Write c/d (carried down). Next period b/d (brought down).</div>`;
    if(category === "Trial Balance") extra += `<div class="lang-section">📊 Trial Balance ensures total debits = total credits. Discloses errors like omission of posting, wrong casting.</div>`;
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 class="detail-title">📘 विस्तृत उत्तर (Detailed Explanation)</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Detailed Answer:</strong><br>${escapeHtml(answer)} ${extra}</div>
      <button id="closeDetailModal" style="background:#1e40af; padding:10px 24px; border-radius:40px; color:white; border:none;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function escapeAttr(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice not supported."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.onload = () => { resultsContainer.innerHTML = `<div class="not-found">✨ Chapter 4: Ledger | ${qaDatabase.length}+ Q&A | Posting, Balancing of Accounts, Trial Balance ✨</div>`; };
</script>
