    .action-buttons button {

    /* popup */

    .popup-box {

    .close-popup {

      cursor: pointer;
    }

    .lang-section {
      background: #f1f5f9;
      padding: 18px;
      border-radius: 24px;
      margin-bottom: 18px;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }

    @media (max-width: 650px) {
      .heading h1 {
        font-size: 1.6rem;
      }
      .result-card h3 {
        font-size: 1.2rem;
      }
    }
  </style>

<script>
  // --------------------------------------------------------------
  // FULL QA EXTRACTION FROM PDF (CHAPTER 1) with PROPER HINDI & MARATHI
  // --------------------------------------------------------------
  const qaDatabase = [];

  function addQA(question, answer, hindiAns, marathiAns, category, keywords = []) {
    qaDatabase.push({
      id: qaDatabase.length + 1,
      question: question,
      answer: answer,
      hindi: hindiAns,
      marathi: marathiAns,
      category: category,
      keywords: keywords.map(k => k.toLowerCase())
    });
  }

  // Helper for natural translations (as per textbook style)
  // --------  All answers below have proper Hindi/Marathi ----------
  addQA("What is Book-keeping?", "Book-keeping is the art of recording business transactions in a systematic manner.", "बुक-कीपिंग व्यावसायिक लेन-देन को व्यवस्थित रूप से रिकॉर्ड करने की कला है। इसमें वित्तीय लेन-देन का वर्गीकरण और सारांश शामिल है।", "बुक-कीपिंग म्हणजे व्यवसायातील व्यवहार व्यवस्थित पद्धतीने नोंदवण्याची कला. यामध्ये आर्थिक व्यवहारांचे वर्गीकरण व सारांशनोंद केला जातो.", "Definition", ["bookkeeping","bk","recording"]);
  addQA("What is meant by Goods?", "Goods are commodities or articles in which a trader deals, purchased for sale and profit.", "गुड्स वे वस्तुएं हैं जिनका व्यापारी व्यापार करता है, लाभ के लिए खरीदी और बेची जाती हैं।", "गुड्स म्हणजे व्यापारी ज्या वस्तूंचा व्यवहार करतो, नफ्यासाठी खरेदी-विक्री.", "Terminology", ["goods","merchandise"]);
  addQA("What is Capital?", "Capital is the amount invested by the owner into business. Capital = Assets - Liabilities.", "पूंजी वह राशि है जो मालिक व्यवसाय में निवेश करता है। पूंजी = संपत्तियाँ - देनदारियाँ।", "भांडवल म्हणजे मालकाने व्यवसायात गुंतवलेली रक्कम. भांडवल = मालमत्ता - देणी.", "Terminology", ["capital","owner equity"]);
  addQA("What is Drawings?", "Drawings are cash or goods withdrawn by owner for personal use.", "ड्रॉइंग्स वह राशि या माल है जो मालिक व्यक्तिगत उपयोग के लिए व्यवसाय से निकालता है।", "ड्रॉईंग्स म्हणजे मालकाने वैयक्तिक वापरासाठी काढलेली रोकड किंवा माल.", "Terminology", ["drawings","withdrawal"]);
  addQA("What is Goodwill?", "Goodwill is the reputation of business expressed in terms of money. Intangible asset.", "गुडविल व्यवसाय की प्रतिष्ठा है जिसे धन के रूप में व्यक्त किया जाता है। अमूर्त संपत्ति।", "गुडविल म्हणजे व्यवसायाची प्रतिष्ठा जी पैशात व्यक्त केली जाते. अमूर्त मालमत्ता.", "Terminology", ["goodwill","reputation"]);
  addQA("Define Debtor.", "A person who owes money to the business for goods received on credit.", "देनदार वह व्यक्ति है जिसे व्यवसाय को उधार पर माल लेने के बाद पैसे देने होते हैं।", "देनदार म्हणजे ज्या व्यक्तीने उधारीवर माल घेतला आहे आणि व्यवसायाला पैसे देणे बाकी आहे.", "Terminology", ["debtor"]);
  addQA("Define Creditor.", "A person to whom business owes money for goods or services received on credit.", "लेनदार वह व्यक्ति है जिसे व्यवसाय ने उधार पर माल या सेवा ली है और पैसे देने बाकी हैं।", "लेनदार म्हणजे ज्याला व्यवसायाने उधारीवर माल किंवा सेवा घेतली आहे आणि पैसे देणे बाकी आहेत.", "Terminology", ["creditor"]);
  addQA("What are Bad Debts?", "Bad debts are irrecoverable amounts from debtors, a revenue loss.", "अशोध्य ऋण वह राशि है जो देनदार से वसूल नहीं की जा सकती, यह व्यवसाय के लिए हानि है।", "वाईट देणी म्हणजे देनदाराकडून वसूल न होणारी रक्कम, व्यवसायाचे नुकसान.", "Terminology", ["bad debts","irrecoverable"]);
  addQA("Define Solvent Person.", "A person whose assets are more than or equal to liabilities, capable to pay debts.", "साल्वेंट व्यक्ति वह है जिसकी संपत्तियाँ देनदारियों से अधिक या बराबर हों, कर्ज चुकाने में सक्षम।", "सॉल्वेंट व्यक्ती म्हणजे ज्याची मालमत्ता देण्यापेक्षा अधिक किंवा समान आहे, कर्ज फेडण्यास सक्षम.", "Terminology", ["solvent"]);
  addQA("Define Insolvent Person.", "A person whose liabilities exceed assets, unable to pay debts.", "दिवालिया व्यक्ति वह है जिसकी देनदारियाँ संपत्तियों से अधिक हों, कर्ज नहीं चुका सकता।", "दिवाळखोर व्यक्ती म्हणजे ज्याची देणी मालमत्तेपेक्षा जास्त आहेत, कर्ज फेडू शकत नाही.", "Terminology", ["insolvent"]);
  addQA("What is Profit?", "Profit is excess of income over expenses, increases capital.", "लाभ आय का व्यय से अधिक होना है, इससे पूंजी बढ़ती है।", "नफा म्हणजे उत्पन्नाचा खर्चापेक्षा अधिक, भांडवल वाढवतो.", "Term", ["profit","gain"]);
  addQA("What is Loss?", "Loss is excess of expenses over income, reduces capital.", "हानि व्यय का आय से अधिक होना, पूंजी घटाती है।", "तोटा म्हणजे खर्चाचे उत्पन्नापेक्षा जास्त असणे, भांडवल कमी करते.", "Term", ["loss"]);
  addQA("What are Assets?", "Assets are properties or resources owned by business having monetary value.", "संपत्तियाँ व्यवसाय के स्वामित्व वाली वस्तुएं या संसाधन हैं जिनका मौद्रिक मूल्य होता है।", "मालमत्ता म्हणजे व्यवसायाच्या मालकीची संसाधने ज्यांचे आर्थिक मूल्य आहे.", "Accounting", ["assets"]);
  addQA("What are Liabilities?", "Liabilities are amounts payable by business to outsiders.", "देनदारियाँ वे राशियाँ हैं जो व्यवसाय को बाहरी लोगों को देय हैं।", "देणी म्हणजे व्यवसायाने बाहेरच्या व्यक्तींना द्यावयाची रक्कम.", "Accounting", ["liabilities","debts"]);
  addQA("What is Business Entity Concept?", "Business is separate from owner, records from business viewpoint.", "व्यवसाय इकाई अवधारणा: व्यवसाय मालिक से अलग है, लेखे व्यवसाय के दृष्टिकोण से बनते हैं।", "व्यवसाय इकाई संकल्पना: व्यवसाय मालकापासून वेगळा, लेखा व्यवसायाच्या दृष्टीकोनातून.", "Concept", ["entity concept"]);
  addQA("What is Money Measurement Concept?", "Only transactions expressed in money are recorded.", "मुद्रा मापन अवधारणा: केवल मौद्रिक लेन-देन ही रिकॉर्ड किए जाते हैं।", "चलन मापन संकल्पना: फक्त आर्थिक व्यवहारांची नोंद केली जाते.", "Concept", ["money measurement"]);
  addQA("What is Conservatism Principle?", "Anticipate no profit, provide for all possible losses. Play safe.", "संरक्षणवाद सिद्धांत: कोई लाभ न दिखाएं, सभी संभावित हानियों का प्रावधान करें।", "जागरूकता तत्त्व: नफ्याची अपेक्षा न करता सर्व संभाव्य नुकसानीसाठी तरतूद करा.", "Concept", ["conservatism","prudence"]);
  addQA("What is Going Concern Concept?", "Business will continue for foreseeable future, assets at historical cost.", "चालू इकाई अवधारणा: व्यवसाय भविष्य में भी जारी रहेगा, संपत्तियाँ ऐतिहासिक लागत पर।", "चालू इकाई संकल्पना: व्यवसाय भविष्यातही सुरू राहील, मालमत्ता ऐतिहासिक किंमतीवर.", "Concept", ["going concern"]);
  addQA("What is Dual Aspect Concept?", "Every transaction has debit and credit equal. Assets = Capital + Liabilities.", "द्वैत पहलू अवधारणा: प्रत्येक लेन-देन का दोहरा प्रभाव, डेबिट = क्रेडिट।", "दुहेरी पैलू संकल्पना: प्रत्येक व्यवहाराचे दुहेरी परिणाम, नावे = जमा.", "Concept", ["dual aspect","double entry"]);
  addQA("What is AS-1?", "AS-1: Disclosure of Accounting Policies.", "AS-1: लेखांकन नीतियों का प्रकटीकरण।", "AS-1: लेखांकन धोरणांचे प्रकटीकरण.", "Accounting Standard", ["as-1"]);
  addQA("What is AS-3?", "AS-3: Cash Flow Statements.", "AS-3: रोकड़ प्रवाह विवरण।", "AS-3: रोख प्रवाह विवरण.", "Standard", ["as-3","cash flow"]);
  addQA("What is AS-6?", "AS-6: Depreciation Accounting.", "AS-6: मूल्यह्रास लेखांकन।", "AS-6: घसारा लेखांकन.", "Standard", ["as-6","depreciation"]);
  addQA("What is AS-9?", "AS-9: Revenue Recognition.", "AS-9: राजस्व मान्यता।", "AS-9: महसूल मान्यता.", "Standard", ["as-9","revenue"]);
  addQA("What is IFRS?", "International Financial Reporting Standards by IASB for global uniformity.", "अंतर्राष्ट्रीय वित्तीय रिपोर्टिंग मानक (IFRS) IASB द्वारा वैश्विक एकरूपता के लिए।", "आंतरराष्ट्रीय आर्थिक अहवाल मानके (IFRS) जागतिक एकरूपतेसाठी.", "Advanced", ["ifrs"]);
  addQA("Difference between Book-keeping and Accountancy?", "Book-keeping: recording, classifying. Accountancy: summarizing, analyzing, interpreting.", "बुक-कीपिंग: रिकॉर्डिंग, वर्गीकरण। लेखांकन: सारांश, विश्लेषण, व्याख्या।", "बुक-कीपिंग: नोंद, वर्गीकरण. लेखांकन: सारांश, विश्लेषण, अर्थ लावणे.", "Difference", ["difference"]);
  addQA("What is Cash Basis?", "Records actual cash receipts & payments.", "रोकड़ आधार: वास्तविक रोकड़ प्राप्तियाँ और भुगतान रिकॉर्ड किए जाते हैं।", "रोख आधार: प्रत्यक्ष रोख प्राप्ती व देय रेकॉर्ड.", "Method", ["cash basis"]);
  addQA("What is Accrual Basis?", "Revenue when earned, expenses when incurred, irrespective of cash.", "उपार्जन आधार: आय अर्जित होने पर, व्यय होने पर, रोकड़ से स्वतंत्र।", "जमा आधार: मिळकत मिळाल्यावर, खर्च झाल्यावर, रोकड लेन-देन पर्यंत नाही.", "Method", ["accrual basis","mercantile"]);
  addQA("What is Trade Discount?", "Discount on list price, not recorded separately.", "व्यापार छूट: सूची मूल्य पर छूट, अलग से रिकॉर्ड नहीं।", "व्यापार सवलत: यादी किमतीवरील सवलत, वेगळी नोंद नाही.", "Term", ["trade discount"]);
  addQA("What is Cash Discount?", "Discount for prompt payment, appears in books.", "रोकड़ छूट: शीघ्र भुगतान के लिए छूट, पुस्तकों में दिखती है।", "रोख सवलत: त्वरित देयकासाठी सवलत, पुस्तकात दिसते.", "Term", ["cash discount"]);
  addQA("What is Deferred Revenue Expenditure?", "Revenue in nature but benefit extends beyond one year, written off over years.", "आस्थगित राजस्व व्यय: प्रकृति में राजस्व लेकिन लाभ एक वर्ष से अधिक, कई वर्षों में अपलिखित।", "स्थगित महसूल खर्च: स्वरूपात महसूल पण लाभ एक वर्षापेक्षा अधिक, अनेक वर्षात लिहून काढला जातो.", "Advanced", ["deferred revenue"]);
  addQA("What is Contingent Liability?", "Liability dependent on future event, shown as footnote.", "आकस्मिक दायित्व: भविष्य की घटना पर निर्भर दायित्व, फुटनोट के रूप में दिखाया जाता है।", "आकस्मिक दायित्व: भविष्यातील घटनेवर अवलंबून, तळटीप म्हणून दर्शविले जाते.", "Advanced", ["contingent liability"]);

  // Additional MCQs and Fill in blanks (from PDF exercises)
  addQA("Surplus of income over expenses is?", "Profit", "लाभ", "नफा", "MCQ", ["profit surplus"]);
  addQA("Amount not recoverable from customer is?", "Bad Debts", "अशोध्य ऋण", "वाईट देणी", "MCQ", ["bad debts rec"]);
  addQA("Which concept requires full disclosure of material information?", "Disclosure Concept", "प्रकटीकरण अवधारणा", "प्रकटीकरण संकल्पना", "Concept", ["disclosure"]);
  addQA("Cash flow statement is prepared as per which AS?", "AS-3", "एएस-३", "AS-3", "Standard", ["as3"]);
  addQA("Totalling of Journal or Ledger is called?", "Casting", "कास्टिंग (जोड़)", "कास्टिंग (बेरीज)", "Term", ["casting"]);
  addQA("Excess of gross profit over operating expenses is?", "Net Profit", "शुद्ध लाभ", "निव्वळ नफा", "Term", ["net profit"]);

  // True/False statements with complete answers
  addQA("Is Bank Overdraft an asset?", "False. Bank Overdraft is a liability.", "गलत, बैंक ओवरड्राफ्ट दायित्व है।", "चुकीचे, बँक ओव्हरड्राफ्ट ही देणी आहे.", "True/False", ["overdraft asset"]);
  addQA("Solvent person means assets > liabilities?", "True. Solvent person has assets more than or equal to liabilities.", "सही, साल्वेंट व्यक्ति की संपत्तियाँ देनदारियों से अधिक या बराबर।", "बरोबर, सॉल्वेंट व्यक्तीची मालमत्ता देण्यापेक्षा जास्त किंवा समान.", "True/False", ["solvent meaning"]);
  addQA("Cash discount appears in books?", "True. Cash discount (allowed/received) is recorded.", "सही, रोकड़ छूट पुस्तकों में दर्ज की जाती है।", "बरोबर, रोख सवलत (दिलेली/मिळालेली) नोंदविली जाते.", "True/False", ["cash discount entry"]);
  addQA("Accounting is useful only to owner?", "False. Useful to many: govt, investors, creditors.", "गलत, यह कई हितधारकों के लिए उपयोगी है।", "चुकीचे, हे अनेकांसाठी उपयुक्त आहे.", "True/False", ["accounting users"]);

  // also more definitions
  addQA("What is Accounting?", "Accounting is recording, classifying, summarizing, and interpreting financial transactions.", "लेखांकन वित्तीय लेन-देन को रिकॉर्ड, वर्गीकृत, सारांशित और व्याख्या करने की प्रक्रिया है।", "लेखांकन म्हणजे आर्थिक व्यवहारांची नोंद, वर्गीकरण, सारांश आणि अर्थ लावणे.", "Definition", ["accounting"]);
  addQA("What are Fixed Assets?", "Long-term assets like land, machinery, goodwill.", "स्थायी संपत्तियाँ: भूमि, मशीनरी, गुडविल।", "स्थायी मालमत्ता: जमीन, यंत्रसामग्री, गुडविल.", "Accounting", ["fixed assets"]);
  addQA("What are Current Assets?", "Short-term assets like debtors, stock, cash.", "चालू संपत्तियाँ: देनदार, स्टॉक, रोकड़।", "चालू मालमत्ता: देनदार, स्टॉक, रोख.", "Accounting", ["current assets"]);

  // search & suggestions
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(query) {
    if (!query.trim()) return [];
    const lower = query.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) ||
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(kw => kw.includes(lower) || lower.includes(kw))
    ).slice(0, 8);
  }

  function updateSuggestions() {
    const query = searchInput.value;
    if (!query.trim()) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(query);
    if (!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>📘</span> <strong>${item.question.substring(0, 70)}${item.question.length > 70 ? "…" : ""}</strong> <span style="margin-left:auto; background:#e2e8f0; padding:2px 10px; border-radius:20px; font-size:12px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(queryText = null) {
    let query = (queryText !== null) ? queryText : searchInput.value;
    query = query.trim();
    if (!query) {
      resultsContainer.innerHTML = `<div class="not-found">🔍 कोई भी कीवर्ड टाइप करें: Capital, Goods, AS-3, Conservatism, Drawings</div>`;
      return;
    }
    const matches = getMatches(query);
    if (!matches.length) {
      resultsContainer.innerHTML = `<div class="not-found">❌ "${query}" से संबंधित कोई प्रश्न नहीं मिला। Try: Goodwill, Dual Aspect, Bad Debts</div>`;
      return;
    }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">${item.category}</div>
        <h3>📖 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ उत्तर / Answer:</strong><br>${escapeHtml(item.answer)}</div>
        <div class="action-buttons">
          <button class="langBtn" data-q="${escapeAttr(item.question)}" data-ans="${escapeAttr(item.answer)}" data-hi="${escapeAttr(item.hindi)}" data-mr="${escapeAttr(item.marathi)}">🌐 हिंदी / मराठी अनुवाद</button>
          <button class="detBtn" data-q="${escapeAttr(item.question)}" data-ans="${escapeAttr(item.answer)}" data-cat="${escapeAttr(item.category)}">📘 विस्तृत उत्तर (Detailed)</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachButtonEvents();
  }

  function attachButtonEvents() {
    document.querySelectorAll(".langBtn").forEach(btn => {
      btn.removeEventListener("click", langHandler);
      btn.addEventListener("click", langHandler);
    });
    document.querySelectorAll(".detBtn").forEach(btn => {
      btn.removeEventListener("click", detailHandler);
      btn.addEventListener("click", detailHandler);
    });
  }

  function langHandler(e) {
    const btn = e.currentTarget;
    const question = btn.getAttribute("data-q");
    const answer = btn.getAttribute("data-ans");
    const hindiText = btn.getAttribute("data-hi");
    const marathiText = btn.getAttribute("data-mr");
    showLanguagePopup(question, answer, hindiText, marathiText);
  }

  function detailHandler(e) {
    const btn = e.currentTarget;
    const question = btn.getAttribute("data-q");
    const answer = btn.getAttribute("data-ans");
    const category = btn.getAttribute("data-cat");
    showDetailPopup(question, answer, category);
  }

  function showLanguagePopup(question, answer, hindiAns, marathiAns) {
    const modal = document.getElementById("popupModal");
    const modalContent = document.getElementById("modalContent");
    modalContent.innerHTML = `
      <h2 style="color:#1e40af;">🌐 भाषा अनुवाद / Language Translations</h2>
      <div class="lang-section"><strong>❓ प्रश्न:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>🇮🇳 हिंदी (Hindi):</strong><br>${escapeHtml(hindiAns || answer)}</div>
      <div class="lang-section"><strong>🇮🇳 मराठी (Marathi):</strong><br>${escapeHtml(marathiAns || answer)}</div>
      <button id="closeLangModal" style="background:#2563eb; border:none; padding:10px 24px; border-radius:40px; color:white; margin-top:6px;">बंद करें / Close</button>
    `;
    modal.style.display = "flex";
    document.getElementById("closeLangModal").addEventListener("click", () => modal.style.display = "none");
  }

  function showDetailPopup(question, answer, category) {
    const modal = document.getElementById("popupModal");
    const modalContent = document.getElementById("modalContent");
    let extra = `<div class="lang-section"><strong>📚 Textbook Reference:</strong> 11th BK Chapter 1 - Introduction to Book-keeping and Accountancy (Page extracts).</div>`;
    if(category === "Accounting Standard") extra += `<div class="lang-section">🔖 ICAI issued AS for uniformity. Helps in comparability.</div>`;
    modalContent.innerHTML = `
      <h2 class="detail-title">📘 विस्तृत उत्तर / Detailed Answer</h2>
      <div class="lang-section"><strong>❓ प्रश्न:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ उत्तर:</strong><br>${escapeHtml(answer)}</div>
      ${extra}
      <button id="closeDetailModal" style="background:#1e40af; border:none; padding:10px 24px; border-radius:40px; color:white;">बंद करें</button>
    `;
    modal.style.display = "flex";
    document.getElementById("closeDetailModal").addEventListener("click", () => modal.style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function escapeAttr(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  function startVoice() {
    if (!('webkitSpeechRecognition' in window)) { alert("Voice not supported."); return; }
    const recognition = new webkitSpeechRecognition();
    recognition.lang = "en-IN";
    recognition.start();
    recognition.onresult = (e) => {
      const spoken = e.results[0][0].transcript;
      searchInput.value = spoken;
      performSearch(spoken);
    };
  }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if (!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.addEventListener("load", () => {
    resultsContainer.innerHTML = `<div class="not-found">✨ पूर्ण पाठ्यक्रम | ${qaDatabase.length}+ Questions with Hindi/Marathi ✨<br>उदाहरण: Capital, Drawings, AS-6, Conservatism, Goods</div>`;
  });
</script>
</body>
</html>
