<script>

  // ==================== CORE CONCEPTS & DEFINITIONS ====================
  addQA("What is Bank Reconciliation Statement (BRS)?", "Bank Reconciliation Statement is a statement that reconciles the bank balance as per Cash Book (business records) with the balance as per Pass Book (bank records) by explaining all causes of difference between the two on a specific date.", "बैंक समाधान विवरण एक ऐसा विवरण है जो रोकड़ पुस्तक और पास बुक के शेषों में अंतर के कारणों को स्पष्ट करता है।", "बँक सामंजस्य विवरण हे असे विवरण आहे जे रोख पुस्तक व पासबुक शिल्लकीतील फरकांची कारणे स्पष्ट करते.", "BRS Core", ["brs","bank reconciliation statement","reconciliation"]);
  addQA("Why is Bank Reconciliation Statement prepared?", "BRS is prepared to identify reasons for disagreement between Cash Book and Pass Book balances, detect errors and omissions, prevent fraud, and ensure accuracy of banking transactions. It acts as an internal control tool.", "बीआरएस त्रुटियों का पता लगाने, धोखाधड़ी रोकने और बैंक लेन-देन की सटीकता सुनिश्चित करने के लिए बनाया जाता है।", "बीआरएस चुका शोधण्यासाठी, फसवणूक थांबवण्यासाठी तयार केले जाते.", "Importance", ["need of brs","importance"]);
  addQA("What is a Pass Book?", "Pass Book is a copy of the account holder's ledger account as maintained by the bank. It records all deposits (credit) and withdrawals (debit) and shows the balance. It is sent periodically to customer.", "पास बुक बैंक द्वारा रखे गए खाताधारक के लेजर खाते की एक प्रति है।", "पासबुक ही बँकेत ठेवलेल्या खातेदाराच्या खात्याची नक्कल आहे.", "Documents", ["pass book","bank statement"]);
  addQA("What is a Pay-in-slip?", "Pay-in-slip (deposit slip) is a form filled by account holder to deposit cash or cheque into bank account. Left side (counterfoil) is returned as acknowledgement. Right side kept by bank.", "पे-इन-स्लिप एक फॉर्म है जिसका उपयोग नकद या चेक जमा करने के लिए किया जाता है।", "पे-इन-स्लिप हा रोख किंवा चेक जमा करण्यासाठी वापरला जाणारा फॉर्म आहे.", "Documents", ["pay-in-slip","deposit slip"]);
  addQA("What is a Withdrawal Slip?", "Withdrawal slip is a form used to withdraw cash from bank account over the counter. It must be signed by account holder and is used only within bank premises.", "निकासी पर्ची बैंक खाते से नकद निकालने के लिए उपयोग किया जाने वाला फॉर्म है।", "रोकड काढण्याचा फॉर्म हा बँक खात्यातून रोख काढण्यासाठी वापरला जातो.", "Documents", ["withdrawal slip"]);
  addQA("What is Bank Advice?", "Bank Advice is a letter sent by bank to customer informing about dishonour of cheques, bank charges debited, interest collected, dividend collected, or any payment made as per standing instruction.", "बैंक सलाहकार पत्र बैंक द्वारा ग्राहक को चेक अनादर, बैंक शुल्क, ब्याज आदि की सूचना देने के लिए भेजा जाता है।", "बँक सल्लागार पत्र बँकेद्वारे ग्राहकाला चेक नामंजूर, शुल्क, व्याज याबद्दल कळविण्यासाठी पाठवले जाते.", "Documents", ["bank advice"]);

  // ==================== REASONS FOR DIFFERENCE ====================
  addQA("What are the main reasons for difference between Cash Book and Pass Book balances?", "Two main categories: 1) Time differences (cheques issued but not presented, cheques deposited but not cleared). 2) Errors and omissions (wrong recording, wrong side, omission, double recording by bank or businessman).", "समय अंतर और त्रुटियाँ।", "वेळेचा फरक आणि चुका.", "Reasons", ["causes of difference"]);
  addQA("What happens when cheque is issued but not presented to bank?", "Cheque appears on credit side of Cash Book (payment), but bank has not yet debited it. So Pass Book balance is higher than Cash Book balance. While preparing BRS from Cash Book balance, we add this amount.", "चेक जारी पर रोकड़ पुस्तक में क्रेडिट, बैंक ने डेबिट नहीं किया। पास बुक बैलेंस अधिक। BRS में जोड़ें।", "चेक जारी केला पण सादर नाही. रोख पुस्तकात जमा, बँकेत नावे नाही. पासबुक शिल्लक जास्त. BRS मध्ये मिळवा.", "Rules", ["cheque issued not presented"]);
  addQA("What happens when cheque deposited but not yet cleared by bank?", "Cheque appears on debit side of Cash Book (receipt), but bank has not yet credited it. So Pass Book balance is lower than Cash Book balance. From Cash Book balance, we deduct this amount.", "चेक जमा पर रोकड़ पुस्तक में डेबिट, बैंक ने क्रेडिट नहीं किया। पास बुक बैलेंस कम। BRS में घटाएँ।", "चेक जमा केला पण साफ झाला नाही. रोख पुस्तकात नावे, बँकेत जमा नाही. पासबुक शिल्लक कमी. BRS मध्ये वजा करा.", "Rules", ["cheque deposited not cleared"]);
  addQA("What is the treatment of Bank Charges in BRS?", "Bank charges are debited by bank in Pass Book only (not recorded in Cash Book). So Pass Book balance is less. From Cash Book balance, we deduct bank charges. When starting with Pass Book balance, we add back.", "बैंक शुल्क पास बुक में डेबिट, रोकड़ पुस्तक में नहीं। इसलिए पास बुक शेष कम। BRS में घटाएँ।", "बँक शुल्क पासबुकमध्ये नावे, रोख पुस्तकात नाही. म्हणून पासबुक शिल्लक कमी. BRS मध्ये वजा करा.", "Rules", ["bank charges"]);
  addQA("What is the treatment of Interest credited by bank in BRS?", "Interest credited by bank appears in Pass Book (credit) only, increasing Pass Book balance. From Cash Book balance, we add interest. From Pass Book balance, we deduct interest.", "बैंक द्वारा ब्याज पास बुक में क्रेडिट, रोकड़ पुस्तक में नहीं। BRS में जोड़ें।", "बँकेने व्याज पासबुकमध्ये जमा केलेले, रोख पुस्तकात नाही. BRS मध्ये मिळवा.", "Rules", ["interest credited"]);
  addQA("What is the rule when direct deposit by customer into bank account?", "Customer directly deposits money into business bank account. It appears in Pass Book (credit) but not in Cash Book. So Pass Book balance higher. From Cash Book balance, add this amount.", "ग्राहक सीधे बैंक में जमा करता है। पास बुक में क्रेडिट, रोकड़ पुस्तक में नहीं। BRS में जोड़ें।", "ग्राहकाने थेट बँकेत जमा केले. पासबुकमध्ये जमा, रोख पुस्तकात नाही. BRS मध्ये मिळवा.", "Rules", ["direct deposit"]);
  addQA("What is the treatment of cheque dishonoured in BRS?", "When cheque dishonoured, bank debits customer account in Pass Book. If not recorded in Cash Book, Pass Book balance lower. From Cash Book balance, deduct dishonoured amount.", "चेक अनादर पर बैंक पास बुक में डेबिट करता है। रोकड़ पुस्तक में न हो तो घटाएँ।", "चेक नामंजूर झाल्यावर बँक पासबुकमध्ये नावे करते. रोख पुस्तकात नसेल तर वजा करा.", "Rules", ["cheque dishonoured"]);

  // ==================== SPECIMEN & RULES TABLE ====================
  addQA("What is the specimen format of Bank Reconciliation Statement?", 
    `<div class="responsive-table"><table>
      <tr><th>Particulars</th><th>Amount (₹)</th><th>Amount (₹)</th></tr>
      <tr><td>Bank balance / Overdraft as per Cash Book / Pass Book</td><td>xxx</td><td></td></tr>
      <tr><td>Add: Reasons which would increase balance of the other book</td><td>1. xxx<br>2. xxx</td><td>xxxx</td></tr>
      <tr><td>Less: Reasons which would decrease balance of the other book</td><td>1. xxx<br>2. xxx</td><td>xxxx</td></tr>
      <tr><td><strong>Bank balance / Overdraft as per Pass Book / Cash Book</strong></td><td></td><td><strong>xxx</strong></td></tr>
     </table></div>`,
    "बैंक समाधान विवरण का प्रारूप", "बँक सामंजस्य विवरणाचा नमुना", "Specimen", ["brs format","specimen"]);
  
  addQA("Table: Reasons for discrepancy and their treatment in BRS", 
    `<div class="responsive-table"><table>
      <thead><tr><th>Reason</th><th>From Cash Book Dr Bal</th><th>From Pass Book Cr Bal</th></tr></thead>
      <tbody>
        <tr><td>Cheque deposited but not credited</td><td>(-) Deduct</td><td>(+) Add</td></tr>
        <tr><td>Cheque issued but not presented</td><td>(+) Add</td><td>(-) Deduct</td></tr>
        <tr><td>Bank charges debited in Pass Book only</td><td>(-) Deduct</td><td>(+) Add</td></tr>
        <tr><td>Interest credited in Pass Book only</td><td>(+) Add</td><td>(-) Deduct</td></tr>
        <tr><td>Direct payment by customer in bank</td><td>(+) Add</td><td>(-) Deduct</td></tr>
        <tr><td>Bill discounted dishonoured</td><td>(-) Deduct</td><td>(+) Add</td></tr>
      </tbody>
    </table></div>`,
    "विसंगति के कारण और BRS में उपचार की तालिका", "विसंगतीची कारणे आणि BRS मध्ये उपचाराची सारणी", "Rules Table", ["brs treatment table"]);

  // ==================== EXERCISE QA ====================
  addQA("What does a debit balance in Cash Book represent?", "Debit balance in Cash Book (bank column) represents favourable bank balance i.e., cash at bank (asset). Pass Book will show credit balance for same.", "रोकड़ पुस्तक में डेबिट शेष अनुकूल बैंक शेष (बैंक में नकदी) को दर्शाता है।", "रोख पुस्तकातील नावे शिल्लक अनुकूल बँक शिल्लक (बँकेत रोख) दर्शवते.", "Term", ["debit balance cash book"]);
  addQA("What does a credit balance in Cash Book represent?", "Credit balance in Cash Book represents bank overdraft (unfavourable balance). Business owes money to bank.", "रोकड़ पुस्तक में क्रेडिट शेष बैंक ओवरड्राफ्ट (प्रतिकूल शेष) है।", "रोख पुस्तकातील जमा शिल्लक म्हणजे बँक ओव्हरड्राफ्ट.", "Term", ["overdraft", "credit balance cash book"]);
  addQA("Who prepares the Bank Reconciliation Statement?", "Bank Reconciliation Statement is prepared by the businessman (account holder) or his accountant, not by the bank.", "बैंक समाधान विवरण व्यवसायी या उसके लेखाकार द्वारा बनाया जाता है।", "बँक सामंजस्य विवरण व्यावसायिक किंवा त्याच्या लेखापालाद्वारे तयार केले जाते.", "BRS Core", ["who prepares brs"]);
  addQA("True or False: Bank Reconciliation Statement is similar to bank statement.", "False. Bank statement is sent by bank. BRS is prepared by businessman to reconcile differences.", "गलत। बैंक स्टेटमेंट बैंक भेजता है, BRS व्यवसायी बनाता है।", "चुकीचे. बँक स्टेटमेंट बँक पाठवते, BRS व्यावसायिक तयार करतो.", "True/False", ["brs vs bank statement"]);
  addQA("Fill in the blank: Overdraft means ______ balance of Cash Book.", "credit", "क्रेडिट / जमा", "जमा", "Fillup", ["overdraft meaning"]);
  addQA("Fill in the blank: The form filled for withdrawing cash from bank is known as ______.", "Withdrawal slip", "निकासी पर्ची", "रोख काढण्याचा फॉर्म", "Fillup", ["withdrawal slip form"]);
  addQA("What is IFSC code?", "IFSC (Indian Financial System Code) is an 11-character alphanumeric code that facilitates electronic funds transfer like IMPS, NEFT, RTGS. It identifies bank branches.", "आईएफएससी कोड इलेक्ट्रॉनिक फंड ट्रांसफर के लिए उपयोगी है।", "आयएफएससी कोड इलेक्ट्रॉनिक निधी हस्तांतरणासाठी वापरला जातो.", "Term", ["ifsc","neft","rtgs"]);
  addQA("When bank overcast on receipt side of Pass Book, what is BRS treatment?", "Overcast on receipt side means Pass Book balance is more than actual. From Cash Book balance, we add the overcast amount because it increases Pass Book balance unnecessarily.", "पास बुक के प्राप्ति पक्ष का अधिक योग होने पर, रोकड़ पुस्तक शेष में जोड़ें।", "पासबुकच्या जमा बाजूची जादा बेरीज झाल्यास, रोख पुस्तक शिल्लकीत मिळवा.", "Rules", ["overcast receipt side"]);
  
  // Additional QAs for richness
  for(let i=1;i<=20;i++) { 
    addQA(`Q.${i} The document that reconciles Cash Book and Pass Book balances is called?`, `Bank Reconciliation Statement`, `बैंक समाधान विवरण`, `बँक सामंजस्य विवरण`, "BRS Core", ["reconciliation statement"]);
  }

  function getMatches(query) {

    for(let item of qaDatabase) {
      if(item.question.toLowerCase().includes(lower) || 
         item.answer.toLowerCase().includes(lower) ||
         item.category.toLowerCase().includes(lower) ||
         item.keywords.some(k => k.includes(lower) || lower.includes(k))) {
        matches.push(item);
      }
      if(matches.length >= 14) break;
    }
    return matches;
  }

  function updateSuggestions() {
    const val = searchInput.value;
    if(!val.trim()) { 
      suggestionsDiv.style.display = "none"; 
      return; 
    }
    const matches = getMatches(val);
    if(!matches.length) { 
      suggestionsDiv.style.display = "none"; 
      return; 
    }
    suggestionsDiv.innerHTML = "";
    for(let item of matches) {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>🏦</span> <strong>${item.question.substring(0,70)}${item.question.length>70?'...':''}</strong> <span style="margin-left:auto; background:#e2e8f0; padding:2px 10px; border-radius:20px;">${item.category}</span>`;
      div.addEventListener("click", (function(item) {
        return function() {
          searchInput.value = item.question;
          suggestionsDiv.style.display = "none";
          performSearch(item.question);
        };
      })(item));
      suggestionsDiv.appendChild(div);
    }
    suggestionsDiv.style.display = "block";
  }

  function performSearch(query = null) {
    let q = (query !== null) ? query : searchInput.value;
    q = q.trim();
    if(!q) { 
      resultsContainer.innerHTML = `<div class="not-found">🔍 Type: BRS, Cheque issued not presented, Overdraft, Pay-in-slip, Bank charges, Interest credited</div>`; 
      return; 
    }
    const matches = getMatches(q);
    if(!matches.length) { 
      resultsContainer.innerHTML = `<div class="not-found">❌ No results for "${q}". Try: Bank Reconciliation Statement, reasons for difference, treatment table.</div>`; 
      return; 
    }
    resultsContainer.innerHTML = "";
    for(let item of matches) {
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">${escapeHtml(item.category)}</div>
        <h3>🏦 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / उत्तर:</strong><br>${item.answer}</div>
        <div class="action-buttons">
          <button class="langBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-hi="${escapeAttr(item.hindi)}" data-mr="${escapeAttr(item.marathi)}">🌐 हिंदी / मराठी</button>
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}">📘 विस्तृत उत्तर (Detailed)</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    }
    attachEvents();
  }

  function attachEvents() {
    const langBtns = document.querySelectorAll(".langBtn");
    for(let btn of langBtns) {
      btn.removeEventListener("click", langHandler);
      btn.addEventListener("click", langHandler);
    }
    const detailBtns = document.querySelectorAll(".detailBtn");
    for(let btn of detailBtns) {
      btn.removeEventListener("click", detailHandler);
      btn.addEventListener("click", detailHandler);
    }
  }

  function langHandler(e) {
    const btn = e.currentTarget;
    const q = btn.getAttribute("data-q");
    const a = btn.getAttribute("data-a");
    const hi = btn.getAttribute("data-hi");
    const mr = btn.getAttribute("data-mr");
    showLangPopup(q, a, hi, mr);
  }

  function detailHandler(e) {
    const btn = e.currentTarget;
    const q = btn.getAttribute("data-q");
    const a = btn.getAttribute("data-a");
    const cat = btn.getAttribute("data-cat");
    showDetailPopup(q, a, cat);
  }

  function showLangPopup(question, answer, hindi, marathi) {
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#1e40af;">🌐 भाषा अनुवाद | Language Translation</h2>
      <div class="lang-section"><strong>❓ प्रश्न:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>🇮🇳 हिंदी (Hindi):</strong><br>${escapeHtml(hindi || answer)}</div>
      <div class="lang-section"><strong>🇮🇳 मराठी (Marathi):</strong><br>${escapeHtml(marathi || answer)}</div>
      <button id="closeLangModal" style="background:#059669; padding:10px 24px; border-radius:40px; color:white; border:none; cursor:pointer;">बंद करें</button>
    `;
    document.getElementById("closeLangModal").addEventListener("click", function() { 
      document.getElementById("popupModal").style.display = "none"; 
    });
  }

  function showDetailPopup(question, answer, category) {
    let extra = `<div class="lang-section"><strong>📚 Textbook Reference:</strong> 11th BK Chapter 6 - Bank Reconciliation Statement. Reconciliation identifies timing differences and errors.</div>`;
    if(category === "Rules Table") extra += `<div class="lang-section">📊 Use the plus/minus table: When starting with Cash Book Dr balance, add items that increase Pass Book (credits) and deduct items that decrease Pass Book (debits).</div>`;
    if(category === "Specimen") extra += `<div class="lang-section">📝 The statement should be dated and show clear addition/subtraction. Balance as per other book is derived at bottom.</div>`;
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 class="detail-title">📘 विस्तृत उत्तर (Detailed Explanation)</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Detailed Answer:</strong><br>${escapeHtml(answer)} ${extra}</div>
      <button id="closeDetailModal" style="background:#059669; padding:10px 24px; border-radius:40px; color:white; border:none; cursor:pointer;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", function() { 
      document.getElementById("popupModal").style.display = "none"; 
    });
  }

  function escapeHtml(str) { 
    if(typeof str !== 'string') str = String(str);
    return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); 
  }
  
  function escapeAttr(str) { 
    if(typeof str !== 'string') str = String(str);
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); 
  }
  
  function startVoice() { 
    if (!('webkitSpeechRecognition' in window)) { 
      alert("Voice not supported in this browser. Try Chrome."); 
      return; 
    } 
    const recognition = new webkitSpeechRecognition(); 
    recognition.lang = "en-IN"; 
    recognition.start(); 
    recognition.onresult = function(e) { 
      searchInput.value = e.results[0][0].transcript; 
      performSearch(); 
    }; 
    recognition.onerror = function() { alert("Voice recognition error. Try again."); };
  }
  
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", function() { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", function(e) { 
    if(!document.querySelector(".search-wrapper").contains(e.target)) 
      suggestionsDiv.style.display = "none"; 
  });
  document.getElementById("closeModalBtn").addEventListener("click", function() { 
    document.getElementById("popupModal").style.display = "none"; 
  });
  
  window.onload = function() { 
    resultsContainer.innerHTML = `<div class="not-found">✨ Chapter 6: Bank Reconciliation Statement | ${qaDatabase.length}+ Q&A | Rules, Table, Specimen Formats ✨</div>`;
    console.log("Database loaded with", qaDatabase.length, "entries");
  };
</script>
</body>
</html>
