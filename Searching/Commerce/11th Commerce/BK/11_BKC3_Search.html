<script>
  // ------------------- COMPLETE Q&A DATABASE FROM CHAPTER 3 (JOURNAL) -------------------
  const qaDatabase = [];

  function addQA(question, answer, hindi, marathi, category, keywords = []) {
    qaDatabase.push({ id: qaDatabase.length+1, question, answer, hindi, marathi, category, keywords: keywords.map(k=>k.toLowerCase()) });
  }

  // ---------- CORE CONCEPTS (Journal, Narration, GST, Voucher) ----------
  addQA("What is Journal?", "Journal is a book of original entry (primary entry) where all business transactions are recorded chronologically (date-wise) before posting to Ledger. The word 'Journal' comes from French word 'JOUR' meaning 'day'. It contains daily record of transactions with debit, credit and narration.", "जर्नल मूल प्रविष्टि की पुस्तक है जहाँ सभी व्यावसायिक लेन-देन कालानुक्रमिक रूप से दर्ज किए जाते हैं।", "जर्नल ही मूळ नोंदवही आहे जिथे सर्व व्यवहार तारखेनुसार नोंदवले जातात.", "Core", ["journal","book of original entry"]);
  addQA("What is Narration?", "Narration is a brief explanation of the Journal Entry written just below the entry in brackets. It begins with the word 'Being'. It explains the nature of transaction and increases clarity.", "नैरेशन जर्नल प्रविष्टि के नीचे कोष्ठक में लिखी गई संक्षिप्त व्याख्या है। यह 'Being' शब्द से शुरू होती है।", "निवेदन म्हणजे जर्नल नोंदीखाली कंसात लिहिलेला संक्षिप्त स्पष्टीकरण.", "Term", ["narration","being"]);
  addQA("What is GST? When was it imposed in India?", "GST (Goods and Service Tax) is 'One Nation, One Tax, One Market' implemented from 1st July 2017. It subsumed multiple taxes like Excise Duty, VAT, Service Tax, Octroi etc. GST has 5 slabs: 0%, 5%, 12%, 18%, 28%.", "जीएसटी एक राष्ट्र, एक कर, एक बाजार है। 1 जुलाई 2017 से लागू।", "GST म्हणजे वस्तू व सेवा कर. 1 जुलै 2017 पासून लागू.", "GST", ["gst","goods service tax","2017"]);
  addQA("What is a Voucher? Types of vouchers?", "Voucher is a legal document supporting a payment or receipt. Types: Internal Voucher (prepared internally like taxi fare) and External Voucher (received from outside like tax invoice). Journal voucher is basic for journalising.", "वाउचर भुगतान या प्राप्ति का कानूनी दस्तावेज है। आंतरिक और बाहरी वाउचर।", "व्हाउचर हा पैसे दिल्याचा किंवा मिळाल्याचा कायदेशीर पुरावा आहे.", "Documents", ["voucher","internal voucher","external voucher"]);
  addQA("What is a Tax Invoice?", "Tax Invoice is a document prepared by seller showing quantity, rate, HSN/SAC, CGST, SGST, total amount. It is Purchase Invoice for buyer and Sales Invoice for seller. Mandatory for GST registered dealers.", "टैक्स इनवॉइस विक्रेता द्वारा तैयार दस्तावेज है जिसमें CGST, SGST दिखाया जाता है।", "कर बीजक विक्रेता तयार करतो, त्यात CGST व SGST दाखवले जातात.", "Documents", ["tax invoice","purchase invoice","sales invoice"]);
  addQA("What is a Receipt?", "Receipt is a document acknowledging payment received. It is prepared when payment is made on future date. It contains receiver's signature, amount, date, mode of payment. Basis for entry in Cash Book.", "रसीद भुगतान प्राप्त होने की पुष्टि करने वाला दस्तावेज है।", "पावती म्हणजे पैसे मिळाल्याची पोच.", "Documents", ["receipt","payment proof"]);
  addQA("What is a Cheque? Types of Cheques?", "Cheque is an order to bank to pay specified sum. Types: 1) Bearer Cheque (payable to anyone presenting), 2) Order Cheque (payable to specific person), 3) Crossed Cheque (deposit only, not cash at counter), 4) Account Payee Cheque (credits only to payee's account).", "चेक बैंक को निर्देश है। प्रकार: वाहक, आदेश, रेखांकित, खाता प्राप्य।", "चेक ही बँकेला पैसे देण्याची सूचना. प्रकार: वाहक, आदेश, आडवा, खाते प्राप्य.", "Banking", ["cheque","bearer cheque","crossed cheque"]);
  addQA("What is Cash Discount? Is it recorded?", "Cash Discount is concession given for prompt/early payment. It is always recorded in books. For buyer: Discount Received (gain) credited. For seller: Discount Allowed (loss) debited. Calculated after deducting Trade Discount.", "रोकड़ छूट शीघ्र भुगतान के लिए दी जाती है। यह पुस्तकों में दर्ज होती है।", "रोख सवलत त्वरित देयकासाठी दिली जाते. ही पुस्तकात नोंदवली जाते.", "Discount", ["cash discount","discount allowed","discount received"]);
  addQA("What is Trade Discount? Is it recorded?", "Trade Discount is allowance on list price (catalogue price) given to bulk buyers. It is NOT recorded separately in books. Only net amount (after discount) is recorded. Calculated as List Price × Trade Discount %", "व्यापार छूट सूची मूल्य पर दी जाती है। यह पुस्तकों में अलग से नहीं दिखाई जाती।", "व्यापार सवलत यादी किमतीवर दिली जाते. ही पुस्तकात वेगळी नोंदवत नाही.", "Discount", ["trade discount","list price"]);

  // ---------- ACCOUNTING DOCUMENTS & JOURNAL RULES ----------
  addQA("What is a Journal Voucher?", "Journal Voucher is the basic/original voucher on the basis of which transactions are journalised. It contains debit account, credit account, amount, narration, approval signatures.", "जर्नल वाउचर वह मूल वाउचर है जिसके आधार पर जर्नल प्रविष्टियाँ की जाती हैं।", "जर्नल व्हाउचर हे मूळ व्हाउचर आहे ज्यावरून जर्नल नोंदी केल्या जातात.", "Documents", ["journal voucher"]);
  addQA("What are the columns in Journal?", "Journal has 5 columns: 1) Date, 2) Particulars (with Debit account first, then Credit account after 'To', and Narration), 3) L.F. (Ledger Folio), 4) Debit Amount, 5) Credit Amount.", "जर्नल में 5 कॉलम होते हैं: तारीख, विवरण, खाता संख्या पृष्ठ, नामे राशि, जमा राशि।", "जर्नलमध्ये ५ स्तंभ: दिनांक, तपशील, खातेवही पान क्र., नावे रक्कम, जमा रक्कम.", "Format", ["journal columns","specimen"]);
  addQA("What is Casting of Journal?", "Casting means totaling of Debit and Credit amount columns at the end of each page. Both totals must be equal to ensure arithmetical accuracy. 'Total c/f' (carried forward) is written to next page.", "कास्टिंग का अर्थ है जर्नल के डेबिट और क्रेडिट कॉलम का कुल योग निकालना।", "कास्टिंग म्हणजे नावे व जमा रकमेची बेरीज काढणे.", "Process", ["casting","total c/f"]);
  addQA("What is Journalising? Steps of Journalising?", "Journalising is the process of recording transactions in Journal. Steps: 1) Identify accounts involved, 2) Classify accounts (Personal, Real, Nominal), 3) Apply debit/credit rules, 4) Write date, debit account first, credit account with 'To', 5) Write narration, 6) Draw line after each entry.", "जर्नलाइजिंग जर्नल में लेन-देन दर्ज करने की प्रक्रिया है।", "जर्नलायझिंग म्हणजे व्यवहार जर्नलमध्ये नोंदवण्याची प्रक्रिया.", "Process", ["journalising","steps"]);

  // ---------- GOODS RELATED ENTRIES (Purchase, Sales, Returns) ----------
  addQA("What is the Journal Entry for Cash Purchase of Goods?", "Purchase A/c Dr. (Nominal – Debit all expenses) To Cash A/c (Real – Credit what goes out). Example: Purchased goods for cash ₹2,000 → Purchase A/c Dr. 2,000, To Cash A/c 2,000.", "नकद माल खरीद पर: क्रय खाता डेबिट, नकद खाता क्रेडिट।", "रोख खरेदीवर: खरेदी खाते नावे, रोख खाते जमा.", "Entry", ["cash purchase","purchase entry"]);
  addQA("What is the Journal Entry for Credit Purchase of Goods?", "Purchase A/c Dr. (Nominal) To Creditor's Personal A/c (Credit the giver). Example: Purchased goods from Sonali ₹15,000 on credit → Purchase A/c Dr. 15,000, To Sonali's A/c 15,000.", "उधार खरीद पर: क्रय खाता डेबिट, लेनदार का व्यक्तिगत खाता क्रेडिट।", "उधारी खरेदीवर: खरेदी खाते नावे, लेनदाराचे वैयक्तिक खाते जमा.", "Entry", ["credit purchase","purchase on credit"]);
  addQA("What is the Entry for Purchase Return (Return Outward)?", "Creditor's A/c Dr. (Personal – Debit the giver of benefit?) Actually: Creditor is debited because liability reduces. To Return Outward A/c (Nominal – Credit all incomes/gains). Example: Returned goods to Sonali ₹200 → Sonali's A/c Dr. 200, To Return Outward A/c 200.", "क्रय वापसी पर: लेनदार खाता डेबिट, क्रय वापसी खाता क्रेडिट।", "खरेदी परताव्यावर: लेनदार खाते नावे, खरेदी परत खाते जमा.", "Entry", ["purchase return","return outward"]);
  addQA("What is the Entry for Cash Sale of Goods?", "Cash A/c Dr. (Real – Debit what comes in) To Sales A/c (Nominal – Credit all incomes). Example: Sold goods for cash ₹5,000 → Cash A/c Dr. 5,000, To Sales A/c 5,000.", "नकद बिक्री पर: रोकड़ खाता डेबिट, बिक्री खाता क्रेडिट।", "रोख विक्रीवर: रोख खाते नावे, विक्री खाते जमा.", "Entry", ["cash sale"]);
  addQA("What is the Entry for Credit Sale of Goods?", "Debtor's A/c Dr. (Personal – Debit the receiver) To Sales A/c (Nominal). Example: Sold goods to Govind ₹30,000 on credit → Govind's A/c Dr. 30,000, To Sales A/c 30,000.", "उधार बिक्री पर: देनदार खाता डेबिट, बिक्री खाता क्रेडिट।", "उधारी विक्रीवर: देनदार खाते नावे, विक्री खाते जमा.", "Entry", ["credit sale"]);
  addQA("What is the Entry for Sales Return (Return Inward)?", "Return Inward A/c Dr. (Nominal – Debit loss/expense) To Debtor's A/c (Personal). Example: Govind returned goods ₹8,000 → Return Inward A/c Dr. 8,000, To Govind's A/c 8,000.", "बिक्री वापसी पर: बिक्री वापसी खाता डेबिट, देनदार खाता क्रेडिट।", "विक्री परताव्यावर: विक्री परत खाते नावे, देनदार खाते जमा.", "Entry", ["sales return","return inward"]);

  // ---------- SPECIAL ENTRIES (Drawings, Free Samples, Loss by Fire) ----------
  addQA("What is the Entry for Goods withdrawn by Proprietor for personal use?", "Drawings A/c Dr. (Personal/Contra Capital) To Purchases A/c or Goods Withdrawn A/c (since goods go out). Example: Goods taken for personal use ₹1,000 → Drawings A/c Dr. 1,000, To Purchases A/c 1,000.", "मालिक द्वारा व्यक्तिगत उपयोग हेतु माल निकालने पर: आहरण खाता डेबिट, क्रय खाता क्रेडिट।", "वैयक्तिक वापरासाठी माल काढल्यास: आहरण खाते नावे, खरेदी खाते जमा.", "Entry", ["drawings","goods withdrawn"]);
  addQA("What is the Entry for Goods distributed as Free Sample?", "Advertisement A/c Dr. (Nominal expense) To Purchases A/c (since goods go out). Example: Goods distributed as free sample ₹5,000 → Advertisement A/c Dr. 5,000, To Purchases A/c 5,000.", "निःशुल्क नमूना वितरण पर: विज्ञापन खाता डेबिट, क्रय खाता क्रेडिट।", "मोफत नमुना वाटपावर: जाहिरात खाते नावे, खरेदी खाते जमा.", "Entry", ["free sample","advertisement"]);
  addQA("What is the Entry for Goods destroyed by Fire (Uninsured)?", "Loss by Fire A/c Dr. (Nominal – Debit all losses) To Purchases A/c (Goods go out). Example: Goods destroyed by fire ₹1,000 → Loss by Fire A/c Dr. 1,000, To Purchases A/c 1,000.", "अग्नि से माल नष्ट (बिना बीमा): अग्नि हानि खाता डेबिट, क्रय खाता क्रेडिट।", "आगीत माल नाश (विमा नाही): आगीचा तोटा खाते नावे, खरेदी खाते जमा.", "Entry", ["loss by fire","uninsured loss"]);
  addQA("What is the Entry for Goods destroyed by Fire (Insured, full claim admitted)?", "Insurance Company A/c Dr. (Asset – claim receivable) To Purchases A/c. Example: Full claim of ₹10,000 admitted → Insurance Co. A/c Dr. 10,000, To Purchases A/c 10,000.", "बीमित एवं पूर्ण दावा स्वीकृत: बीमा कंपनी खाता डेबिट, क्रय खाता क्रेडिट।", "विमा उतरवले व पूर्ण दावा मंजूर: विमा कंपनी खाते नावे, खरेदी खाते जमा.", "Entry", ["insured claim","insurance claim"]);
  addQA("What is the Entry for Goods lost by theft?", "Loss by Theft A/c Dr. (Nominal loss) To Purchases A/c. Example: Goods stolen ₹2,000 → Loss by Theft A/c Dr. 2,000, To Purchases A/c 2,000.", "चोरी से माल हानि: चोरी हानि खाता डेबिट, क्रय खाता क्रेडिट।", "चोरीमुळे माल हानी: चोरीचा तोटा खाते नावे, खरेदी खाते जमा.", "Entry", ["theft","stolen goods"]);

  // ---------- GST ENTRIES (with examples) ----------
  addQA("What is the Journal Entry for Purchase of Goods with GST?", "Purchase A/c Dr. (cost), Input CGST A/c Dr., Input SGST A/c Dr. (Input tax credit) To Bank/Cash A/c (total value). Example: Laptop ₹50,000 at 18% GST (9% CGST+9% SGST=₹4,500 each) paid by cheque → Laptop A/c 50,000, Input CGST 4,500, Input SGST 4,500 To Bank 59,000.", "जीएसटी सह क्रय पर: क्रय खाता डेबिट, इनपुट सीजीएसटी/एसजीएसटी डेबिट, बैंक/नकद क्रेडिट।", "GST सह खरेदीवर: खरेदी खाते नावे, इनपुट CGST/SGST नावे, बँक/रोख जमा.", "GST Entry", ["purchase with gst","input gst"]);
  addQA("What is the Journal Entry for Sale of Goods with GST?", "Bank/Cash A/c Dr. (total value) To Sales A/c (net sales), To Output CGST A/c, To Output SGST A/c. Example: Motor car sold ₹1,00,000 at 28% GST (14%+14%=₹28,000) → Bank 1,28,000 Dr., To Motor Car 1,00,000, To Output CGST 14,000, To Output SGST 14,000.", "जीएसटी सह बिक्री पर: बैंक/नकद डेबिट, बिक्री खाता क्रेडिट, आउटपुट सीजीएसटी/एसजीएसटी क्रेडिट।", "GST सह विक्रीवर: बँक/रोख नावे, विक्री खाते जमा, आउटपुट CGST/SGST जमा.", "GST Entry", ["sale with gst","output gst"]);
  
  // ---------- COMBINED ENTRIES & DISCOUNT EXAMPLES ----------
  addQA("What is Combined (Compound) Journal Entry?", "When more than two accounts are affected – several debits and one credit OR one debit and several credits OR multiple debits and credits. Example: Started business with Cash ₹1,50,000, Goods ₹30,000, Laptop ₹50,000 → Combined: Cash A/c Dr., Stock A/c Dr., Laptop A/c Dr. To Capital A/c.", "संयुक्त प्रविष्टि में एक से अधिक खाते डेबिट या क्रेडिट होते हैं।", "संयुक्त नोंदीत एकापेक्षा जास्त खाती नावे किंवा जमा होतात.", "Entry", ["compound entry","combined entry"]);
  addQA("What is the Entry for Cash Discount Allowed (Received cash less discount)?", "Cash A/c Dr. (actual received), Discount Allowed A/c Dr. (loss) To Debtor's A/c (full amount). Example: Received from Kartik ₹1,900 allowed discount ₹100 → Cash 1,900, Discount Allowed 100, To Kartik 2,000.", "रोकड़ छूट देने पर: नकद खाता डेबिट, छूट दी गई डेबिट, देनदार क्रेडिट।", "रोख सवलत दिल्यास: रोख नावे, दिलेली सवलत नावे, देनदार जमा.", "Entry", ["discount allowed"]);
  addQA("What is the Entry for Cash Discount Received (Paid less discount)?", "Creditor's A/c Dr. (full amount) To Cash A/c (actual paid), To Discount Received A/c (gain). Example: Paid to Chanda ₹980, received discount ₹20 → Chanda's A/c 1,000 Dr., To Cash 980, To Discount Received 20.", "रोकड़ छूट पाने पर: लेनदार खाता डेबिट, नकद क्रेडिट, प्राप्त छूट क्रेडिट।", "रोख सवलत मिळाल्यास: लेनदार नावे, रोख जमा, मिळालेली सवलत जमा.", "Entry", ["discount received"]);

  // ---------- EXERCISE QUESTIONS (One sentence, true/false, fillups) from PDF ----------
  addQA("What is the meaning of Simple Entry?", "Simple Entry affects only two accounts – one debit and one credit. Example: Cash paid for Rent → Rent A/c Dr., Cash A/c Cr.", "सरल प्रविष्टि में केवल दो खाते प्रभावित होते हैं।", "साध्या नोंदीत फक्त दोन खाती प्रभावित होतात.", "Term", ["simple entry"]);
  addQA("Which discount is not recorded in the books of accounts?", "Trade Discount is not recorded in the books of accounts. Only net amount after trade discount is recorded.", "व्यापार छूट पुस्तकों में दर्ज नहीं की जाती।", "व्यापार सवलत पुस्तकात नोंदवत नाही.", "Discount", ["trade discount not recorded"]);
  addQA("In which order are monthly transactions recorded in Journal?", "Transactions are recorded in chronological order (date-wise order) as they occur.", "लेन-देन कालानुक्रमिक क्रम (तिथि-वार) दर्ज किए जाते हैं।", "व्यवहार तारखेनुसार (कालक्रमानुसार) नोंदवले जातात.", "Process", ["chronological order"]);
  addQA("Which account is credited when goods are sold on credit?", "Sales Account is credited (Nominal Account – Credit all incomes and gains). Debtor's A/c is debited.", "उधार माल बिक्री पर बिक्री खाता क्रेडिट किया जाता है।", "उधारी विक्रीवर विक्री खाते जमा केले जाते.", "Rules", ["sales credit"]);
  addQA("What is the French word from which 'Journal' is derived?", "The word 'Journal' is derived from French word 'JOUR' which means 'Day'.", "जर्नल फ्रेंच शब्द 'JOUR' से लिया गया है जिसका अर्थ 'दिन' है।", "जर्नल हा फ्रेंच शब्द 'JOUR' वरून आला आहे ज्याचा अर्थ 'दिवस' आहे.", "Etymology", ["jour","french"]);
  addQA("What is the book of prime entry?", "Journal is the book of prime entry (also called book of original entry) because transactions are first recorded here.", "जर्नल प्राथमिक प्रविष्टि की पुस्तक है।", "जर्नल ही मूळ नोंदवही आहे.", "Core", ["prime entry","original entry"]);
  addQA("What is the process of recording transactions in Journal called?", "The process is called Journalising.", "इस प्रक्रिया को जर्नलाइजिंग कहते हैं।", "या प्रक्रियेला जर्नलायझिंग म्हणतात.", "Process", ["journalising"]);
  addQA("True or False: Narration is not required for each and every entry.", "False. Narration is required for every journal entry to explain the transaction briefly.", "गलत। प्रत्येक प्रविष्टि के लिए नैरेशन आवश्यक है।", "चुकीचे. प्रत्येक नोंदीसाठी निवेदन आवश्यक आहे.", "True/False", ["narration required"]);
  addQA("True or False: Cash discount allowed should be debited to discount A/c.", "True. Discount Allowed is a loss (Nominal Account), hence debited.", "सही। छूट दी गई हानि है, अतः डेबिट।", "बरोबर. दिलेली सवलत हा तोटा आहे, म्हणून नावे.", "True/False", ["discount allowed debit"]);
  addQA("Fill in blank: The first book of original entry is the ______.", "Journal", "जर्नल", "जर्नल", "Fillup", ["first book"]);
  addQA("Fill in blank: Every Journal Entry requires ______.", "Narration", "नैरेशन", "निवेदन", "Fillup", ["requires narration"]);
  addQA("Fill in blank: ______ discount is always recorded in the books of accounts.", "Cash", "रोकड़", "रोख", "Fillup", ["cash discount recorded"]);

  // Additional 20+ practical scenario entries
  addQA("Entry for Paid Rent by Debit Card? Which account debited?", "Rent A/c (Nominal – expense) is debited. Bank A/c credited. Debit card payment directly reduces bank balance.", "किराया खाता डेबिट, बैंक खाता क्रेडिट।", "भाडे खाते नावे, बँक खाते जमा.", "Entry", ["rent debit card"]);
  addQA("Entry for Received Commission by Cash?", "Cash A/c Dr. To Commission Received A/c (Nominal – income).", "रोकड़ खाता डेबिट, प्राप्त कमीशन क्रेडिट।", "रोख खाते नावे, मिळालेले कमिशन जमा.", "Entry", ["commission received"]);
  addQA("Goods costing ₹5,000 sold at a loss of ₹1,000. Entry?", "Cash/Debtor A/c Dr. 4,000, Loss on Sale A/c Dr. 1,000 To Sales A/c 5,000.", "नकद/देनदार 4,000, बिक्री हानि 1,000 डेबिट, बिक्री 5,000 क्रेडिट।", "रोख/देनदार 4,000, विक्री तोटा 1,000 नावे, विक्री 5,000 जमा.", "Entry", ["loss on sale"]);
  
  // ---- HELPER FUNCTIONS (search, suggestions, UI) ----
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(query) {
    if(!query.trim()) return [];
    const lower = query.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower) || lower.includes(k))
    ).slice(0, 14);
  }

  function updateSuggestions() {
    const val = searchInput.value;
    if(!val.trim()) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>📓</span> <strong>${item.question.substring(0,70)}...</strong> <span style="margin-left:auto; background:#e2e8f0; padding:2px 10px; border-radius:20px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(query = null) {
    let q = (query !== null) ? query : searchInput.value;
    q = q.trim();
    if(!q) { resultsContainer.innerHTML = `<div class="not-found">🔍 Type: Journal, Narration, GST, Trade Discount, Cash Purchase, Combined Entry</div>`; return; }
    const matches = getMatches(q);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results for "${q}". Try: Journal, Narration, GST Entry, Voucher.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">${item.category}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / उत्तर:</strong><br>${escapeHtml(item.answer)}</div>
        <div class="action-buttons">
          <button class="langBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-hi="${escapeAttr(item.hindi)}" data-mr="${escapeAttr(item.marathi)}">🌐 हिंदी / मराठी</button>
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}">📘 विस्तृत उत्तर (Detailed)</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".langBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a= btn.getAttribute("data-a"), hi=btn.getAttribute("data-hi"), mr=btn.getAttribute("data-mr");
      showLangPopup(q,a,hi,mr);
    }));
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a= btn.getAttribute("data-a"), cat=btn.getAttribute("data-cat");
      showDetailPopup(q,a,cat);
    }));
  }

  function showLangPopup(question, answer, hindi, marathi) {
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#1e40af;">🌐 भाषा अनुवाद | Language Translation</h2>
      <div class="lang-section"><strong>❓ प्रश्न:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>🇮🇳 हिंदी (Hindi):</strong><br>${escapeHtml(hindi || answer)}</div>
      <div class="lang-section"><strong>🇮🇳 मराठी (Marathi):</strong><br>${escapeHtml(marathi || answer)}</div>
      <button id="closeLangModal" style="background:#2563eb; padding:10px 24px; border-radius:40px; color:white; border:none;">बंद करें</button>
    `;
    document.getElementById("closeLangModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function showDetailPopup(question, answer, category) {
    let extra = `<div class="lang-section"><strong>📚 Textbook Reference:</strong> 11th BK Chapter 3 - Journal, Accounting Documents, GST. This entry follows golden rules of Debit/Credit.</div>`;
    if(category === "GST Entry") extra += `<div class="lang-section">💡 GST Tip: Input CGST/SGST are debited (asset/credit recievable), Output CGST/SGST are credited (liability). Net GST payable = Output - Input.</div>`;
    if(category === "Discount") extra += `<div class="lang-section">🏷️ Trade discount never recorded; Cash discount always recorded in Discount Allowed or Discount Received account.</div>`;
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 class="detail-title">📘 विस्तृत उत्तर (Detailed Explanation)</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Detailed Answer:</strong><br>${escapeHtml(answer)} ${extra}</div>
      <button id="closeDetailModal" style="background:#1e40af; padding:10px 24px; border-radius:40px; color:white; border:none;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function escapeAttr(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice not supported."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.onload = () => { resultsContainer.innerHTML = `<div class="not-found">✨ Chapter 3: Journal | ${qaDatabase.length}+ Q&A | GST, Narration, Vouchers, Trade/Cash Discount ✨</div>`; };
</script>
