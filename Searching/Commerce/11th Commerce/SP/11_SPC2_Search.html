  // ============ MEANING AND DEFINITIONS OF JOINT STOCK COMPANY ============
  addQA("What is a Joint Stock Company? Give its meaning and definitions.", `
    <strong>Meaning:</strong> A Joint Stock Company is a voluntary association of persons formed for carrying on business, with its capital divided into transferable shares. It is an artificial person created by law, having separate legal entity, perpetual succession, and limited liability.<br><br>
    <strong>Definitions:</strong><br>
    1) According to Section 2(20) of Companies Act 2013: "Company means a company incorporated under this Act or under any previous company law."<br>
    2) According to Prof. H. L. Haney: "A Joint stock company is a voluntary association of individuals for profit, having its capital divided into transferable shares, the ownership of which is the condition of membership."<br><br>
    <table class="explanation-table">
      <tr><th colspan="2">📖 Detailed Explanation of Key Aspects</th></tr>
      <tr><td>💡 Voluntary Association</td><td>A Joint Stock Company is formed by individuals who willingly come together for a common business purpose. No one is forced to become a member. Membership is open to all who agree to abide by the company's rules. This voluntary nature distinguishes it from forms like Joint Hindu Family Business where membership is by birth. Any person can purchase shares and become a member, and can also exit by selling their shares.</td></tr>
      <tr><td>💡 Capital divided into Shares</td><td>The total capital of the company is divided into small units of fixed value called 'shares'. For example, if a company has ₹1 crore capital divided into shares of ₹10 each, then there are 10 lakh shares. This division makes it possible for people with small savings to invest. A person who buys shares is called a 'shareholder' or 'member'. The shareholder becomes a part-owner of the company proportionate to their shareholding.</td></tr>
      <tr><td>💡 Transferable Shares</td><td>In a public company, shares are freely transferable. A shareholder can sell his shares to anyone at any time through the stock exchange. This provides liquidity to investors. In private companies, shares are not freely transferable - there are restrictions as per the Articles of Association. Transferability of shares is a unique feature that allows investors to easily enter or exit the company.</td></tr>
      <tr><td>💡 Incorporated Association</td><td>A company comes into existence only when it is registered or incorporated under the Companies Act 2013. Registration is compulsory. Once registered, the company gets a Certificate of Incorporation. A company cannot be formed by mere agreement like a partnership firm. Incorporation gives the company legal recognition and the status of a separate legal entity.</td></tr>
    </table>`,
    "Meaning", ["joint stock company meaning", "definition of company", "jsc definition"]);

  // ============ 12 FEATURES OF JOINT STOCK COMPANY ============
  addQA("What are the features/characteristics of a Joint Stock Company?", `
    <strong>A Joint Stock Company has the following 12 important features:</strong><br><br>
    <table class="explanation-table">
      <tr><th>#</th><th>Feature</th><th>Detailed Explanation</th></tr>
      <tr><td>1</td><td>Voluntary Association</td><td>A Joint Stock Company is a voluntary association of persons. Membership is open to all and no one is forced to join. Individuals willingly come together to form the company for a common business objective. Any person who wishes to become a member can purchase shares of the company. This voluntary nature allows people to invest according to their choice and exit when they desire by selling their shares.</td></tr>
      <tr><td>2</td><td>Incorporated Association</td><td>Registration or incorporation under the Companies Act 2013 is compulsory for a company. Without registration, an association cannot be called a company. The company must file Memorandum of Association, Articles of Association, and other documents with the Registrar of Companies. After verification, the Registrar issues a Certificate of Incorporation. This certificate is the birth certificate of the company. Only after incorporation does the company get legal existence.</td></tr>
      <tr><td>3</td><td>Separate Legal Entity</td><td>A Joint Stock Company has a separate legal existence distinct from its members. The company is considered as a person in the eyes of law. It can own property in its own name, enter into contracts, sue and be sued. The members are not personally liable for the acts of the company. For example, if a company buys a building, the building belongs to the company, not to the shareholders individually. This separates personal assets of members from company assets.</td></tr>
      <tr><td>4</td><td>Artificial Person</td><td>A company is an artificial person created by law. Unlike a natural person (human being), a company does not have physical existence. It cannot breathe, eat, or walk. However, law gives it certain rights and duties similar to a natural person. It can own property, hire employees, pay taxes, and enter into contracts. Since it is artificial, it cannot act on its own and must act through its Board of Directors and other employees who are natural persons.</td></tr>
      <tr><td>5</td><td>Perpetual Succession</td><td>Perpetual succession means continuous existence. A company never dies. Its existence is not affected by the death, insolvency, retirement, or insanity of any member or director. Members may come and go, but the company continues forever. A company can only be dissolved by following a legal winding-up process. This feature provides stability and long-term continuity to business operations, unlike sole proprietorship which ends with the death of the proprietor.</td></tr>
      <tr><td>6</td><td>Common Seal</td><td>A company is an artificial person without physical existence, so it cannot sign documents like a natural person. Therefore, the company uses a Common Seal as its official signature. The common seal is a metal stamp with the company's name engraved on it. All important documents and contracts must be affixed with the common seal. The seal is kept in the custody of the Company Secretary and is affixed in the presence of at least two directors who sign as witnesses.</td></tr>
      <tr><td>7</td><td>Limited Liability</td><td>The liability of shareholders of a joint stock company is limited. A shareholder is liable only up to the unpaid amount on the shares held by them. If a shareholder has paid the full face value of shares, they have no further liability. The personal property of shareholders cannot be used to pay the debts of the company. For example, if a company suffers losses, creditors can only claim from company assets, not from the houses, cars, or savings of shareholders.</td></tr>
      <tr><td>8</td><td>Separation of Ownership and Management</td><td>In a company, ownership is with shareholders while management is with the Board of Directors. Shareholders are the real owners but they are large in number, scattered geographically, and keep changing due to share transfer. Therefore, shareholders elect their representatives called Directors. Directors form the Board of Directors and take all policy decisions. Professional managers are appointed for day-to-day operations. This separation allows professional management of business.</td></tr>
      <tr><td>9</td><td>Transferability of Shares</td><td>In a public company, shares are freely transferable. A shareholder can sell his shares to any person at any time through the stock exchange without seeking permission from the company or other shareholders. This provides liquidity to investors and makes investment attractive. In a private company, the Articles of Association restrict the transfer of shares to maintain the close-knit character of the company. Shares of a private company are not freely transferable.</td></tr>
      <tr><td>10</td><td>Number of Members</td><td>A private company must have minimum 2 members and maximum 200 members (excluding employees). A public company must have minimum 7 members and there is no limit on maximum members. One Person Company (OPC) has only 1 member. These limits are prescribed by the Companies Act 2013. The large number of members in a public company allows it to collect huge capital from the public.</td></tr>
      <tr><td>11</td><td>Huge Capital</td><td>Due to large number of members and ability to invite public to subscribe to shares, a joint stock company can collect huge amount of capital. The company can also raise funds by issuing debentures, bonds, and accepting public deposits. It can obtain loans from banks and financial institutions. This financial strength enables the company to undertake large-scale production, modern technology, and expansion activities which are not possible for sole trading or partnership firms.</td></tr>
      <tr><td>12</td><td>Government Control</td><td>A Joint Stock Company operates under strict government control and supervision. Registration is compulsory. The company must file annual returns, balance sheets, and profit & loss statements with the Registrar of Companies. Accounts must be audited by a qualified chartered accountant. The company must follow the provisions of the Companies Act 2013. This government control is essential to protect the interests of small investors and ensure transparency in business operations.</td></tr>
    </table>`,
    "Features", ["features of joint stock company", "characteristics of company"]);

  // ============ TYPES OF COMPANIES ============
  addQA("What are the different types of companies? Explain classification.", `
    <strong>Companies can be classified on the following basis:</strong><br><br>
    <table class="explanation-table">
      <tr><th colspan="2">📊 A) ON THE BASIS OF INCORPORATION</th></tr>
      <tr><td>1. Statutory Company</td><td>A Statutory Company is incorporated by a special Act passed by the Central or State Legislature. The Act defines its powers, functions, and area of operation. These companies are not registered under the Companies Act but under their respective special Acts. Examples: Reserve Bank of India (RBI), State Bank of India (SBI), Life Insurance Corporation (LIC), Unit Trust of India (UTI). These companies have a monopoly in their respective fields and are established for public welfare.</td></tr>
      <tr><td>2. Registered Company</td><td>A Registered Company is incorporated under the Companies Act 2013 or any previous company law. Such companies must file Memorandum of Association, Articles of Association, and other documents with the Registrar of Companies. After registration, they receive a Certificate of Incorporation. Most companies in India are registered companies. Examples: Tata Motors, Reliance Industries, Infosys, etc.</td></tr>
      <tr><th colspan="2">📊 B) ON THE BASIS OF NUMBER OF MEMBERS</th></tr>
      <tr><td>1. Private Company</td><td>As per Section 2(68), a private company is one which by its Articles: (a) restricts transfer of shares, (b) limits members to maximum 200, (c) prohibits public invitation to subscribe to securities. Minimum 2 members and 2 directors required. Must add "Private Limited" at end of name. Shares not freely transferable. Cannot issue prospectus to public.</td></tr>
      <tr><td>2. Public Company</td><td>As per Section 2(71), a public company means a company which is not a private company. Features: No restriction on share transfer, minimum 7 members (no maximum), can invite public to subscribe shares, minimum 3 directors, must add "Limited" at end of name. Can issue prospectus to raise funds from public.</td></tr>
      <tr><td>3. One Person Company (OPC)</td><td>Introduced in Companies Act 2013 (Section 2(62)). A company with only one person as member. The single promoter has limited liability. Better than sole proprietorship because liability is limited. Can have one or more directors. No need to hold Annual General Meeting. Provides corporate status to single entrepreneur.</td></tr>
      <tr><th colspan="2">📊 C) ON THE BASIS OF LIABILITY OF MEMBERS</th></tr>
      <tr><td>1. Company Limited by Shares</td><td>Section 2(22): Liability of each member is limited to the unpaid amount on shares held. Most popular type. Can be public or private company. Shareholders are not personally liable for company debts. Their personal property cannot be attached for company liabilities.</td></tr>
      <tr><td>2. Company Limited by Guarantee</td><td>Section 2(21): Members promise to pay a fixed sum (guarantee amount) in event of liquidation. Usually non-profit companies formed for promotion of art, science, culture, charity, sports, or similar purposes. May or may not have share capital.</td></tr>
      <tr><td>3. Unlimited Company</td><td>Section 2(92): A company where liability of members has no limit. Members are fully liable to cover debts of company. Rare form. Can be private or public company. Similar to partnership in terms of unlimited liability but enjoys corporate status.</td></tr>
      <tr><th colspan="2">📊 D) ON THE BASIS OF CONTROL</th></tr>
      <tr><td>1. Holding Company</td><td>Section 2(46): A company which holds more than one-half of total share capital of another company OR has power to appoint/remove majority of directors of another company. Controls the subsidiary company. Also called parent company.</td></tr>
      <tr><td>2. Subsidiary Company</td><td>Section 2(87): A company which is controlled by a holding company. The holding company exercises control by holding majority shares or having power over board of directors. Subsidiary is a separate legal entity but its policies are influenced by holding company.</td></tr>
      <tr><th colspan="2">📊 E) OTHER TYPES</th></tr>
      <tr><td>Government Company</td><td>Section 2(45): Any company where not less than 51% of paid-up share capital is held by Central Government, State Government(s), or partly by both. Examples: BHEL, SAIL, ONGC, NTPC, Coal India Limited.</td></tr>
      <tr><td>Foreign Company</td><td>Section 2(42): A company incorporated outside India but having a place of business in India. Examples: Nestle India, Bata India, Whirlpool Corporation.</td></tr>
      <tr><td>Listed Company</td><td>Section 2(52): A company which has any of its securities listed on a recognized stock exchange. Must follow SEBI guidelines and Companies Act provisions.</td></tr>
      <tr><td>Dormant Company</td><td>A company registered for a future project or not having significant accounting transactions for last 2 years. Can apply for dormant status under Section 455.</td></tr>
    </table>`,
    "Types", ["types of companies", "classification of companies"]);

  // ============ PRIVATE COMPANY DETAILS ============
  addQA("What is a Private Company? Explain its features.", `
    <strong>Meaning:</strong> As per Section 2(68) of Companies Act 2013, a private company is a company which by its Articles:<br>
    (i) Restricts the right of members to transfer its shares,<br>
    (ii) Limits the number of its members to 200 (excluding employees),<br>
    (iii) Prohibits any invitation to the public to subscribe for any securities or deposits of the company.<br><br>
    <table class="explanation-table">
      <tr><th>Feature</th><th>Detailed Explanation</th></tr>
      <tr><td>Minimum Members</td><td>A private company must have at least 2 members. These two persons act as subscribers to the Memorandum of Association and become the first members of the company.</td></tr>
      <tr><td>Maximum Members</td><td>Maximum members are 200 (excluding present and past employees). This limit ensures that the company remains a closely held entity with limited ownership.</td></tr>
      <tr><td>Minimum Directors</td><td>A private company must have at least 2 directors. Directors are responsible for the management of the company.</td></tr>
      <tr><td>Transfer of Shares</td><td>Shares of a private company are not freely transferable. The Articles of Association contain restrictions on share transfer to maintain the close-knit character of the company.</td></tr>
      <tr><td>Prospectus</td><td>A private company cannot issue a prospectus to invite the public to subscribe for its shares. It can only raise funds from its members, friends, and relatives.</td></tr>
      <tr><td>Name</td><td>Every private company must add the words "Private Limited" at the end of its name. Example: "ABC Technologies Private Limited".</td></tr>
      <tr><td>Number of Directors</td><td>Minimum 2 directors are required. There is no maximum limit, but Articles may prescribe the number.</td></tr>
    </table>`,
    "Private Company", ["private company features", "private limited company"]);

  // ============ PUBLIC COMPANY DETAILS ============
  addQA("What is a Public Company? Explain its features.", `
    <strong>Meaning:</strong> As per Section 2(71) of Companies Act 2013, a public company means a company which is not a private company. A public company is one which:<br>
    (i) Has no restriction on transfer of shares,<br>
    (ii) Has minimum 7 members (no maximum limit),<br>
    (iii) Can invite public to subscribe to its shares and deposits.<br><br>
    <table class="explanation-table">
      <tr><th>Feature</th><th>Detailed Explanation</th></tr>
      <tr><td>Minimum Members</td><td>A public company must have at least 7 members. These members subscribe to the Memorandum and become the first shareholders of the company.</td></tr>
      <tr><td>Maximum Members</td><td>There is no maximum limit on the number of members. A public company can have thousands or even millions of shareholders.</td></tr>
      <tr><td>Minimum Directors</td><td>A public company must have at least 3 directors. Directors are elected by shareholders and manage the company's affairs.</td></tr>
      <tr><td>Transfer of Shares</td><td>Shares of a public company are freely transferable. A shareholder can sell his shares to anyone through a stock exchange without seeking permission from the company.</td></tr>
      <tr><td>Prospectus</td><td>A public company can issue a prospectus to invite the general public to subscribe for its shares, debentures, or other securities. The prospectus must contain true and fair information about the company.</td></tr>
      <tr><td>Name</td><td>Every public company must add the word "Limited" at the end of its name. Example: "Tata Motors Limited".</td></tr>
      <tr><td>Certificate of Commencement</td><td>A public company cannot start business until it obtains a Certificate of Commencement of Business from the Registrar of Companies.</td></tr>
    </table>`,
    "Public Company", ["public company features", "public limited company"]);

  // ============ ONE PERSON COMPANY (OPC) ============
  addQA("What is One Person Company (OPC)? Explain its features.", `
    <strong>Meaning:</strong> As per Section 2(62) of Companies Act 2013, a One Person Company is a company which has only one person as a member. This concept was introduced in the Companies Act 2013 to encourage sole proprietors to operate as a company with limited liability.<br><br>
    <table class="explanation-table">
      <tr><th>Feature</th><th>Detailed Explanation</th></tr>
      <tr><td>Single Member</td><td>OPC has only one member (shareholder). The single person is both the owner and the only shareholder of the company. This is a major departure from traditional company law which required at least 2 members for a private company.</td></tr>
      <tr><td>Limited Liability</td><td>The liability of the sole member is limited to the unpaid amount on shares held by him. Unlike a sole proprietor whose personal assets can be attached for business debts, the OPC member's personal property is protected.</td></tr>
      <tr><td>Nominee</td><td>At the time of incorporation, the sole member must nominate a person who will become the member in case of the original member's death or incapacity. This ensures continuity of the company.</td></tr>
      <tr><td>Directors</td><td>OPC can have one or more directors. The sole member can also be the director. Minimum 1 director is required. The same person can be both member and director.</td></tr>
      <tr><td>Annual General Meeting</td><td>OPC is not required to hold Annual General Meetings (AGMs). This reduces compliance burden for small entrepreneurs.</td></tr>
      <tr><td>Advantage over Sole Proprietorship</td><td>OPC provides corporate status with limited liability while allowing single person control. It is better than sole proprietorship because liability is limited and it has perpetual succession.</td></tr>
    </table>`,
    "OPC", ["one person company", "opc features"]);

  // ============ COMPARISON TABLES FOR REFERENCE ============
  function getPrivateVsPublicTable() {
    return `<table class="detail-table">
      <tr><th colspan="3">📊 Private Company vs Public Company</th></tr>
      <tr><th>Basis</th><th>Private Company</th><th>Public Company</th></tr>
      <tr><td>Minimum Members</td><td>2</td><td>7</td></tr>
      <tr><td>Maximum Members</td><td>200</td><td>No limit</td></tr>
      <tr><td>Minimum Directors</td><td>2</td><td>3</td></tr>
      <tr><td>Transfer of Shares</td><td>Restricted, not freely transferable</td><td>Freely transferable</td></tr>
      <tr><td>Issue of Prospectus</td><td>Cannot issue prospectus to public</td><td>Can issue prospectus to invite public</td></tr>
      <tr><td>Name Suffix</td><td>"Private Limited"</td><td>"Limited"</td></tr>
      <tr><td>Commencement Certificate</td><td>Can start business after incorporation</td><td>Needs Certificate of Commencement</td></tr>
    </table>`;
  }

  function getAllFormsComparisonTable() {
    return `<table class="detail-table">
      <tr><th colspan="6">📊 Comparison: Sole Trading, Partnership, JHF, JSC, Co-operative Society</th></tr>
      <tr><th>Basis</th><th>Sole Trading</th><th>Partnership</th><th>JHF Business</th><th>Joint Stock Co.</th><th>Co-operative</th></tr>
      <tr><td>Registration</td><td>Not required</td><td>Compulsory in Maharashtra</td><td>Not required</td><td>Compulsory</td><td>Compulsory</td></tr>
      <tr><td>Members</td><td>1 only</td><td>2 to 50</td><td>No limit</td><td>Pvt:2-200, Pub:7+</td><td>Min 10, no max</td></tr>
      <tr><td>Liability</td><td>Unlimited</td><td>Unlimited, joint & several</td><td>Karta:Unlimited, Others:Limited</td><td>Limited</td><td>Limited</td></tr>
      <tr><td>Legal Status</td><td>No separate status</td><td>No separate status</td><td>No separate status</td><td>Separate legal entity</td><td>Separate legal entity</td></tr>
      <tr><td>Stability</td><td>Unstable</td><td>Unstable</td><td>Unstable</td><td>Stable (perpetual succession)</td><td>Stable</td></tr>
    </table>`;
  }

  // Search and display
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(q) {
    const lower = q.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower))
    ).slice(0, 12);
  }

  function updateSuggestions() {
    const val = searchInput.value.trim();
    if(!val) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>🏢</span> <strong>${item.question.substring(0,70)}</strong> <span style="margin-left:auto; background:#fee2e2; padding:2px 12px; border-radius:30px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(q = null) {
    let query = (q !== null) ? q : searchInput.value.trim();
    if(!query) { resultsContainer.innerHTML = `<div class="not-found">🏢 JOINT STOCK COMPANY - Type keywords: Meaning, Features, Private Company, Public Company, One Person Company, Types, Holding Company ✨</div>`; return; }
    const matches = getMatches(query);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results. Try: Joint Stock Company meaning, features of JSC, private company, public company, one person company, types of companies.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">📌 ${escapeHtml(item.category)}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / Explanation:</strong><br>${item.answer}</div>
        <div class="action-buttons">
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer.substring(0,500))}" data-cat="${item.category}">📖 Detailed Explanation</button>
          <button class="extraTableBtn" data-type="${item.category}">📋 Reference Tables</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a = btn.getAttribute("data-a"), cat = btn.getAttribute("data-cat");
      showDetailPopup(q, a, cat);
    }));
    document.querySelectorAll(".extraTableBtn").forEach(btn => btn.addEventListener("click", () => {
      let content = `<div class="lang-section"><strong>📚 JOINT STOCK COMPANY - Reference Tables</strong><br>`;
      content += `<h4>🏛️ Private vs Public Company</h4>${getPrivateVsPublicTable()}`;
      content += `<hr><h4>🏢 Comparison: Sole Trading, Partnership, JHF, JSC, Co-operative</h4>${getAllFormsComparisonTable()}`;
      content += `<hr><div class="formula-box">💡 Key Facts: JSC emerged after Industrial Revolution 1760. Companies Act 2013 governs all companies. Perpetual succession = company never dies. Common seal = official signature. One Person Company introduced in 2013. Minimum members: Pvt 2, Public 7, OPC 1.</div>`;
      content += `</div>`;
      document.getElementById("popupModal").style.display = "flex";
      document.getElementById("modalContent").innerHTML = `<h2 style="color:#991b1b;">📊 JOINT STOCK COMPANY - Reference</h2>${content}<button id="closeModalInside" style="background:#dc2626; margin-top:20px; padding:10px 26px; border-radius:40px; color:white;">Close</button>`;
      document.getElementById("closeModalInside").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
    }));
  }

  function showDetailPopup(question, answer, category) {
    let extraInfo = `<div class="lang-section"><strong>📖 JOINT STOCK COMPANY - Detailed Study Notes</strong><br>
    ✔ <strong>Origin:</strong> Joint Stock Company emerged after Industrial Revolution in 1760 in England. It was developed to meet the challenges of large-scale production and trade.<br>
    ✔ <strong>Legal Framework:</strong> Governed by Companies Act 2013 in India. Section 2(20) defines a company.<br>
    ✔ <strong>Key Features Summary:</strong> Voluntary association, incorporated, separate legal entity, artificial person, perpetual succession, common seal, limited liability, separation of ownership & management, transferable shares (public), huge capital, government control.<br>
    ✔ <strong>Types Summary:</strong> On basis of Incorporation (Statutory, Registered), Members (Private, Public, OPC), Liability (Shares, Guarantee, Unlimited), Control (Holding, Subsidiary), Others (Government, Foreign, Listed, Dormant).<br>
    ✔ <strong>One Person Company (OPC):</strong> Introduced in 2013, single member, limited liability, nominee required, no AGM needed.</div>`;
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#991b1b;">📘 Detailed Explanation</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Summary:</strong><br>${escapeHtml(answer.substring(0,800))}...</div>
      ${extraInfo}
      <button id="closeDetailModal" style="background:#f87171; padding:10px 26px; border-radius:40px; margin-top:12px;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
  function escapeAttr(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice search supported in Chrome/Edge."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.onload = () => { resultsContainer.innerHTML = `<div class="not-found">🏢 JOINT STOCK COMPANY | 11th SP Chapter 2 | Search: Meaning, Features, Private vs Public, OPC, Types of Companies ✨</div>`; };
</script>
</body>
</html>
