  // ==================== TABLE GENERATORS ====================
  function getMOAClausesTable() {
    return `<table class="responsive-table"><thead><tr><th>Clause</th><th>Description</th></tr></thead><tbody>
      <tr><td>1. Name Clause</td><td>Name of company; ends with "Limited" for public, "Private Limited" for private, "(OPC)" for One Person Company.</td></tr>
      <tr><td>2. Registered Office Clause</td><td>State where registered office is located; determines domicile and jurisdiction.</td></tr>
      <tr><td>3. Object Clause</td><td>Main objects and incidental activities; defines scope of company's operations.</td></tr>
      <tr><td>4. Liability Clause</td><td>Extent of members' liability (limited by shares/guarantee or unlimited).</td></tr>
      <tr><td>5. Capital Clause</td><td>Authorized capital, types of shares, face value.</td></tr>
      <tr><td>6. Association/Subscription Clause</td><td>Subscribers' declaration, signatures, number of shares taken.</td></tr>
    </tbody></table>`;
  }

  function getMOA_AOA_DistinctionTable() {
    return `<table class="responsive-table"><thead><tr><th>Basis</th><th>Memorandum of Association</th><th>Articles of Association</th></tr></thead><tbody>
      <tr><td>Meaning</td><td>Aims & objectives of company</td><td>Rules for internal management</td></tr>
      <tr><td>Status</td><td>Primary document (Charter)</td><td>Secondary, subordinate to MOA</td></tr>
      <tr><td>Scope</td><td>Defines boundaries of company's activities</td><td>Works within MOA boundaries</td></tr>
      <tr><td>Relationship</td><td>Company vs Outsiders</td><td>Company vs Members & Members vs Members</td></tr>
      <tr><td>Alteration</td><td>Special resolution + approvals</td><td>Special resolution</td></tr>
      <tr><td>Ultra Vires</td><td>Acts beyond MOA are void</td><td>Acts beyond AOA but within MOA are irregular but ratifiable</td></tr>
    </tbody></table>`;
  }

  function getProspectusTypesTable() {
    return `<table class="responsive-table"><thead><tr><th>Type</th><th>Description</th></tr></thead><tbody>
      <tr><td>Abridged Prospectus</td><td>Brief version attached with application form for public offer.</td></tr>
      <tr><td>Shelf Prospectus</td><td>Valid for multiple issues up to one year; used with Information Memorandum.</td></tr>
      <tr><td>Red Herring Prospectus</td><td>Incomplete prospectus (no price/quantity details); used in book building.</td></tr>
      <tr><td>Letter of Offer</td><td>Issued for Rights Issue to existing shareholders.</td></tr>
      <tr><td>Offer Letter</td><td>Issued for Private Placement to select group.</td></tr>
    </tbody></table>`;
  }

  function getDoctrinesTable() {
    return `<table class="responsive-table"><thead><tr><th>Doctrine</th><th>Meaning</th><th>Purpose/Effect</th></tr></thead><tbody>
      <tr><td>Doctrine of Ultra Vires</td><td>Acts beyond MOA powers are void</td><td>Protects shareholders, creditors; Directors personally liable</td></tr>
      <tr><td>Doctrine of Indoor Management</td><td>Outsiders need not inquire internal proceedings</td><td>Protects outsiders contracting in good faith</td></tr>
    </tbody></table>`;
  }

  // ==================== CHAPTER SUMMARY (1500+ words) ====================
  function getChapterSummary() {
    return `
      <div class="summary-container">
        <h3>📚 Chapter 4: Documents Related to Formation of Company - Complete Summary</h3>
        
        <h4>📌 Introduction</h4>
        <p>At the time of incorporation of a company, three key documents are submitted to the Registrar of Companies (ROC): <strong>Memorandum of Association (MOA)</strong>, <strong>Articles of Association (AOA)</strong>, and for public companies collecting capital from public, a <strong>Prospectus</strong>. These documents form the constitutional framework of a company.</p>
        
        <h4>📜 1. MEMORANDUM OF ASSOCIATION (MOA)</h4>
        <p>MOA is the primary document that states the aims, objectives, and scope of the company. Lord Cairns called it the "charter of the company" that defines the limitations of the company's powers. Section 2(56) of Companies Act, 2013 defines MOA.</p>
        <p><strong>Features of MOA:</strong> Primary document, defines company-outsider relationship, prepared by promoters, signed by 7/2/1 subscribers, contains 6 clauses, difficult to alter, acts beyond are Ultra Vires, public document, prescribed formats Tables A-E.</p>
        
        <h4>📌 Six Clauses of MOA in Detail:</h4>
        ${getMOAClausesTable()}
        
        <p><strong>Alteration of Clauses:</strong> Name clause by special resolution + Central Govt approval; Registered office clause by special resolution; Object clause by special resolution + Tribunal approval; Liability clause cannot be altered without member consent; Capital clause by ordinary resolution; Association clause cannot be altered.</p>
        
        <h4>⚖️ Doctrine of Ultra Vires</h4>
        <p>"Ultra" = beyond, "Vires" = powers. Acts beyond MOA are Ultra Vires and void. Cannot be ratified. Directors personally liable. Protects shareholders, creditors, investors.</p>
        
        <h4>📋 2. ARTICLES OF ASSOCIATION (AOA)</h4>
        <p>AOA is subordinate to MOA. Section 2(5) defines Articles. Contains rules for internal management - like bye-laws. Defines powers, rights, duties of directors, officers, members.</p>
        <p><strong>Contents of AOA:</strong> Share capital, transfer/transmission of shares, calls/forfeiture, director appointment/powers, meetings, voting, dividend, borrowing, audit, winding up.</p>
        <p><strong>Model Articles:</strong> Tables F, G, H, I, J for different company types.</p>
        <p><strong>Private Company Restrictions:</strong> 1) Limit members to 200, 2) Restrict share transfer, 3) Prohibit public invitation.</p>
        <p><strong>Entrenched Articles:</strong> Provisions requiring more than special resolution to alter (e.g., 9/10th majority).</p>
        
        <h4>🏛️ Doctrine of Indoor Management</h4>
        <p>Outsiders need not inquire into internal proceedings. Assumes company acts according to MOA and AOA. Protects innocent outsiders. Exceptions: knowledge of irregularity, forgery, suspicious circumstances, Ultra Vires acts.</p>
        
        <h4>📊 Distinction between MOA and AOA</h4>
        ${getMOA_AOA_DistinctionTable()}
        
        <h4>📢 3. PROSPECTUS</h4>
        <p>Section 2(70) defines prospectus as document inviting public offers for securities. Contains true and factual disclosures.</p>
        
        <h4>📌 Types of Prospectus:</h4>
        ${getProspectusTypesTable()}
        
        <h4>📝 Contents of Prospectus:</h4>
        <ul><li>Company name, registered office, contact details</li><li>Nature, number, price of securities</li><li>Lead merchant banker, registrar details</li><li>Stock exchange names, risk factors</li><li>Opening/closing dates, financial reports</li><li>Declaration of compliance</li><li>Expert statements with written consent</li></ul>
        
        <h4>⚙️ Statutory Requirements for Prospectus:</h4>
        <ul><li>Draft prospectus to be public and filed with SEBI</li><li>Signed by all directors</li><li>Registered with ROC before issue</li><li>Must be dated</li><li>Issued within 90 days of registration</li></ul>
        <p><strong>Penalty:</strong> Company fine ₹50,000-₹3,00,000; individuals - imprisonment up to 3 years or fine ₹50,000-₹3,00,000 or both.</p>
        
        <h4>⚠️ Misstatements in Prospectus</h4>
        <p>Misstatement = misleading statement or omission of material fact. Investors can take legal action. Company and officers face Civil Liability (compensation) and Criminal Liability (imprisonment/fine).</p>
        
        <h4>🎯 Key Points for Exams</h4>
        <ul><li>MOA = Charter / 6 clauses / Ultra Vires applies</li><li>AOA = Bye-laws / Secondary / Indoor Management applies</li><li>Both filed at incorporation with ROC</li><li>Public companies issuing shares need Prospectus</li><li>Shelf Prospectus valid for 1 year</li><li>Red Herring = incomplete prospectus</li><li>Abridged Prospectus attached with application form</li></ul>
        
        <div style="background: #ede9fe; padding: 20px; border-radius: 28px; margin-top: 20px;">
          <strong>📖 This summary covers all important aspects of Chapter 4 - Documents Related to Formation of Company as per Companies Act, 2013 for 11th SP Board Exam.</strong>
        </div>
      </div>
    `;
  }

  addQA("Explain: Memorandum of Association", "MOA is primary document stating aims, objectives, scope. Contains 6 clauses. Acts beyond are Ultra Vires. Defines company-outsider relationship.", "Concept", ["MOA explanation"]);
  addQA("Explain: Articles of Association", "AOA is secondary document containing rules for internal management. Subordinate to MOA. Defines powers of directors, share transfer, meetings, dividends.", "Concept", ["AOA explanation"]);

  addQA("Case: Director not MD accepted cheque. Articles say only MD authorized. Is action Ultra Vires?", "No, it's not Ultra Vires (beyond MOA). It's irregularity within AOA. Doctrine of Indoor Management may protect outsider if acting in good faith.", "Case Study", []);

  addQA("Distinguish between MOA and AOA", "MOA is primary document stating aims/objectives, defines company vs outsiders. AOA is secondary with internal rules, defines company vs members. MOA has 6 clauses, AOA is subordinate to MOA.", "Distinguish", ["MOA AOA difference"]);
  
  // State any four
  addQA("State any four clauses of MOA.", "1) Name Clause, 2) Registered Office Clause, 3) Object Clause, 4) Capital Clause", "Short Answer", []);
  addQA("State any four contents of AOA.", "1) Share capital and rights, 2) Transfer/transmission of shares, 3) Director appointment/powers, 4) Meeting procedures and voting rights.", "Short Answer", []);
  addQA("State statutory requirements for Prospectus.", "1) Filed with SEBI, 2) Signed by directors, 3) Registered with ROC, 4) Dated, 5) Issued within 90 days.", "Short Answer", []);
  
  // Justify (Page 19)
  addQA("Justify: MOA defines limitations of company's powers.", "MOA is the charter that specifies objectives and scope. Any act beyond MOA is Ultra Vires and void, establishing MOA as the boundary of company powers.", "Justify", []);
  addQA("Justify: Ultra Vires acts are null and void.", "Such acts are beyond legal powers defined in MOA. Cannot be ratified even by unanimous consent. No legal validity.", "Justify", []);
  addQA("Justify: Contents of AOA can be altered.", "Companies Act allows alteration by special resolution. Allows companies to adapt to changing circumstances while ensuring no contradiction with MOA.", "Justify", []);
  addQA("Justify: Doctrine of Indoor Management protects outsiders.", "Outsiders cannot know internal proceedings. They rely on MOA/AOA. This doctrine protects innocent outsiders who contract in good faith.", "Justify", []);
  addQA("Justify: Prospectus is important for public companies.", "It invites public investment and contains material information. Investors rely on it for decisions. Essential for raising capital from public.", "Justify", []);
  
  // Long Answer (Page 19)
  addQA("Briefly explain clauses of Memorandum of Association.", "Six clauses: Name Clause (company name), Registered Office Clause (state location), Object Clause (main activities), Liability Clause (member liability extent), Capital Clause (authorized capital), Association Clause (subscriber signatures and declaration).", "Long Answer", ["MOA clauses"]);

  // Helper Functions
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(q) {
    const lower = q.toLowerCase().trim();
    if (lower === "") return [];
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower))
    ).slice(0, 16);
  }

  function getDetailedAnswer(item) {
    let detailedHtml = `<div class="detail-section"><strong>📖 Full Answer:</strong><br>${escapeHtml(item.answer)}</div>`;
    const lowerQ = item.question.toLowerCase();
    if (lowerQ.includes("clauses of memorandum") || (lowerQ.includes("clause") && lowerQ.includes("moa"))) {
      detailedHtml += `<h3>📊 Six Clauses of MOA</h3>${getMOAClausesTable()}`;
    }
    if (lowerQ.includes("distinguish") && (lowerQ.includes("memorandum") || lowerQ.includes("moa"))) {
      detailedHtml += `<h3>📊 MOA vs AOA Distinction</h3>${getMOA_AOA_DistinctionTable()}`;
    }
    if (lowerQ.includes("prospectus") && (lowerQ.includes("type") || lowerQ.includes("kinds"))) {
      detailedHtml += `<h3>📊 Types of Prospectus</h3>${getProspectusTypesTable()}`;
    }
    if (lowerQ.includes("doctrine") || lowerQ.includes("ultra vires") || lowerQ.includes("indoor")) {
      detailedHtml += `<h3>📊 Key Doctrines</h3>${getDoctrinesTable()}`;
    }
    return detailedHtml;
  }

  function updateSuggestions() {
    const val = searchInput.value.trim();
    if (!val) {
      suggestionsDiv.style.display = "none";
      return;
    }
    const matches = getMatches(val);
    if (matches.length === 0) {
      suggestionsDiv.style.display = "none";
      return;
    }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>📄</span> <strong>${escapeHtml(item.question.substring(0, 70))}</strong> <span style="margin-left:auto; background:#ede9fe; padding:2px 12px; border-radius:30px;">${escapeHtml(item.category)}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(q = null) {
    let query = (q !== null) ? q : searchInput.value.trim();
    if (!query) {
      resultsContainer.innerHTML = `<div class="not-found">✨ 100+ Questions loaded. Type: MOA, AOA, Prospectus, Ultra Vires, Object Clause, Shelf Prospectus ✨</div>`;
      return;
    }
    const matches = getMatches(query);
    if (matches.length === 0) {
      resultsContainer.innerHTML = `<div class="not-found">❌ No results found. Try: Memorandum of Association, Articles of Association, Object Clause, Ultra Vires, Prospectus, Shelf prospectus, Red Herring.</div>`;
      return;
    }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">⭐ ${escapeHtml(item.category)}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer:</strong><br>${escapeHtml(item.answer)}</div>
        <div class="action-buttons">
          <button class="detail-btn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${escapeAttr(item.category)}">📖 Detail Answer</button>
          <button class="ref-btn">📊 Reference Table</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".detail-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const questionText = btn.getAttribute("data-q");
        const item = qaDatabase.find(i => i.question === questionText);
        if (item) {
          showDetailPopup(item);
        } else {
          showDetailPopup({ question: questionText, answer: btn.getAttribute("data-a"), category: btn.getAttribute("data-cat") });
        }
      });
    });
    document.querySelectorAll(".ref-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        showReferenceTablePopup();
      });
    });
  }

  function showDetailPopup(item) {
    const detailedHtml = getDetailedAnswer(item);
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#4c1d95;">📖 Detailed Answer</h2>
      <div class="detail-section"><strong>❓ Question:</strong> ${escapeHtml(item.question)}</div>
      <div class="detail-section"><strong>📚 Category:</strong> ${escapeHtml(item.category)}</div>
      ${detailedHtml}
      <button id="closeDetailModal" style="background:#7c3aed; padding:10px 26px; border-radius:40px; color:white; margin-top:20px; cursor:pointer;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  }

  function showReferenceTablePopup() {
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#4c1d95;">📚 Chapter 4: Complete Reference Summary</h2>
      ${getChapterSummary()}
      <button id="closeRefModal" style="background:#0d9488; padding:10px 26px; border-radius:40px; color:white; margin-top:20px; cursor:pointer;">Close</button>
    `;
    document.getElementById("closeRefModal").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
  function escapeAttr(str) { if (!str) return ''; return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  
  function startVoice() {
    if (!('webkitSpeechRecognition' in window)) { alert("Voice search supported in Chrome/Edge."); return; }
    const recognition = new webkitSpeechRecognition();
    recognition.lang = "en-IN";
    recognition.start();
    recognition.onresult = (event) => {
      searchInput.value = event.results[0][0].transcript;
      performSearch();
      updateSuggestions();
    };
  }
  
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("input", () => {
    performSearch();
    updateSuggestions();
  });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => {
    if (!document.querySelector(".search-wrapper").contains(e.target)) {
      suggestionsDiv.style.display = "none";
    }
  });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  
  window.onload = () => {
    resultsContainer.innerHTML = `<div class="not-found">✨ 11th SP · Chapter 4: Documents Related to Formation of Company · 100+ Q&A · Start typing to search ✨</div>`;
  };
</script>
</body>
</html>
