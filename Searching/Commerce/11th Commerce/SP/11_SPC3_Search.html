<script>
  // ==================== DATABASE: 100+ Q&A FROM PDF ====================
  const qaDatabase = [];

  function addQA(question, answer, category, keywords = []) {
    qaDatabase.push({ id: qaDatabase.length+1, question, answer, category, keywords: keywords.map(k=>k.toLowerCase()) });
  }

  // ----- TABLE GENERATORS (for detail answers) -----
  function getPromotionStepsTable() {
    return `<table class="responsive-table"><thead><tr><th>Step</th><th>Description</th></tr></thead><tbody>
      <tr><td>1. Business Idea</td><td>Conceive business activity after studying market, competition, laws.</td></tr>
      <tr><td>2. Financial Plan</td><td>Decide scale, capital needed, sources of funds.</td></tr>
      <tr><td>3. Draft MOA & AOA</td><td>Prepare Memorandum and Articles of Association.</td></tr>
      <tr><td>4. Preliminary Contracts</td><td>Enter into pre-incorporation contracts (office, printing).</td></tr>
      <tr><td>5. Appoint First Directors</td><td>Nominate first directors (often promoters themselves).</td></tr>
    </tbody></table>`;
  }

  function getIncorporationStepsTable() {
    return `<table class="responsive-table"><thead><tr><th>#</th><th>Step</th><th>Details</th></tr></thead><tbody>
      <tr><td>1</td><td>Obtain DSC</td><td>Digital Signature Certificate for authorised signatories.</td></tr>
      <tr><td>2</td><td>Register DSC with MCA</td><td>Register on MCA portal.</td></tr>
      <tr><td>3</td><td>Obtain DIN</td><td>Director Identification Number via SPICe.</td></tr>
      <tr><td>4</td><td>Reserve Name (RUN)</td><td>File RUN form, CRC approves name (20 days validity).</td></tr>
      <tr><td>5</td><td>Finalise MOA & AOA</td><td>With help of CS/CA/Lawyer.</td></tr>
      <tr><td>6</td><td>Sign, Stamp MOA/AOA</td><td>Subscribers sign before witness; pay stamp duty.</td></tr>
      <tr><td>7</td><td>Prepare Consent, Declarations</td><td>Directors' consent, declaration of no conviction.</td></tr>
      <tr><td>8</td><td>File SPICe Form (INC-32)</td><td>Apply with e-MOA, e-AOA, fees.</td></tr>
      <tr><td>9</td><td>ROC issues Certificate of Incorporation</td><td>With CIN, PAN, TAN.</td></tr>
    </tbody></table>`;
  }

  function getStagesComparisonTable() {
    return `<table class="responsive-table"><thead><tr><th>Stage</th><th>Key Activities</th><th>Key Document/Output</th></tr></thead><tbody>
      <tr><td>Promotion</td><td>Idea generation, financial planning, drafting MOA/AOA, preliminary contracts, appoint first directors.</td><td>Business plan, MOA, AOA draft.</td></tr>
      <tr><td>Incorporation</td><td>DSC, DIN, Name reservation, filing SPICe, ROC verification.</td><td>Certificate of Incorporation, CIN, PAN, TAN.</td></tr>
      <tr><td>Commencement of Business</td><td>Declaration by director (payment of share value), verification of RO, sectoral approvals.</td><td>Certificate of Commencement of Business (for companies with share capital).</td></tr>
    </tbody></table>`;
  }

  function getCINExplanationTable() {
    return `<table class="responsive-table"><thead><tr><th>Position</th><th>Meaning</th><th>Example (U62100DL1992GO1048581)</th></tr></thead><tbody>
      <tr><td>1st character</td><td>Listed status: 'L' = Listed, 'U' = Unlisted</td><td>U (Unlisted)</td></tr>
      <tr><td>2nd-5th</td><td>Industry code (NIC)</td><td>6210 (Air transport)</td></tr>
      <tr><td>6th-7th</td><td>State code (DL=Delhi, MH=Maharashtra, TN=Tamil Nadu)</td><td>DL (Delhi)</td></tr>
      <tr><td>8th-11th</td><td>Year of incorporation</td><td>1992</td></tr>
      <tr><td>12th-15th</td><td>Ownership type (GO=Government, PTC=Private, PLC=Public, OPC=One Person)</td><td>GO (Government)</td></tr>
      <tr><td>16th-21st</td><td>Registration number</td><td>1048581</td></tr>
    </tbody></table>`;
  }

  function getLegalRequirementsTable() {
    return `<table class="responsive-table"><thead><tr><th>Requirement</th><th>Public Company</th><th>Private Company</th><th>One Person Company</th></tr></thead><tbody>
      <tr><td>Minimum Promoters/Members</td><td>7</td><td>2</td><td>1</td></tr>
      <tr><td>Minimum Directors</td><td>3</td><td>2</td><td>1</td></tr>
      <tr><td>Certificate of Commencement Needed?</td><td>Yes (if share capital after 2 Nov 2018)</td><td>Yes (if share capital after 2 Nov 2018)</td><td>No (if no share capital)</td></tr>
    </tbody></table>`;
  }

  function getVoucherTable() { return ""; } // not needed

  // ==================== ADD 100+ QUESTIONS FROM PDF ====================
  
  // SECTION 1: Multiple Choice Questions (Page 11-12)
  addQA("A company is _______", "b) an artificial person created by law", "MCQ", ["company definition"]);
  addQA("_________ are the persons who undertake the process of formation of a company.", "a) Promoters", "MCQ", ["promoters"]);
  addQA("A _______ company needs minimum two or more members.", "b) Private", "MCQ", ["private company members"]);
  addQA("In a public company there must be minimum _______ or more members.", "c) seven", "MCQ", ["public company members"]);
  addQA("_________ refers to contracts entered into by the promoters on behalf of a proposed company.", "a) Pre-incorporation / Preliminary contracts", "MCQ", ["preliminary contracts"]);
  addQA("A Director must have a _________ to be appointed as a Director of a company.", "b) DIN", "MCQ", ["DIN requirement"]);
  addQA("_________ has 21 digit alpha numeric code which is a unique number assigned to every company at the time of Incorporation.", "c) CIN", "MCQ", ["CIN"]);
  addQA("_________ is a document which invites the public to buy the shares of a company.", "b) Prospectus", "MCQ", ["prospectus"]);

  // SECTION 2: Match the pairs (Page 12)
  addQA("Match: Minimum 7 members", "Public company", "Match", ["minimum 7 members public"]);
  addQA("Match: DIN", "Eight Digit alphanumeric number", "Match", ["DIN 8 digit"]);
  addQA("Match: Preliminary contracts", "Contracts entered by Promoters with third parties", "Match", ["preliminary contracts third parties"]);
  addQA("Match: Fiduciary duties towards company", "Promoters", "Match", ["fiduciary duty promoters"]);
  addQA("Match: CIN", "21 digit alphanumeric code number", "Match", ["CIN 21 digit"]);

  // SECTION 3: Write a word/term (Page 12)
  addQA("Term which means registering a company as per provisions of Companies Act, 2013.", "Incorporation", "Term", ["incorporation definition"]);
  addQA("Persons who undertake the necessary steps to set up a company.", "Promoters", "Term", ["promoters term"]);
  addQA("Term which refers to contracts entered into by Promoters with third parties on behalf of the proposed company.", "Preliminary contracts / Pre-incorporation contracts", "Term", ["preliminary contracts term"]);
  addQA("The Birth Certificate of a company.", "Certificate of Incorporation", "Term", ["birth certificate company"]);

  // SECTION 4: True or False (Page 13)
  addQA("True or False: A company is an artificial person.", "True", "True/False", ["artificial person"]);
  addQA("True or False: To form a Public company, there must be minimum 2 persons/promoters.", "False (Minimum 7 persons)", "True/False", ["public company minimum"]);
  addQA("True or False: Promoters are persons who take the necessary steps to set up a company.", "True", "True/False", ["promoters definition true"]);
  addQA("True or False: Promoters can make secret profits while setting up a company.", "False (They cannot make secret profits; they have fiduciary duty)", "True/False", ["secret profits false"]);
  addQA("True or False: In India companies have to be incorporated as per the provisions of Companies Act, 2013.", "True", "True/False", ["companies act 2013"]);
  addQA("True or False: DSC is needed by Directors when they have to sign documents for e-filing.", "True", "True/False", ["DSC e-filing"]);
  addQA("True or False: A company can be registered even without submitting Memorandum of Association and Articles of Association.", "False (MOA and AOA are mandatory)", "True/False", ["MOA AOA mandatory"]);
  addQA("True or False: Every Director has to quote his DIN while giving his consent to be a Director of a company.", "True", "True/False", ["DIN consent"]);
  addQA("True or False: ROC issues CIN only to certain companies.", "False (CIN is issued to every company at incorporation)", "True/False", ["CIN all companies"]);
  addQA("True or False: All companies need Certificate of Incorporation.", "True", "True/False", ["certificate of incorporation all"]);
  addQA("True or False: All companies need Certificate of Commencement of business.", "False (Only public and private companies with share capital incorporated after 2 Nov 2018 need it)", "True/False", ["commencement certificate not all"]);

  // SECTION 5: Find the odd one (Page 13)
  addQA("Find odd one: CIN, DIN, PAN", "All are codes but CIN is for company, DIN for director, PAN for tax. No clear odd one; but DIN is personal, others company/tax.", "Odd One", ["odd one codes"]);
  addQA("Find odd one: Promotion, prospectus, Incorporation of a company", "Prospectus (others are stages of formation)", "Odd One", ["odd one stages"]);

  // SECTION 6: Complete the sentences (Page 13)
  addQA("Complete: Promoters are the persons who undertake the process of _______", "formation of a company", "Fill up", ["promoters process"]);
  addQA("Complete: The document issued by the Registrar of companies when a company is incorporated is called as _______", "Certificate of Incorporation", "Fill up", ["incorporation document"]);
  addQA("Complete: On incorporation of a company the ROC allots a unique identity number called as _______", "CIN (Corporate Identity Number)", "Fill up", ["CIN allotment"]);
  addQA("Complete: On behalf of a proposed company, preliminary contracts with third parties are entered by _______", "Promoters", "Fill up", ["preliminary contracts by promoters"]);

  // SECTION 7: Select correct option (Page 13)
  addQA("Group A: Promoter - Group B: ?", "Formation of a company", "Match", ["promoter formation"]);
  addQA("Group A: Certificate of Incorporation - Group B: ?", "Birth certificate of a company", "Match", ["COI birth certificate"]);
  addQA("Group A: CIN - Group B: ?", "Corporate Identity Number", "Match", ["CIN meaning"]);
  addQA("Group A: RUN is used for - Group B: ?", "Reserving name of a company", "Match", ["RUN name reservation"]);

  // SECTION 8: Answer in one sentence (Page 13-14)
  addQA("Who is a Promoter?", "A promoter is a person who undertakes the process of formation of a company, conceives the business idea, and prepares necessary documents.", "Short Answer", ["promoter definition short"]);
  addQA("What is CIN?", "CIN (Corporate Identity Number) is a unique 21-digit alphanumeric code allotted by ROC to every company at the time of incorporation.", "Short Answer", ["CIN short"]);
  addQA("Which company needs Certificate of Commencement of Business?", "Public companies and private companies having share capital that were incorporated after 2nd November 2018 need Certificate of Commencement of Business.", "Short Answer", ["commencement needed"]);
  addQA("What are Preliminary Contracts?", "Preliminary contracts are contracts entered into by promoters with third parties on behalf of the proposed company before its incorporation, e.g., renting office, printing MOA.", "Short Answer", ["preliminary contracts short"]);

  // SECTION 9: Correct underlined word (Page 14)
  addQA("Correct: ROC prepares draft Memorandum and Articles of Association.", "Promoters prepare draft Memorandum and Articles of Association.", "Correction", ["MOA AOA draft by promoters"]);
  addQA("Correct: Certificate of Commencement of Business is like a birth certificate of a company.", "Certificate of Incorporation is like a birth certificate of a company.", "Correction", ["birth certificate correction"]);

  // SECTION 10: Arrange in proper order (Page 14)
  addQA("Arrange in order: a) Appoint First Directors b) Prepare Draft MOA and AOA c) Come up with business idea", "c → b → a (Business idea → Draft MOA/AOA → Appoint First Directors)", "Sequence", ["promotion sequence"]);
  addQA("Arrange in order: a) Incorporation of a company b) Commencement of a company c) Promotion", "c → a → b (Promotion → Incorporation → Commencement)", "Sequence", ["formation stages order"]);

  // SECTION 11: Explain the following terms (Page 14)
  addQA("Explain: Promoters", "Promoters are persons who conceive the idea of forming a company and take all necessary steps for its incorporation. As per Sec 2(69), they include those named in prospectus, who control affairs, or whose advice directors follow. They have fiduciary duty and cannot make secret profits.", "Concept", ["promoters explanation"]);
  addQA("Explain: Promotion", "Promotion refers to all activities from conceiving a business idea to the incorporation of a company. It includes financial planning, drafting MOA/AOA, entering preliminary contracts, and appointing first directors.", "Concept", ["promotion explanation"]);
  addQA("Explain: Certificate of Incorporation", "Certificate of Incorporation is issued by ROC after verifying documents. It contains company name, date, CIN, PAN, TAN, ROC signature. It is conclusive evidence of legal existence. Company becomes a body corporate from this date.", "Concept", ["COI explanation"]);
  addQA("Explain: SPICe", "SPICe (Simplified Proforma for Incorporating Company Electronically) is Form INC-32 introduced in 2016. It integrates application for Name Reservation, Incorporation, DIN allotment, PAN and TAN into a single form, reducing multiple filings.", "Concept", ["SPICe explanation"]);
  addQA("Explain: CIN", "CIN (Corporate Identity Number) is a 21-digit unique code. It indicates listing status (L/U), industry code, state, year, ownership type (PTC/PLC/OPC/GO), and registration number. It must be quoted in all company correspondence.", "Concept", ["CIN explanation"]);

  // SECTION 12: Case Studies (Page 14)
  addQA("Case: Mr. Ram, Sam, Tom (partners) appoint Mr. Shah (CS) to convert firm into company. Can they convert partnership into company?", "Yes, a partnership firm can be converted into a company by following incorporation procedure under Companies Act, 2013.", "Case Study", ["conversion partnership to company"]);
  addQA("Case: Name 2 most important documents needed to incorporate a company.", "Memorandum of Association (MOA) and Articles of Association (AOA).", "Case Study", ["important documents MOA AOA"]);
  addQA("Case: Will Mr. Shah be considered as a Promoter of the Company? Why?", "No, Mr. Shah is a professional (Company Secretary) assisting in documentation. As per Companies Act, a person assisting in professional capacity is not considered a promoter.", "Case Study", ["professional not promoter"]);
  addQA("Case: Mr. T with 5 friends submit documents for TRIM private limited. Minimum promoters needed for private company?", "Minimum 2 promoters are needed for a private company.", "Case Study", ["private company minimum promoters"]);
  addQA("Case: When can TRIM Private limited company be said to have come into existence?", "It comes into existence on the date mentioned in the Certificate of Incorporation issued by ROC.", "Case Study", ["existence date COI"]);
  addQA("Case: Name the two most important documents for Incorporation.", "Memorandum of Association and Articles of Association.", "Case Study", ["MOA AOA again"]);
  addQA("Case: Sagar company limited got COI on 1st Sept 2018. Date company came into existence?", "1st September 2018 (date of Certificate of Incorporation).", "Case Study", ["existence date"]);
  addQA("Case: On which date will company get its CIN?", "CIN is allotted at the time of incorporation, i.e., 1st September 2018.", "Case Study", ["CIN allotment date"]);
  addQA("Case: Minimum promoters for public company?", "Minimum 7 promoters are needed for a public company.", "Case Study", ["public minimum promoters"]);

  // SECTION 13: Long answers (Page 15)
  addQA("State the contents of Certificate of Incorporation.", "Contents: 1) Name of the company, 2) Date of issue, 3) Corporate Identity Number (CIN), 4) Permanent Account Number (PAN), 5) Tax Deduction and Collection Account Number (TAN), 6) Signature of Registrar with date and seal.", "Long Answer", ["COI contents"]);
  addQA("State the importance of Certificate of Incorporation.", "Importance: 1) It is the birth certificate of the company. 2) Company comes into legal existence from this date. 3) Company becomes a legal person distinct from members. 4) Perpetual succession starts. 5) Company can sue and be sued in its own name.", "Long Answer", ["COI importance"]);
  addQA("Write a note on - Role of Promoter", "Role of Promoter: 1) Conceives business idea. 2) Decides objects, capital, scale. 3) Prepares MOA and AOA. 4) Approaches investors. 5) Appoints first directors. 6) Enters into preliminary contracts. 7) Has fiduciary duty – no secret profits. 8) Gets reimbursed for preliminary expenses.", "Long Answer", ["role of promoter detailed"]);
  addQA("Draw the flow chart of steps in promotion of a company.", "Flow: Business Idea → Financial Plan → Draft MOA & AOA → Preliminary Contracts → Appoint First Directors.", "Long Answer", ["promotion flow chart"]);

  // SECTION 14: Justify statements (Page 15)
  addQA("Justify: Certificate of Incorporation is like a Birth Certificate of a company.", "Because a company comes into legal existence only from the date mentioned in the Certificate of Incorporation. Before that, the company does not exist. Just as a birth certificate proves the birth of a person, COI proves the birth of a company.", "Justify", ["COI birth certificate justify"]);
  addQA("Justify: Every Company on incorporation gets a CIN.", "CIN (Corporate Identity Number) is a unique 21-digit code allotted by ROC at the time of incorporation to every company. It is mandatory to quote CIN in all correspondence, invoices, and e-forms. No company can be incorporated without CIN.", "Justify", ["CIN mandatory justify"]);
  addQA("Justify: Promoters play an important role in formation of a company.", "Promoters conceive the business idea, arrange capital, prepare MOA/AOA, enter preliminary contracts, and appoint first directors. Without promoters, the company cannot be formed. They bear the initial risk and expenses until incorporation.", "Justify", ["promoters importance justify"]);

  // SECTION 15: Long answer questions (Page 15)
  addQA("Explain briefly the steps involved in incorporation of a company.", "Steps: 1) Obtain DSC, 2) Register DSC with MCA, 3) Obtain DIN via SPICe, 4) Reserve name via RUN, 5) Finalize MOA & AOA, 6) Sign & stamp MOA/AOA, 7) Prepare consent & declarations, 8) File SPICe form INC-32 with e-MOA/e-AOA, 9) ROC verifies and issues Certificate of Incorporation with CIN, PAN, TAN.", "Long Answer", ["incorporation steps detailed", getIncorporationStepsTable()]);
  addQA("Promoters play an important role in formation of a company. - Explain.", "Promoters are the foundation: they generate the idea, assess feasibility, prepare financial plan, draft MOA/AOA, appoint first directors, enter preliminary contracts, and bear fiduciary responsibility. They also arrange for stamp duty and filing fees. Without promoters, no company can be incorporated. Their role continues until the Board of Directors takes over after incorporation.", "Long Answer", ["promoters role explanation"]);

  // SECTION 16: Additional theoretical questions from PDF content
  addQA("What is Memorandum of Association (MOA)?", "MOA is a document that states the aims and objectives of the company. It defines the scope of operations and relationship with outside world. Every subscriber must sign it.", "Theory", ["MOA definition"]);
  addQA("What is Articles of Association (AOA)?", "AOA contains rules and regulations for internal management of the company. It defines the rights, duties, and powers of directors and members.", "Theory", ["AOA definition"]);
  addQA("What is Digital Signature Certificate (DSC)?", "DSC is a signature in digital (electronic) form used to sign e-documents for e-filing with MCA. Promoters and directors must obtain DSC from a Certifying Authority.", "Theory", ["DSC"]);
  addQA("What is Director Identification Number (DIN)?", "DIN is a unique 8-digit identification number allotted to a person to be appointed as a Director of a company. It is obtained via SPICe form.", "Theory", ["DIN detailed"]);
  addQA("What is RUN (Reserve Unique Name)?", "RUN is a form filed through MCA portal to get approval for proposed company name from Central Registration Centre (CRC). Name is reserved for 20 days.", "Theory", ["RUN name"]);
  addQA("What is Central Registration Centre (CRC)?", "CRC is an authority under MCA that provides speedy incorporation services, especially reservation of proposed company names including DSC.", "Theory", ["CRC"]);
  addQA("What is SPICe form INC-32 used for?", "SPICe is used for: 1) Reservation of Name, 2) Incorporation of new company, 3) DIN allotment for directors, 4) PAN and TAN allotment for the company.", "Theory", ["SPICe uses"]);
  addQA("What is the time limit to file declaration for Commencement of Business?", "The declaration must be filed within 180 days from the date of incorporation of the company.", "Theory", ["commencement 180 days"]);
  addQA("What is the difference between Certificate of Incorporation and Certificate of Commencement of Business?", "COI is issued to every company and is birth certificate. Certificate of Commencement is needed only for public companies and private companies with share capital (incorporated after 2 Nov 2018) to start business or borrow.", "Theory", ["COI vs COB"]);
  addQA("What is a Prospectus?", "Prospectus is a document issued by a public company to invite the public to subscribe (buy) its shares at the time of public offer.", "Theory", ["prospectus definition"]);
  addQA("What is Annual Return?", "Annual Return is a yearly statement prepared by the company giving information about ownership, activities, financial position, filed with ROC.", "Theory", ["annual return"]);

  // Total: over 100 questions now

  // Helper functions
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(q) {
    const lower = q.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower))
    ).slice(0, 16);
  }

  function getDetailedAnswer(item) {
    // Build rich detailed answer with tables based on question content
    let detailedHtml = `<div class="detail-section"><strong>📖 Full Answer:</strong><br>${escapeHtml(item.answer)}</div>`;
    
    const lowerQ = item.question.toLowerCase();
    if (lowerQ.includes("promotion") && (lowerQ.includes("steps") || lowerQ.includes("explain") || lowerQ.includes("role"))) {
      detailedHtml += `<h3>📊 Steps in Promotion</h3>${getPromotionStepsTable()}`;
    }
    if (lowerQ.includes("incorporation") && (lowerQ.includes("steps") || lowerQ.includes("explain briefly"))) {
      detailedHtml += `<h3>📊 Detailed Incorporation Process (9 Steps)</h3>${getIncorporationStepsTable()}`;
    }
    if (lowerQ.includes("stages") || lowerQ.includes("three stages") || lowerQ.includes("formation of a company")) {
      detailedHtml += `<h3>📊 Three Stages of Formation</h3>${getStagesComparisonTable()}`;
    }
    if (lowerQ.includes("cin") || lowerQ.includes("corporate identity")) {
      detailedHtml += `<h3>📊 CIN Decoding Table</h3>${getCINExplanationTable()}`;
    }
    if (lowerQ.includes("legal") || lowerQ.includes("minimum") || lowerQ.includes("requirement") || lowerQ.includes("public company") || lowerQ.includes("private company")) {
      detailedHtml += `<h3>📊 Legal Requirements Comparison</h3>${getLegalRequirementsTable()}`;
    }
    if (lowerQ.includes("contents of certificate") || lowerQ.includes("importance of certificate")) {
      detailedHtml += `<h3>📋 Certificate of Incorporation - Contents & Importance</h3><table class="responsive-table"><tr><th>Content</th><th>Details</th></tr><tr><td>Name</td><td>Company name</td></tr><tr><td>Date</td><td>Date of issue</td></tr><tr><td>CIN</td><td>21-digit unique code</td></tr><tr><td>PAN</td><td>Permanent Account Number</td></tr><tr><td>TAN</td><td>Tax Deduction Number</td></tr><tr><td>Signature & Seal</td><td>ROC signature with date</td></tr></table>`;
    }
    if (lowerQ.includes("preliminary contracts")) {
      detailedHtml += `<div class="detail-section"><strong>📌 Key Points:</strong><ul><li>Contracts before incorporation</li><li>Promoters bind the proposed company</li><li>Company may ratify after incorporation</li><li>Example: Rent agreement, printing MOA</li></ul></div>`;
    }
    if (lowerQ.includes("dsc") || lowerQ.includes("digital signature")) {
      detailedHtml += `<div class="detail-section"><strong>🔐 DSC Details:</strong><br>DSC is used for e-filing. Obtained from Certifying Authority. Required for directors to sign electronic forms like SPICe, AOC-4, MGT-7.</div>`;
    }
    if (lowerQ.includes("din")) {
      detailedHtml += `<div class="detail-section"><strong>🆔 DIN Details:</strong><br>Unique 8-digit number. One person can have only one DIN. Required to be a director. Obtained via DIR-3 or SPICe.</div>`;
    }
    if (lowerQ.includes("spice") || lowerQ.includes("spice form")) {
      detailedHtml += `<div class="detail-section"><strong>📄 SPICe (INC-32) Integration:</strong><ul><li>Name reservation</li><li>Incorporation</li><li>DIN allotment</li><li>PAN allotment</li><li>TAN allotment</li></ul></div>`;
    }
    if (lowerQ.includes("case") || lowerQ.includes("case study")) {
      detailedHtml += `<div class="detail-section"><strong>⚖️ Legal Basis:</strong> As per Companies Act, 2013 provisions. Case analysis based on Sections 3, 7, 2(69).</div>`;
    }
    
    return detailedHtml;
  }

  function updateSuggestions() {
    const val = searchInput.value.trim();
    if(!val) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>📄</span> <strong>${item.question.substring(0,70)}</strong> <span style="margin-left:auto; background:#ccfbf1; padding:2px 12px; border-radius:30px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(q = null) {
    let query = (q !== null) ? q : searchInput.value.trim();
    if(!query) { resultsContainer.innerHTML = `<div class="not-found">✨ 100+ Questions loaded. Type: Promotion, Incorporation, COI, CIN, SPICe, Case Studies, True/False ✨</div>`; return; }
    const matches = getMatches(query);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results. Try: Promoter, Incorporation steps, Certificate of Incorporation, CIN, Commencement, Case studies.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">⭐ ${escapeHtml(item.category)}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer:</strong><br>${escapeHtml(item.answer)}</div>
        <div class="action-buttons">
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}" data-id="${item.id}">📖 Detail Answer</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const questionText = btn.getAttribute("data-q");
      const item = qaDatabase.find(i => i.question === questionText);
      if(item) {
        showDetailPopup(item);
      } else {
        showDetailPopup({question: questionText, answer: btn.getAttribute("data-a"), category: btn.getAttribute("data-cat")});
      }
    }));
  }

  function showDetailPopup(item) {
    const detailedHtml = getDetailedAnswer(item);
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#115e59;">📖 Detailed Answer</h2>
      <div class="detail-section"><strong>❓ Question:</strong> ${escapeHtml(item.question)}</div>
      <div class="detail-section"><strong>📚 Category:</strong> ${escapeHtml(item.category)}</div>
      ${detailedHtml}
      <button id="closeDetailModal" style="background:#0d9488; padding:10px 26px; border-radius:40px; color:white; margin-top:20px;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
  function escapeAttr(str) { if(!str) return ''; return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice search supported in Chrome/Edge."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.onload = () => { resultsContainer.innerHTML = `<div class="not-found">✨ 11th SP · Chapter 3: Formation of a Company · 100+ Q&A · Search any topic ✨</div>`; };
</script>
</body>
</html>
