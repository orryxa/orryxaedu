<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📋 OCM Chapter 2 | Functions of Management | Planning to Controlling</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #fef9e3, #fff4e6);
      min-height: 100vh;
      padding: 24px 18px;
      color: #1e293b;
      overflow-y: scroll;
      scrollbar-width: thin;
    }
    .container { max-width: 1300px; margin: 0 auto; }
    .heading { text-align: center; margin-bottom: 35px; animation: slideDown 0.5s ease; }
    .heading h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #b45309, #ea580c, #f59e0b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .heading p { color: #9a3412; margin-top: 10px; font-weight: 600; background: #ffffffcc; display: inline-block; padding: 5px 18px; border-radius: 40px; backdrop-filter: blur(4px);}
    .search-wrapper { position: relative; margin-bottom: 32px; }
    .search-box {
      background: white;
      border-radius: 60px;
      padding: 6px 6px 6px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
      border: 1px solid #fed7aa;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      padding: 15px 0;
      background: transparent;
      color: #0f172a;
      font-weight: 500;
    }
    .icon-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #ea580c, #c2410c);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(234,88,12,0.4);
    }
    .icon-btn:hover { transform: scale(1.05); background: #ea580c; }
    .suggestions-dropdown {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      right: 0;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
      z-index: 120;
      max-height: 280px;
      overflow-y: auto;
      display: none;
      border: 1px solid #fed7aa;
    }
    .suggestion-item {
      padding: 14px 24px;
      color: #0f172a;
      cursor: pointer;
      border-bottom: 1px solid #fff0e0;
      display: flex;
      gap: 14px;
      align-items: center;
      transition: 0.2s;
    }
    .suggestion-item:hover { background: #ffedd5; padding-left: 32px; }
    .result-container { display: flex; flex-direction: column; gap: 24px; margin-top: 20px; }
    .result-card {
      background: white;
      border-radius: 32px;
      padding: 1.8rem;
      color: #0f172a;
      box-shadow: 0 12px 30px -10px rgba(0,0,0,0.08);
      transition: 0.25s ease;
      border: 1px solid #fed7aa;
    }
    .result-card:hover { transform: translateY(-4px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.12); }
    .badge {
      background: #ffedd5;
      color: #9a3412;
      display: inline-block;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .result-card h3 {
      color: #9a3412;
      font-size: 1.35rem;
      border-left: 6px solid #f59e0b;
      padding-left: 18px;
      margin-bottom: 18px;
      font-weight: 700;
    }
    .answer-text {
      background: #fffbeb;
      padding: 18px 24px;
      border-radius: 28px;
      line-height: 1.7;
      margin: 12px 0;
      border: 1px solid #fde68a;
    }
    .formula-box {
      background: #fef3c7;
      padding: 12px 18px;
      border-radius: 28px;
      font-family: monospace;
      font-size: 0.95rem;
      margin: 14px 0;
      text-align: center;
      border-left: 6px solid #ea580c;
      font-weight: 600;
    }
    .responsive-table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.85rem;
      overflow-x: auto;
      display: block;
      border-radius: 20px;
      overflow: hidden;
    }
    .responsive-table th, .responsive-table td {
      border: 1px solid #e2e8f0;
      padding: 12px 10px;
      text-align: left;
      background: white;
    }
    .responsive-table th { background: #ea580c; color: white; font-weight: 700; }
    .action-buttons { margin-top: 22px; display: flex; gap: 15px; flex-wrap: wrap; }
    .action-buttons button {
      border: none;
      padding: 10px 26px;
      border-radius: 50px;
      font-weight: 700;
      background: #f1f5f9;
      color: #1e293b;
      cursor: pointer;
      transition: 0.2s;
    }
    .action-buttons button:last-child { background: #f59e0b; color: #2d2a1e; box-shadow: 0 2px 8px rgba(245,158,11,0.3);}
    .action-buttons button:hover { transform: scale(0.97); opacity: 0.9; }
    .not-found {
      background: #fef9e3;
      border-radius: 48px;
      padding: 2.5rem;
      text-align: center;
      font-size: 1.1rem;
      color: #b45309;
      border: 1px solid #ffedd5;
    }
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .popup-box {
      background: white;
      max-width: 850px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 48px;
      padding: 30px 34px;
      position: relative;
      color: #1e293b;
    }
    .close-popup {
      position: absolute;
      top: 18px;
      right: 22px;
      background: #fee2e2;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .lang-section { background: #f8fafc; padding: 18px; border-radius: 28px; margin-bottom: 20px; border-left: 5px solid #f59e0b; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 650px) {
      body { padding: 16px 12px; }
      .heading h1 { font-size: 1.4rem; }
      .result-card h3 { font-size: 1.1rem; }
      .result-card { padding: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="heading">
    <h1>⚙️ Functions of Management | OCM Chapter 2</h1>
    <p>📌 Planning · Organising · Staffing · Directing · Coordinating · Controlling</p>
  </div>
  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔎 Search: Planning, Importance of Organising, Staffing definition, Directing, Controlling process, Coordination benefits...">
      <button class="icon-btn" id="voiceBtn">🎤</button>
    </div>
    <div id="suggestionsList" class="suggestions-dropdown"></div>
  </div>
  <div class="result-container" id="resultsContainer">
    <div class="not-found">📖 Type above — Explore all 6 Functions of Management: Planning, Organising, Staffing, Directing, Coordinating, Controlling ✨</div>
  </div>
</div>
<div class="popup-overlay" id="popupModal">
  <div class="popup-box">
    <button class="close-popup" id="closeModalBtn">✖</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  // ==================== DATABASE: FUNCTIONS OF MANAGEMENT (OCM Chapter 2) ====================
  const qaDatabase = [];

  function addQA(question, answer, category, keywords = []) {
    qaDatabase.push({ id: qaDatabase.length+1, question, answer, category, keywords: keywords.map(k=>k.toLowerCase()) });
  }

  // ---------- 1. PLANNING ----------
  addQA("What is the meaning of Planning?", "Planning is deciding in advance what to do, how to do it, when to do it, and who is to do it. It bridges the gap from where we are to where we want to go. It is an intellectual process of logical thinking and rational decision making.", "Planning", ["planning definition", "meaning of planning"]);
  addQA("State any two definitions of Planning.", "1) Koontz & O'Donnell: 'Planning is deciding in advance what to do, how to do it, when to do it, and who is to do it.' 2) James Stoner: 'Planning is the process of establishing goals and a suitable course of action for achieving these goals.'", "Planning", ["planning definition"]);
  addQA("What are the importance points of Planning?", "1) Helps to set clear objectives 2) Provides path of action 3) Improves performance 4) Minimizes risk 5) Optimum utilization of resources 6) Helps in decision making 7) Sets standards for controlling 8) Facilitates coordination 9) Facilitates other functions 10) Promotes innovative ideas.", "Planning", ["importance of planning", "planning importance"]);
  addQA("How does Planning minimize risk?", "Planning is based on forecasting technique. It looks into future and anticipates future changes. By deciding tasks in advance, it reduces uncertainty and minimizes business risks.", "Planning", []);
  addQA("Why is Planning called the fundamental function?", "Planning is the basic and first function of management. Every other function (organizing, staffing, directing, controlling) is based on planning. Without planning, no other function can be performed effectively.", "Planning", ["planning first function"]);

  // ---------- 2. ORGANISING ----------
  addQA("Define Organising.", "Organising is the process of identifying, bringing required resources together (men, money, material, machine, method), grouping and arranging them properly for achieving objectives. According to Koontz & O'Donnell, 'Organization involves the grouping of activities necessary to accomplish goals and plans.'", "Organising", ["organising definition"]);
  addQA("What is the importance of Organising?", "1) Facilitates Administration & Operation 2) Brings Specialization 3) Defines Jobs Properly 4) Clarifies Authority & Responsibility 5) Establishes Coordination 6) Helps Effective Administration 7) Helpful for Growth & Diversification 8) Creates Sense of Security 9) Scope for Innovation 10) Optimum Utilization of Resources.", "Organising", ["importance of organising"]);
  addQA("How does Organising bring specialization?", "Organisational structure divides work into units and departments. This division of work helps in bringing specialization in various activities, which leads to increase in organisational efficiency.", "Organising", []);
  addQA("What is the meaning of 'A place for everything and everything in its place' in Organising?", "This refers to the principle of order within organising function. It ensures that human resources and materials are placed at the right place at the right time for maximum efficiency.", "Organising", []);

  // ---------- 3. STAFFING ----------
  addQA("Define Staffing.", "Staffing is the process of attracting, recruiting, selecting, placing, appraising, remunerating, developing and retaining the best workforce. According to Theo Haimann, 'The staffing function pertains to the recruitment, selection, development, training and compensation of subordinate managers.'", "Staffing", ["staffing definition"]);
  addQA("What is the importance of Staffing?", "1) Effective Managerial Function 2) Leads to Effective Utilization of Human Resources 3) Builds Cordial Relationship 4) Helps Human Resource Development 5) Helps in Effective use of Technology 6) Improves Efficiency 7) Long Term Effect 8) Essential Contribution 9) Provides Job Satisfaction 10) Maintains Harmony.", "Staffing", ["importance of staffing"]);
  addQA("What is meant by 'Right person at the right job with right pay'?", "This is the basic principle of staffing. It means selecting and placing employees based on their qualifications, skills, and experience, and compensating them fairly according to their role and performance.", "Staffing", []);
  addQA("Why is staffing a continuous process?", "Staffing is continuous because vacancies arise due to promotion, transfer, retirement, resignation, death, or business expansion. The organization constantly needs to recruit, train, and develop employees.", "Staffing", []);

  // ---------- 4. DIRECTING ----------
  addQA("Define Directing.", "Directing is the process of instructing, guiding, communicating, inspiring, motivating and supervising employees to achieve predetermined goals. It is called the 'Life Spark of an Enterprise'. According to Theo Haimann, 'Direction consists of the process and techniques utilizing in issuing instructions.'", "Directing", ["directing definition"]);
  addQA("What is the importance of Directing?", "1) Initiates Action 2) Integrates Efforts 3) Means of Motivation 4) Provides Stability 5) Coping with Changes 6) Effective Utilization of Resources 7) Creates Team Spirit 8) Explores Capabilities 9) Increases Efficiency Level 10) Co-operation.", "Directing", ["importance of directing"]);
  addQA("Why is Directing called the 'soul of management'?", "Directing brings plans into action. It activates employees to work towards organizational goals. Without direction, plans remain idle. It guides, inspires, and leads people, hence called the soul of management.", "Directing", []);
  addQA("What are the elements of Directing?", "The main elements are: Supervision, Communication, Motivation, and Leadership. These help in guiding and inspiring subordinates effectively.", "Directing", []);

  // ---------- 5. COORDINATING ----------
  addQA("Define Coordinating.", "Coordination is the integration and synchronization of the efforts of a group so as to provide unity of action for organizational goals. According to Henry Fayol, 'To co-ordinate is to harmonise all the activities of a concern to facilitate its working and its success.'", "Coordinating", ["coordinating definition", "coordination"]);
  addQA("What is the importance of Coordinating?", "1) Encourages Team Spirit 2) Gives Proper Direction 3) Facilitates Motivation 4) Optimum Utilization of Resources 5) Achieve Organizational Objectives 6) Improves Relation 7) Leads to Higher Efficiency 8) Improves Goodwill 9) Unity of Direction 10) Specialization.", "Coordinating", ["importance of coordinating"]);
  addQA("Who said 'Coordination is the plus-value of the group'?", "Mary Parker Follett said 'Co-ordination is the plus-value of the group', meaning coordination adds extra value beyond individual efforts.", "Coordinating", []);
  addQA("How does coordination encourage team spirit?", "Coordination arranges work in a way that minimizes conflicts between individuals, departments, and employer-employee. It increases team spirit at workplace by creating harmony.", "Coordinating", []);

  // ---------- 6. CONTROLLING ----------
  addQA("Define Controlling.", "Controlling is the process of comparing actual performance with predetermined standards, measuring deviations, identifying causes, and suggesting corrective measures. According to Koontz & O'Donnell, 'Managerial control implies the measurement of accomplishment against the standard and correction of deviations.'", "Controlling", ["controlling definition"]);
  addQA("What is the importance of Controlling?", "1) Fulfilling Goals of Organization 2) Efficient Utilization of Resources 3) Accuracy of Standards 4) Motivates Employee 5) Ensures Order & Discipline 6) Facilitates Co-ordination 7) Psychological Pressure 8) Ensures Efficiency & Effectiveness 9) Builds Good Corporate Image 10) Acts as a Guide.", "Controlling", ["importance of controlling"]);
  addQA("What is the process of Controlling?", "The process involves: 1) Setting performance standards 2) Measuring actual performance 3) Comparing actual with standards 4) Identifying deviations 5) Analyzing causes of deviation 6) Taking corrective actions.", "Controlling", ["controlling process"]);
  addQA("Why is planning said to be the basis for controlling?", "Planning sets standards and goals. Controlling compares actual performance with those standards. Without planning, there would be no benchmarks for control. Hence planning provides the basis for controlling.", "Controlling", []);

  // ---------- COMPARATIVE & GENERAL ----------
  addQA("List all six functions of Management in order.", "1. Planning 2. Organising 3. Staffing 4. Directing 5. Coordinating 6. Controlling. Planning is the first and controlling is the last function, but they are interrelated.", "General", ["functions of management list"]);
  addQA("What is the difference between Planning and Controlling?", "Planning decides in advance what to do; Controlling checks whether actual performance matches the plan. Planning is forward-looking, Controlling is backward-looking. However, both are interrelated and form a cycle.", "Comparison", ["planning vs controlling"]);
  addQA("True/False: Every function of management is based on planning.", "True. Planning is the fundamental function. All other functions like organizing, staffing, directing, coordinating, controlling depend on planning.", "True/False", []);
  addQA("True/False: Coordination is not necessary for smooth flow of organizational activities.", "False. Coordination is essential for smooth flow of activities. It harmonizes different functions and departments.", "True/False", []);
  addQA("Fill in blank: The functions of management start with ______ function.", "Planning", "Fillup", []);
  addQA("Fill in blank: The functions of management end with ______ function.", "Controlling", "Fillup", []);
  addQA("Who defined 'Management is what manager does'?", "L.A. Allen defined 'Management is what manager does', focusing on the role of manager in form of different functions.", "General", []);
  
  // Tables: Comparison Table for 6 functions
  function getFunctionsComparisonTable() {
    return `<table class="responsive-table"><thead><tr><th>Function</th><th>Meaning</th><th>Key Focus</th></tr></thead><tbody>
      <tr><td>📌 Planning</td><td>Deciding in advance what, how, when, who</td><td>Setting objectives & selecting best course</td></tr>
      <tr><td>🏗️ Organising</td><td>Grouping activities & establishing authority</td><td>Bringing resources together</td></tr>
      <tr><td>👥 Staffing</td><td>Recruitment, selection, training & compensation</td><td>Right person at right job</td></tr>
      <tr><td>🧭 Directing</td><td>Instructing, guiding, motivating, supervising</td><td>Activating plans through people</td></tr>
      <tr><td>🤝 Coordinating</td><td>Harmonizing activities for unity of action</td><td>Integration & synchronization</td></tr>
      <tr><td>📊 Controlling</td><td>Comparing actual vs standard, corrective action</td><td>Ensuring goal achievement</td></tr>
    </tbody></table>`;
  }
  
  function getImportanceTable() {
    return `<table class="responsive-table"><thead><tr><th>Function</th><th>Top 3 Importance Points</th></tr></thead><tbody>
      <tr><td>Planning</td><td>Clear objectives, minimizes risk, sets control standards</td></tr>
      <tr><td>Organising</td><td>Specialization, defines jobs, optimum resource use</td></tr>
      <tr><td>Staffing</td><td>Human resource development, job satisfaction, efficiency</td></tr>
      <tr><td>Directing</td><td>Initiates action, motivation, coping with change</td></tr>
      <tr><td>Coordinating</td><td>Team spirit, unity of direction, higher efficiency</td></tr>
      <tr><td>Controlling</td><td>Fulfills goals, order & discipline, builds goodwill</td></tr>
    </tbody></table>`;
  }

  // Search and display logic
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(q) {
    const lower = q.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower))
    ).slice(0, 16);
  }

  function updateSuggestions() {
    const val = searchInput.value.trim();
    if(!val) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>⚙️</span> <strong>${item.question.substring(0,70)}</strong> <span style="margin-left:auto; background:#ffedd5; padding:2px 12px; border-radius:30px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(q = null) {
    let query = (q !== null) ? q : searchInput.value.trim();
    if(!query) { resultsContainer.innerHTML = `<div class="not-found">✨ Type keywords: Planning, Organising, Staffing, Directing, Coordinating, Controlling, Importance, Functions ✨</div>`; return; }
    const matches = getMatches(query);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results. Try: Planning importance, Staffing definition, Directing, Controlling process, Coordination benefits.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      let extra = "";
      const qtext = item.question.toLowerCase();
      if (qtext.includes("list all six") || (qtext.includes("functions of management") && qtext.includes("order"))) extra = getFunctionsComparisonTable();
      if (qtext.includes("difference between planning") || qtext.includes("planning vs controlling")) extra = `<div class="formula-box">📊 Planning: Deciding in advance, forward-looking. Controlling: Checking performance, corrective action. Both are interrelated.</div>`;
      if (item.category === "Planning" && qtext.includes("importance")) extra = `<div class="formula-box">🎯 Key: Clear objectives, path of action, minimises risk, decision making, sets control standards.</div>`;
      if (item.category === "Controlling" && qtext.includes("process")) extra = `<div class="formula-box">📋 Steps: Set standards → Measure performance → Compare → Identify deviation → Analyze cause → Corrective action.</div>`;
      
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">📌 ${escapeHtml(item.category)}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / Explanation:</strong><br>${escapeHtml(item.answer)}${extra}</div>
        <div class="action-buttons">
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}">📖 Detailed Explanation</button>
          <button class="extraTableBtn" data-type="${item.category}">📋 Functions Table</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a = btn.getAttribute("data-a"), cat = btn.getAttribute("data-cat");
      showDetailPopup(q, a, cat);
    }));
    document.querySelectorAll(".extraTableBtn").forEach(btn => btn.addEventListener("click", () => {
      const type = btn.getAttribute("data-type");
      let content = `<div class="lang-section"><strong>📚 Functions of Management - Quick Reference</strong><br>`;
      content += getFunctionsComparisonTable();
      content += `<hr><h4>🌟 Importance Highlights</h4>${getImportanceTable()}`;
      content += `</div>`;
      document.getElementById("popupModal").style.display = "flex";
      document.getElementById("modalContent").innerHTML = `<h2 style="color:#9a3412;">⚙️ Management Functions Overview</h2>${content}<button id="closeModalInside" style="background:#ea580c; margin-top:20px; padding:10px 26px; border-radius:40px; color:white;">Close</button>`;
      document.getElementById("closeModalInside").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
    }));
  }

  function showDetailPopup(question, answer, category) {
    let extraInfo = `<div class="lang-section"><strong>📖 OCM Chapter 2 - Functions of Management</strong><br>✔ Six Functions: Planning → Organising → Staffing → Directing → Coordinating → Controlling<br>✔ Planning: first & fundamental; sets standards for control<br>✔ Organising: grouping & arranging resources<br>✔ Staffing: HR recruitment & development<br>✔ Directing: guiding & motivating (soul of management)<br>✔ Coordinating: harmonizing efforts (plus-value of group)<br>✔ Controlling: comparing & corrective action</div>`;
    if(category === "Planning") extraInfo += `<div class="lang-section"><strong>📌 Planning Importance:</strong> Clear objectives, path of action, improves performance, minimizes risk, optimum resource use, decision making, sets control standards, coordination, promotes innovation.</div>`;
    if(category === "Staffing") extraInfo += `<div class="lang-section"><strong>👥 Staffing Importance:</strong> Effective managerial function, HR utilization, cordial relations, HR development, job satisfaction, harmony.</div>`;
    if(category === "Directing") extraInfo += `<div class="lang-section"><strong>🧭 Directing Elements:</strong> Supervision, Communication, Motivation, Leadership. Initiates action and integrates efforts.</div>`;
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#9a3412;">📘 Detailed Explanation</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Answer:</strong><br>${escapeHtml(answer)}</div>
      ${extraInfo}
      <button id="closeDetailModal" style="background:#f59e0b; padding:10px 26px; border-radius:40px; margin-top:12px;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
  function escapeAttr(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice search supported in Chrome/Edge."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
