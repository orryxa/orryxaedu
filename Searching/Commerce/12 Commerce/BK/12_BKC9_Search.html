<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📊 Analysis of Financial Statements | 12th BK Chap 9 | Ratios, Comparative & Common Size Statements</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #0c1a2a, #0a1020);
      min-height: 100vh;
      padding: 24px 18px;
      color: #f1f5f9;
      overflow-y: scroll;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    body::-webkit-scrollbar { display: none; }
    .container { max-width: 1300px; margin: 0 auto; }
    .heading { text-align: center; margin-bottom: 35px; animation: slideDown 0.6s ease; }
    .heading h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #ffffff, #60a5fa, #3b82f6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .heading p { color: #bfdbfe; margin-top: 10px; font-weight: 500; }
    .search-wrapper { position: relative; margin-bottom: 32px; }
    .search-box {
      background: rgba(255,255,255,0.97);
      border-radius: 60px;
      padding: 6px 6px 6px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.45);
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      padding: 15px 0;
      background: transparent;
      color: #0f172a;
      font-weight: 500;
    }
    .icon-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #2563eb, #1e40af);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }
    .icon-btn:hover { transform: scale(1.08); background: #2563eb; }
    .suggestions-dropdown {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      border-radius: 32px;
      box-shadow: 0 25px 40px -12px black;
      z-index: 120;
      max-height: 280px;
      overflow-y: auto;
      display: none;
    }
    .suggestion-item {
      padding: 14px 24px;
      color: #0f172a;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      gap: 14px;
      align-items: center;
      transition: 0.2s;
    }
    .suggestion-item:hover { background: #dbeafe; padding-left: 32px; }
    .result-container { display: flex; flex-direction: column; gap: 24px; margin-top: 20px; }
    .result-card {
      background: rgba(255,255,255,0.96);
      border-radius: 40px;
      padding: 1.8rem;
      color: #0f172a;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
      transition: 0.3s ease;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .result-card:hover { transform: translateY(-5px); }
    .badge {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #1e40af;
      display: inline-block;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .result-card h3 {
      color: #1e3a8a;
      font-size: 1.4rem;
      border-left: 6px solid #3b82f6;
      padding-left: 18px;
      margin-bottom: 18px;
      font-weight: 700;
    }
    .answer-text {
      background: #eff6ff;
      padding: 18px 24px;
      border-radius: 28px;
      line-height: 1.7;
      margin: 12px 0;
      border: 1px solid #dbeafe;
    }
    .formula-box {
      background: #e0e7ff;
      padding: 12px 18px;
      border-radius: 28px;
      font-family: monospace;
      font-size: 0.95rem;
      margin: 14px 0;
      text-align: center;
      border-left: 6px solid #3b82f6;
      font-weight: 600;
    }
    .responsive-table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.85rem;
      overflow-x: auto;
      display: block;
      border-radius: 24px;
      overflow: hidden;
    }
    .responsive-table th, .responsive-table td {
      border: 1px solid #e2e8f0;
      padding: 12px 10px;
      text-align: left;
      background: white;
    }
    .responsive-table th { background: #2563eb; color: white; font-weight: 700; }
    .action-buttons { margin-top: 22px; display: flex; gap: 15px; flex-wrap: wrap; }
    .action-buttons button {
      border: none;
      padding: 10px 26px;
      border-radius: 50px;
      font-weight: 700;
      background: #f1f5f9;
      color: #1e293b;
      cursor: pointer;
      transition: 0.2s;
    }
    .action-buttons button:last-child { background: #2563eb; color: white; box-shadow: 0 4px 10px rgba(37,99,235,0.3); }
    .action-buttons button:hover { transform: scale(0.97); opacity: 0.9; }
    .not-found {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 2.5rem;
      text-align: center;
      font-size: 1.1rem;
    }
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .popup-box {
      background: white;
      max-width: 850px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 48px;
      padding: 30px 34px;
      position: relative;
      color: #1e293b;
    }
    .close-popup {
      position: absolute;
      top: 18px;
      right: 22px;
      background: #fee2e2;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .lang-section { background: #f8fafc; padding: 18px; border-radius: 28px; margin-bottom: 20px; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 650px) {
      body { padding: 16px 12px; }
      .heading h1 { font-size: 1.4rem; }
      .result-card h3 { font-size: 1.1rem; }
      .responsive-table th, .responsive-table td { padding: 8px 5px; font-size: 0.7rem; }
      .result-card { padding: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="heading">
    <h1>📊 Analysis of Financial Statements | Chapter 9</h1>
    <p>⚡ Comparative Statement · Common Size Statement · Ratio Analysis · Cash Flow Statement</p>
  </div>
  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔎 Search: Current Ratio, Quick Ratio, Gross Profit Ratio, Comparative Balance Sheet, Common Size Statement, Cash Flow...">
      <button class="icon-btn" id="voiceBtn">🎤</button>
    </div>
    <div id="suggestionsList" class="suggestions-dropdown"></div>
  </div>
  <div class="result-container" id="resultsContainer">
    <div class="not-found">✨ Type above — Master Financial Statement Analysis, Ratios & Comparative Tools ✨</div>
  </div>
</div>
<div class="popup-overlay" id="popupModal">
  <div class="popup-box">
    <button class="close-popup" id="closeModalBtn">✖</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  // ---------- COMPLETE DATABASE: ANALYSIS OF FINANCIAL STATEMENTS (Chapter 9) ----------
  const qaDatabase = [];

  function addQA(question, answer, hindi, marathi, category, keywords = []) {
    qaDatabase.push({ id: qaDatabase.length+1, question, answer, hindi, marathi, category, keywords: keywords.map(k=>k.toLowerCase()) });
  }

  // ==================== CORE CONCEPTS ====================
  addQA("What is Financial Statement Analysis?", "Financial Statement Analysis is the process of critically examining financial statements to evaluate the profitability, efficiency, solvency, and growth of a business. It helps stakeholders make informed economic decisions.", "वित्तीय विवरण विश्लेषण लाभप्रदता, दक्षता, शोधन क्षमता और विकास का मूल्यांकन करने की प्रक्रिया है।", "आर्थिक विवरण विश्लेषण ही नफा, कार्यक्षमता, सॉल्व्हेंसी आणि वाढीचे मूल्यमापन करण्याची प्रक्रिया आहे.", "Core", ["financial statement analysis"]);
  addQA("What is Comparative Balance Sheet?", "Comparative Balance Sheet shows assets and liabilities for two or more years side by side, with absolute and percentage changes. It helps analyze trends and financial position over time. Formula: Absolute Change = Current Year - Previous Year; % Change = (Absolute Change / Previous Year) × 100.", "तुलनात्मक बैलेंस शीट दो या अधिक वर्षों की संपत्तियों और देनदारियों को साथ-साथ दिखाती है।", "तुलनात्मक ताळेबंद दोन किंवा अधिक वर्षांच्या मालमत्ता व देयता बाजूने दर्शवितो.", "Comparative", ["comparative balance sheet"]);
  addQA("What is Common Size Statement?", "Common Size Statement expresses each item as a percentage of a common base. For Balance Sheet, Total Fund Available = 100%. For Income Statement, Net Sales = 100%. It helps in inter-firm comparison and trend analysis.", "समान आकार विवरण प्रत्येक मद को एक सामान्य आधार के प्रतिशत के रूप में व्यक्त करता है।", "सामान्य आकार विवरण प्रत्येक बाब एका सामान्य आधाराच्या टक्केवारीत व्यक्त करतो.", "Common Size", ["common size statement"]);
  addQA("What is Current Ratio?", "Current Ratio measures short-term solvency. It is the ratio of Current Assets to Current Liabilities. Ideal ratio is 2:1. Formula: Current Ratio = Current Assets / Current Liabilities.", "वर्तमान अनुपात अल्पकालीन शोधन क्षमता मापता है। आदर्श अनुपात 2:1 है।", "चालू गुणोत्तर अल्पकालीन सॉल्व्हेंसी मोजते. आदर्श गुणोत्तर 2:1 आहे.", "Ratio", ["current ratio"]);
  addQA("What is Quick Ratio (Acid Test Ratio)?", "Quick Ratio measures immediate liquidity. It excludes stock and prepaid expenses from current assets. Ideal ratio is 1:1. Formula: Quick Ratio = Quick Assets / Quick Liabilities. Quick Assets = Current Assets - Stock - Prepaid Expenses.", "तरल अनुपात तत्काल तरलता मापता है। आदर्श अनुपात 1:1 है।", "तरल गुणोत्तर तात्काळ तरलता मोजते. आदर्श गुणोत्तर 1:1 आहे.", "Ratio", ["quick ratio", "acid test ratio"]);
  addQA("What is Gross Profit Ratio?", "Gross Profit Ratio shows the relationship between Gross Profit and Net Sales. It measures production efficiency. Formula: Gross Profit Ratio = (Gross Profit / Net Sales) × 100.", "सकल लाभ अनुपात सकल लाभ और शुद्ध बिक्री के बीच संबंध दिखाता है।", "स्थूल नफा गुणोत्तर स्थूल नफा व निव्वळ विक्री यातील संबंध दर्शवितो.", "Ratio", ["gross profit ratio"]);
  addQA("What is Operating Profit Ratio?", "Operating Profit Ratio indicates operational efficiency. Formula: Operating Profit Ratio = (Operating Profit / Net Sales) × 100, where Operating Profit = Gross Profit - Operating Expenses.", "परिचालन लाभ अनुपात परिचालन दक्षता दर्शाता है।", "कार्यरत नफा गुणोत्तर कार्यरत कार्यक्षमता दर्शवितो.", "Ratio", ["operating profit ratio"]);
  addQA("What is Net Profit Ratio?", "Net Profit Ratio measures overall profitability. Formula: Net Profit Ratio = (Net Profit / Net Sales) × 100. It shows the percentage of profit earned on sales.", "शुद्ध लाभ अनुपात समग्र लाभप्रदता मापता है।", "निव्वळ नफा गुणोत्तर एकूण नफा दर्शवितो.", "Ratio", ["net profit ratio"]);
  addQA("What is Operating Ratio?", "Operating Ratio expresses total operating costs as a percentage of Net Sales. Lower ratio indicates better efficiency. Formula: Operating Ratio = (Cost of Goods Sold + Operating Expenses) / Net Sales × 100.", "परिचालन अनुपात कुल परिचालन लागत को शुद्ध बिक्री के प्रतिशत के रूप में व्यक्त करता है।", "कार्यरत गुणोत्तर एकूण कार्यरत खर्च निव्वळ विक्रीच्या टक्केवारीत व्यक्त करतो.", "Ratio", ["operating ratio"]);
  addQA("What is Return on Capital Employed (ROCE)?", "ROCE measures profitability of capital employed. Formula: ROCE = (Net Profit before Interest and Tax) / Capital Employed × 100. Capital Employed = Fixed Assets + Current Assets - Current Liabilities.", "नियोजित पूंजी पर प्रतिलाभ नियोजित पूंजी की लाभप्रदता मापता है।", "नियोजित भांडवलावरील प्रत्याय नियोजित भांडवलाची नफाक्षमता मोजतो.", "Ratio", ["roce", "return on capital employed"]);

  // ==================== FORMULA TABLES ====================
  function getRatioFormulaTable() {
    return `<table class="responsive-table"><thead><tr><th>Ratio</th><th>Formula</th></tr></thead><tbody>
      <tr><td>Current Ratio</td><td>Current Assets / Current Liabilities (Ideal 2:1)</td></tr>
      <tr><td>Quick Ratio</td><td>Quick Assets / Quick Liabilities (Ideal 1:1)</td></tr>
      <tr><td>Gross Profit Ratio</td><td>(Gross Profit / Net Sales) × 100</td></tr>
      <tr><td>Operating Profit Ratio</td><td>(Operating Profit / Net Sales) × 100</td></tr>
      <tr><td>Net Profit Ratio</td><td>(Net Profit / Net Sales) × 100</td></tr>
      <tr><td>Operating Ratio</td><td>(COGS + Operating Expenses) / Net Sales × 100</td></tr>
      <tr><td>Return on Capital Employed</td><td>(Net Profit before Interest & Tax / Capital Employed) × 100</td></tr>
    </tbody></table>`;
  }
  function getComparativeStepsTable() {
    return `<table class="responsive-table"><thead><tr><th>Step</th><th>Action</th></tr></thead><tbody>
      <tr><td>Step 1</td><td>Enter items (Liabilities & Assets)</td></tr>
      <tr><td colspan="2"><strong>Formula for Absolute Change = Current Year - Previous Year</strong></td></tr>
      <tr><td colspan="2"><strong>Formula for % Change = (Absolute Change / Previous Year) × 100</strong></td></tr>
    </tbody></table>`;
  }

  // ==================== NUMERICAL EXAMPLES ====================
  addQA("Calculate Current Ratio: Debtors 60,000, Creditors 30,000, Bills Payable 20,000, Stock 30,000, Loose Tools 10,000, Bank Overdraft 10,000", "Current Assets = 60,000 + 30,000 + 10,000 = 1,00,000. Current Liabilities = 30,000 + 20,000 + 10,000 = 60,000. Current Ratio = 1,00,000 / 60,000 = 5:3 (1.67:1).", "वर्तमान अनुपात = 5:3", "चालू गुणोत्तर = 5:3", "Numerical", ["current ratio example"]);
  addQA("Calculate Gross Profit Ratio: Sales 5,40,000, Sales Return 40,000, Net Purchases 3,00,000, Opening Stock 90,000, Closing Stock 50,000", "Net Sales = 5,40,000 - 40,000 = 5,00,000. COGS = 90,000 + 3,00,000 - 50,000 = 3,40,000. Gross Profit = 5,00,000 - 3,40,000 = 1,60,000. Gross Profit Ratio = (1,60,000 / 5,00,000) × 100 = 32%.", "सकल लाभ अनुपात = 32%", "स्थूल नफा गुणोत्तर = 32%", "Numerical", ["gp ratio example"]);
  addQA("Calculate Operating Ratio: COGS 3,50,000, Operating Expenses 30,000, Sales 5,00,000, Sales Return 30,000", "Net Sales = 5,00,000 - 30,000 = 4,70,000. Operating Ratio = (3,50,000 + 30,000) / 4,70,000 × 100 = 3,80,000 / 4,70,000 × 100 = 80.85%.", "परिचालन अनुपात = 80.85%", "कार्यरत गुणोत्तर = 80.85%", "Numerical", ["operating ratio example"]);

  // ==================== THEORY ====================
  addQA("True/False: Ideal Current Ratio is 1:1", "False. Ideal Current Ratio is 2:1. Ideal Quick Ratio is 1:1.", "गलत। आदर्श वर्तमान अनुपात 2:1 है।", "चुकीचे. आदर्श चालू गुणोत्तर 2:1 आहे.", "True/False", ["ideal current ratio"]);
  addQA("True/False: Cash Flow Statement is a tool of financial analysis", "True. Cash Flow Statement is one of the important tools for financial analysis, along with Comparative Statements and Common Size Statements.", "सही। कैश फ्लो स्टेटमेंट वित्तीय विश्लेषण का एक महत्वपूर्ण उपकरण है।", "बरोबर. रोख प्रवाह विवरण हे आर्थिक विश्लेषणाचे एक महत्त्वाचे साधन आहे.", "True/False", ["cash flow tool"]);
  addQA("Fill in blank: Current Assets - Stock - Prepaid Expenses = ______ Assets.", "Quick", "तरल", "तरल", "Fillup", ["quick assets formula"]);

  // Helper functions
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(q) {
    const lower = q.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower))
    ).slice(0, 14);
  }

  function updateSuggestions() {
    const val = searchInput.value.trim();
    if(!val) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>📊</span> <strong>${item.question.substring(0,70)}</strong> <span style="margin-left:auto; background:#dbeafe; padding:2px 12px; border-radius:30px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(q = null) {
    let query = (q !== null) ? q : searchInput.value.trim();
    if(!query) { resultsContainer.innerHTML = `<div class="not-found">✨ Enter keywords: Current Ratio, Quick Ratio, Gross Profit Ratio, Comparative Statement, Cash Flow ✨</div>`; return; }
    const matches = getMatches(query);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results. Try: Current Ratio, Gross Profit Ratio, Comparative Balance Sheet, Common Size Statement.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      let extra = "";
      if ((item.question.toLowerCase().includes("ratio") && item.category === "Ratio") && !extra) extra = getRatioFormulaTable();
      if (item.question.toLowerCase().includes("comparative balance sheet") && item.category === "Comparative") extra = getComparativeStepsTable();
      if (item.category === "Numerical" && item.answer.includes("%") || item.answer.includes(":")) extra = `<div class="formula-box">📐 ${item.answer}</div>`;
      
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">⭐ ${escapeHtml(item.category)}</div>
        <h3>📘 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / उत्तर:</strong><br>${escapeHtml(item.answer)}${extra}</div>
        <div class="action-buttons">
          <button class="langBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-hi="${escapeAttr(item.hindi)}" data-mr="${escapeAttr(item.marathi)}">🌐 हिंदी / मराठी</button>
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}">📘 Detailed Explanation</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".langBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a= btn.getAttribute("data-a"), hi=btn.getAttribute("data-hi"), mr=btn.getAttribute("data-mr");
      showLangPopup(q,a,hi,mr);
    }));
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a= btn.getAttribute("data-a"), cat=btn.getAttribute("data-cat");
      showDetailPopup(q,a,cat);
    }));
  }

  function showLangPopup(question, answer, hindi, marathi) {
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#1e40af;">🌐 भाषा अनुवाद</h2>
      <div class="lang-section"><strong>❓ प्रश्न:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>🇮🇳 हिंदी:</strong><br>${escapeHtml(hindi || answer)}</div>
      <div class="lang-section"><strong>🇮🇳 मराठी:</strong><br>${escapeHtml(marathi || answer)}</div>
      <button id="closeLangModal" style="background:#2563eb; padding:10px 26px; border-radius:40px; color:white;">बंद करें</button>
    `;
    document.getElementById("closeLangModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function showDetailPopup(question, answer, category) {
    let extra = `<div class="lang-section"><strong>📖 12th BK Chapter 9 - Analysis of Financial Statements</strong><br>✔ Tools: Comparative Statement, Common Size Statement, Cash Flow Statement, Ratio Analysis<br>✔ Balance Sheet Ratios: Current Ratio, Quick Ratio<br>✔ Income Statement Ratios: Gross Profit, Operating Profit, Net Profit, Operating Ratio<br>✔ Combined Ratios: ROCE, ROI</div>`;
    if(category === "Ratio") extra += getRatioFormulaTable();
    if(category === "Comparative") extra += getComparativeStepsTable();
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#1e40af;">📘 Detailed Explanation</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Answer:</strong><br>${escapeHtml(answer)}</div>
      ${extra}
      <button id="closeDetailModal" style="background:#2563eb; padding:10px 26px; border-radius:40px;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
  function escapeAttr(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice not supported."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.onload = () => { resultsContainer.innerHTML = `<div class="not-found">✨ 12th Commerce · Analysis of Financial Statements · Ratios, Comparative & Common Size ✨</div>`; };
</script>
</body>
</html>
