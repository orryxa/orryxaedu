<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📜 Bills of Exchange | 12th BK Chap 7 | Drawer, Drawee, Discounting, Renewal, Insolvency</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }
    /* Hide scrollbar but keep scroll functionality */
    body {
      background: linear-gradient(145deg, #0c1a2a, #0a1020);
      min-height: 100vh;
      padding: 24px 18px;
      color: #f1f5f9;
      overflow-y: scroll;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    body::-webkit-scrollbar { display: none; }

    .container { max-width: 1300px; margin: 0 auto; }
    .heading { text-align: center; margin-bottom: 35px; animation: slideDown 0.6s ease; }
    .heading h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #ffffff, #fbbf24, #f97316);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .heading p { color: #fde68a; margin-top: 10px; font-weight: 500; }

    /* Search Box */
    .search-wrapper { position: relative; margin-bottom: 32px; }
    .search-box {
      background: rgba(255,255,255,0.97);
      border-radius: 60px;
      padding: 6px 6px 6px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.45);
      backdrop-filter: blur(2px);
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      padding: 15px 0;
      background: transparent;
      color: #0f172a;
      font-weight: 500;
    }
    .icon-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #f97316, #ea580c);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(249,115,22,0.4);
    }
    .icon-btn:hover { transform: scale(1.08); background: #f97316; }

    .suggestions-dropdown {
      position: absolute;
      top: calc(100% + 12px);
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      border-radius: 32px;
      box-shadow: 0 25px 40px -12px black;
      z-index: 120;
      max-height: 280px;
      overflow-y: auto;
      display: none;
    }
    .suggestion-item {
      padding: 14px 24px;
      color: #0f172a;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      gap: 14px;
      align-items: center;
      transition: 0.2s;
    }
    .suggestion-item:hover { background: #fef3c7; padding-left: 32px; }

    .result-container { display: flex; flex-direction: column; gap: 24px; margin-top: 20px; }
    .result-card {
      background: rgba(255,255,255,0.96);
      border-radius: 40px;
      padding: 1.8rem;
      color: #0f172a;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
      transition: 0.3s ease;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .result-card:hover { transform: translateY(-5px); box-shadow: 0 28px 40px -15px black; }
    .badge {
      background: linear-gradient(135deg, #fef3c7, #ffedd5);
      color: #9a3412;
      display: inline-block;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .result-card h3 {
      color: #9a3412;
      font-size: 1.4rem;
      border-left: 6px solid #f97316;
      padding-left: 18px;
      margin-bottom: 18px;
      font-weight: 700;
    }
    .answer-text {
      background: #fef9e6;
      padding: 18px 24px;
      border-radius: 28px;
      line-height: 1.7;
      margin: 12px 0;
      border: 1px solid #ffedd5;
    }
    .formula-box {
      background: #fffbeb;
      padding: 12px 18px;
      border-radius: 28px;
      font-family: monospace;
      font-size: 0.95rem;
      margin: 14px 0;
      text-align: center;
      border-left: 6px solid #f97316;
      font-weight: 600;
    }
    .responsive-table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.85rem;
      overflow-x: auto;
      display: block;
      border-radius: 24px;
      overflow: hidden;
    }
    .responsive-table th, .responsive-table td {
      border: 1px solid #e2e8f0;
      padding: 12px 10px;
      text-align: left;
      background: white;
    }
    .responsive-table th { background: #f97316; color: white; font-weight: 700; }
    .action-buttons { margin-top: 22px; display: flex; gap: 15px; flex-wrap: wrap; }
    .action-buttons button {
      border: none;
      padding: 10px 26px;
      border-radius: 50px;
      font-weight: 700;
      background: #f1f5f9;
      color: #1e293b;
      cursor: pointer;
      transition: 0.2s;
    }
    .action-buttons button:last-child { background: #f97316; color: white; box-shadow: 0 4px 10px rgba(249,115,22,0.3); }
    .action-buttons button:hover { transform: scale(0.97); opacity: 0.9; }

    .not-found {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 2.5rem;
      text-align: center;
      font-size: 1.1rem;
    }
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .popup-box {
      background: white;
      max-width: 850px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 48px;
      padding: 30px 34px;
      position: relative;
      color: #1e293b;
    }
    .close-popup {
      position: absolute;
      top: 18px;
      right: 22px;
      background: #fee2e2;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .lang-section { background: #f8fafc; padding: 18px; border-radius: 28px; margin-bottom: 20px; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 650px) {
      body { padding: 16px 12px; }
      .heading h1 { font-size: 1.4rem; }
      .result-card h3 { font-size: 1.1rem; }
      .responsive-table th, .responsive-table td { padding: 8px 5px; font-size: 0.7rem; }
      .result-card { padding: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="heading">
    <h1>📜 Bills of Exchange | Chapter 7</h1>
    <p>⚡ Drawer · Drawee · Discounting · Endorsement · Renewal · Insolvency · Noting Charges</p>
  </div>
  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔎 Search: Bill of Exchange, Drawer, Drawee, Discounting, Endorsement, Renewal, Noting Charges, Insolvency...">
      <button class="icon-btn" id="voiceBtn">🎤</button>
    </div>
    <div id="suggestionsList" class="suggestions-dropdown"></div>
  </div>
  <div class="result-container" id="resultsContainer">
    <div class="not-found">✨ Type above — Master Bills of Exchange, Discounting, Endorsement & Renewal ✨</div>
  </div>
</div>
<div class="popup-overlay" id="popupModal">
  <div class="popup-box">
    <button class="close-popup" id="closeModalBtn">✖</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  // ---------- COMPLETE DATABASE: BILLS OF EXCHANGE (Chapter 7) ----------
  const qaDatabase = [];

  function addQA(question, answer, hindi, marathi, category, keywords = []) {
    qaDatabase.push({ id: qaDatabase.length+1, question, answer, hindi, marathi, category, keywords: keywords.map(k=>k.toLowerCase()) });
  }

  // ==================== CORE CONCEPTS ====================
  addQA("What is a Bill of Exchange?", "As per Section 5 of Negotiable Instruments Act, 1881: 'A bill of exchange is an instrument in writing containing an unconditional order, signed by the maker, directing a certain person to pay a certain sum of money only to, or to the order of, a certain person or to the bearer of the instrument.'", "विनिमय पत्र एक लिखित अनिवार्य आदेश है।", "विनिमयपत्र हा एक लिखित अनिवार्य आदेश आहे.", "Core", ["bill of exchange definition"]);
  addQA("Who are the parties to a Bill of Exchange?", "There are three parties: 1) Drawer: who makes/draws the bill and signs it (creditor). 2) Drawee: on whom the bill is drawn (debtor), who accepts it. 3) Payee: the person to whom payment is to be made. In many cases, Drawer and Payee may be the same.", "विनिमय पत्र में तीन पक्ष होते हैं: आहर्ता, आदेशी, प्राप्तकर्ता।", "विनिमयपत्रात तीन पक्ष: आहर्ता, आदेशी, प्राप्तकर्ता.", "Core", ["parties to bill"]);
  addQA("What are Days of Grace?", "Three extra days allowed by law over and above the term of the bill to the drawee to make payment. Days of grace are not allowed for 'On Demand' or 'At Sight' bills.", "दयालुता के तीन अतिरिक्त दिन।", "ग्रेसचे तीन दिवस.", "Terms", ["days of grace"]);
  addQA("What is Legal Due Date?", "Legal due date = Nominal due date + 3 days of grace. If due date falls on a public holiday, payment is made on the preceding working day. If it is an emergency holiday, payment on next working day.", "वैध देय तिथि = नाममात्र देय तिथि + 3 दिन।", "कायदेशीर देय तारीख.", "Terms", ["legal due date"]);
  addQA("What is Discounting of Bill?", "Discounting is converting a bill into its present value by selling it to a bank before due date. Bank deducts discounting charges (interest for unexpired period) and pays the balance to the drawer. Discount = Amount × Rate% × Unexpired period.", "बिल का डिस्काउंटिंग", "बिलाची सवलत", "Discounting", ["discounting bill"]);
  addQA("What is Endorsement of Bill?", "Endorsement is transfer of ownership of a bill by signing on the back of the bill. The person who transfers is called 'Endorser' and the person in whose favour it is transferred is called 'Endorsee'.", "बिल का पृष्ठांकन", "बिलाची पाठांकन", "Endorsement", ["endorsement"]);
  addQA("What is Renewal of Bill?", "When drawee cannot honour the bill on due date and requests extension, drawer cancels old bill and draws a new bill for extended period. Interest for extra period may be charged. If part payment made, new bill is for balance + interest.", "बिल का नवीनीकरण", "बिलाचे नूतनीकरण", "Renewal", ["renewal of bill"]);

  // ==================== TABLES ====================
  function getDiscountingTable() {
    return `<table class="responsive-table"><thead><tr><th>Scenario</th><th>Drawer's Journal Entry</th><th>Drawee's Entry</th></tr></thead><tbody>
      <tr><td>Bill discounted with bank</td><td>Bank A/c Dr., Discount A/c Dr. To Bills Receivable A/c</td><td>No entry</td></tr>
      <tr><td>Discounted bill honoured</td><td>No entry (already received cash)</td><td>Bills Payable A/c Dr. To Cash/Bank A/c</td></tr>
      <tr><td>Discounted bill dishonoured</td><td>Drawee's A/c Dr. To Bank A/c (amount + noting charges if any)</td><td>Bills Payable A/c Dr., Noting Charges A/c Dr. To Drawer's A/c</td></tr>
    </tbody></tr>`;
  }
  function getEndorsementTable() {
    return `<table class="responsive-table"><thead><tr><th>Event</th><th>Drawer (Endorser)</th><th>Endorsee</th><th>Drawee</th></tr></thead>
    <tbody>
      <tr><td>Bill endorsed</td><td>Endorsee's A/c Dr. To Bills Receivable A/c</td><td>Bills Receivable A/c Dr. To Endorser's A/c</td><td>No entry</td></tr>
      <tr><td>Honoured on due date</td><td>No entry</td><td>Cash/Bank Dr. To Bills Receivable</td><td>Bills Payable Dr. To Cash/Bank</td></tr>
      <tr><td>Dishonoured</td><td>Drawee's A/c Dr. To Endorsee's A/c</td><td>Endorser's A/c Dr. To Bills Receivable</td><td>Bills Payable Dr. To Drawer's A/c</td></tr>
    </tbody></table>`;
  }

  // ==================== JOURNAL ENTRIES ====================
  addQA("Journal entry for retaining bill till due date - honoured", "Drawer: Cash/Bank A/c Dr. To Bills Receivable A/c. Drawee: Bills Payable A/c Dr. To Cash/Bank A/c.", "बिल को परिपक्वता तक रखना और सम्मानित होना।", "बिल परिपक्वतेपर्यंत ठेवणे व सन्मानित होणे.", "Journal", ["honour entry"]);
  addQA("Journal entry for dishonour of retained bill with noting charges", "Drawer: Drawee's A/c Dr. To Bills Receivable A/c To Cash A/c (including noting charges). Drawee: Bills Payable A/c Dr., Noting Charges A/c Dr. To Drawer's A/c.", "बिल का अपमान और नोटिंग शुल्क।", "बिलाचा अपमान व नोटींग शुल्क.", "Journal", ["dishonour noting"]);

  // ==================== THEORY & NUMERICAL ====================
  addQA("True/False: Three days of grace are allowed for 'On Demand' bills.", "False. Days of grace are not allowed for bills payable 'On Demand' or 'At Sight'.", "गलत। मांग पर देय बिलों के लिए अनुग्रह दिन नहीं दिए जाते।", "चुकीचे.", "True/False", ["grace days demand"]);
  addQA("Calculate discount: Bill ₹40,260 for 50 days @15% p.a. on 15 Jan 2020 (leap year 366 days)", "Discount = 40,260 × 15/100 × 50/366 = ₹825 (approx).", "बट्टा = ₹825", "सवलत = ₹825", "Numerical", ["discount calculation"]);
  addQA("Calculate new bill amount: Old bill ₹72,000, part payment ₹22,000 cash, balance + interest @18% for 4 months", "Balance = 72,000 - 22,000 = 50,000. Interest = 50,000 × 18/100 × 4/12 = ₹3,000. New bill = ₹53,000.", "नया बिल = ₹53,000", "नवीन बिल = ₹53,000", "Numerical", ["renewal interest"]);
  addQA("What is Noting Charges? Who bears it?", "Noting charges are fees paid to Notary Public for recording the fact of dishonour. Initially paid by holder, ultimately borne by drawee (acceptor).", "नोटिंग शुल्क", "नोटींग शुल्क", "Terms", ["noting charges"]);

  // Helper functions
  const searchInput = document.getElementById("searchInput");
  const resultsContainer = document.getElementById("resultsContainer");
  const suggestionsDiv = document.getElementById("suggestionsList");

  function getMatches(q) {
    const lower = q.toLowerCase();
    return qaDatabase.filter(item => 
      item.question.toLowerCase().includes(lower) || 
      item.answer.toLowerCase().includes(lower) ||
      item.category.toLowerCase().includes(lower) ||
      item.keywords.some(k => k.includes(lower))
    ).slice(0, 14);
  }

  function updateSuggestions() {
    const val = searchInput.value.trim();
    if(!val) { suggestionsDiv.style.display = "none"; return; }
    const matches = getMatches(val);
    if(!matches.length) { suggestionsDiv.style.display = "none"; return; }
    suggestionsDiv.innerHTML = "";
    matches.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>📜</span> <strong>${item.question.substring(0,70)}</strong> <span style="margin-left:auto; background:#fef3c7; padding:2px 12px; border-radius:30px;">${item.category}</span>`;
      div.addEventListener("click", () => {
        searchInput.value = item.question;
        suggestionsDiv.style.display = "none";
        performSearch(item.question);
      });
      suggestionsDiv.appendChild(div);
    });
    suggestionsDiv.style.display = "block";
  }

  function performSearch(q = null) {
    let query = (q !== null) ? q : searchInput.value.trim();
    if(!query) { resultsContainer.innerHTML = `<div class="not-found">✨ Enter keywords: Bill of Exchange, Discounting, Endorsement, Renewal, Noting Charges ✨</div>`; return; }
    const matches = getMatches(query);
    if(!matches.length) { resultsContainer.innerHTML = `<div class="not-found">❌ No results. Try: Bill of Exchange, Drawer, Drawee, Discounting, Endorsement, Renewal.</div>`; return; }
    resultsContainer.innerHTML = "";
    matches.forEach(item => {
      let extra = "";
      if (item.question.toLowerCase().includes("discounting of bill") && item.category === "Discounting") extra = getDiscountingTable();
      if (item.question.toLowerCase().includes("endorsement of bill")) extra = getEndorsementTable();
      if (item.category === "Numerical" && item.answer.includes("₹")) extra = `<div class="formula-box">📐 ${item.answer}</div>`;
      
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="badge">⭐ ${escapeHtml(item.category)}</div>
        <h3>📜 ${escapeHtml(item.question)}</h3>
        <div class="answer-text"><strong>✅ Answer / उत्तर:</strong><br>${escapeHtml(item.answer)}${extra}</div>
        <div class="action-buttons">
          <button class="langBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-hi="${escapeAttr(item.hindi)}" data-mr="${escapeAttr(item.marathi)}">🌐 हिंदी / मराठी</button>
          <button class="detailBtn" data-q="${escapeAttr(item.question)}" data-a="${escapeAttr(item.answer)}" data-cat="${item.category}">📘 Detailed Rules</button>
        </div>
      `;
      resultsContainer.appendChild(card);
    });
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".langBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a= btn.getAttribute("data-a"), hi=btn.getAttribute("data-hi"), mr=btn.getAttribute("data-mr");
      showLangPopup(q,a,hi,mr);
    }));
    document.querySelectorAll(".detailBtn").forEach(btn => btn.addEventListener("click", (e) => {
      const q = btn.getAttribute("data-q"), a= btn.getAttribute("data-a"), cat=btn.getAttribute("data-cat");
      showDetailPopup(q,a,cat);
    }));
  }

  function showLangPopup(question, answer, hindi, marathi) {
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#b45309;">🌐 भाषा अनुवाद</h2>
      <div class="lang-section"><strong>❓ प्रश्न:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>🇮🇳 हिंदी:</strong><br>${escapeHtml(hindi || answer)}</div>
      <div class="lang-section"><strong>🇮🇳 मराठी:</strong><br>${escapeHtml(marathi || answer)}</div>
      <button id="closeLangModal" style="background:#f97316; padding:10px 26px; border-radius:40px; color:white;">बंद करें</button>
    `;
    document.getElementById("closeLangModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function showDetailPopup(question, answer, category) {
    let extra = `<div class="lang-section"><strong>📖 12th BK Chapter 7 - Bills of Exchange</strong><br>✔ Drawer, Drawee, Payee, Acceptance, Days of Grace<br>✔ Retaining, Discounting, Endorsement, Collection, Renewal, Insolvency</div>`;
    if(category === "Discounting") extra += getDiscountingTable();
    if(category === "Endorsement") extra += getEndorsementTable();
    document.getElementById("popupModal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = `
      <h2 style="color:#b45309;">📘 Detailed Explanation</h2>
      <div class="lang-section"><strong>❓ Question:</strong> ${escapeHtml(question)}</div>
      <div class="lang-section"><strong>✅ Answer:</strong><br>${escapeHtml(answer)}</div>
      ${extra}
      <button id="closeDetailModal" style="background:#f97316; padding:10px 26px; border-radius:40px;">Close</button>
    `;
    document.getElementById("closeDetailModal").addEventListener("click", ()=> document.getElementById("popupModal").style.display = "none");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
  function escapeAttr(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function startVoice() { if (!('webkitSpeechRecognition' in window)) { alert("Voice not supported."); return; } const rec = new webkitSpeechRecognition(); rec.lang="en-IN"; rec.start(); rec.onresult = (e)=> { searchInput.value = e.results[0][0].transcript; performSearch(); }; }
  document.getElementById("voiceBtn").addEventListener("click", startVoice);
  searchInput.addEventListener("keyup", () => { performSearch(); updateSuggestions(); });
  searchInput.addEventListener("focus", updateSuggestions);
  document.addEventListener("click", (e) => { if(!document.querySelector(".search-wrapper").contains(e.target)) suggestionsDiv.style.display = "none"; });
  document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("popupModal").style.display = "none");
  window.onload = () => { resultsContainer.innerHTML = `<div class="not-found">✨ 12th Commerce · Bills of Exchange · Discounting, Endorsement, Renewal, Insolvency ✨</div>`; };
</script>
</body>
</html>
