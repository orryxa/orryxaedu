<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Account | Orryxa Education</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --header-bg: linear-gradient(135deg, #0b2b26 0%, #1a4d46 100%);
            --menu-bg: #ffffff;
            --tool-bg: #f1f5f9;
            --footer-bg: #e2e8f0;
            --accent: #f5b042;
            --accent-dark: #e09d2a;
            --accent-light: rgba(245, 176, 66, 0.1);
            --success: #10b981;
            --error: #ef4444;
            --info: #3b82f6;
            --warning: #f59e0b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --card-bg: #1e293b;
            --border-color: #334155;
            --header-bg: linear-gradient(135deg, #061a16 0%, #0f3b34 100%);
            --menu-bg: #1e293b;
            --tool-bg: #0f172a;
            --footer-bg: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* Toast Container */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .toast {
            min-width: 280px;
            max-width: 380px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-md);
            padding: 1rem 1.2rem;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: toastSlideIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }
        
        @keyframes toastSlideIn {
            from { transform: translateX(100%) scale(0.9); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }
        
        @keyframes toastSlideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--error); }
        .toast.info { border-left: 4px solid var(--info); }
        .toast.warning { border-left: 4px solid var(--warning); }
        
        .toast i:first-child { font-size: 1.2rem; }
        .toast-content { flex: 1; }
        .toast-title { font-weight: 700; font-size: 0.85rem; margin-bottom: 3px; }
        .toast-message { font-size: 0.75rem; color: var(--text-secondary); }
        .toast-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: rgba(0,0,0,0.1); width: 100%; }
        .toast-progress-bar { height: 100%; width: 100%; background: currentColor; animation: progress 3s linear forwards; }
        
        @keyframes progress { from { width: 100%; } to { width: 0%; } }

        /* Header */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            padding: 0.75rem 2rem;
            box-shadow: var(--shadow-md);
        }
        
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #0b2b26;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .logo-icon:hover { transform: scale(1.05); }
        
        .logo-text h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f9e7b3, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            letter-spacing: -0.3px;
        }
        
        .logo-text p {
            font-size: 0.7rem;
            color: rgba(255,255,245,0.7);
            letter-spacing: 0.5px;
        }
        
        .menu-toggle-btn {
            display: none;
            background: rgba(255,255,245,0.15);
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius-sm);
            width: 40px;
            height: 40px;
            transition: all 0.2s;
        }
        
        .menu-toggle-btn:hover { background: rgba(255,255,245,0.25); transform: scale(1.02); }
        
        .desktop-auth-buttons { display: flex; gap: 0.8rem; align-items: center; }
        
        .desktop-profile-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,245,0.1);
            padding: 0.3rem 0.8rem 0.3rem 0.3rem;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        
        .desktop-profile-container:hover { background: rgba(255,255,245,0.2); transform: scale(1.02); }
        
        .profile-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: #0b2b26;
            overflow: hidden;
            position: relative;
        }
        
        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-info { display: flex; flex-direction: column; }
        .profile-name { color: white; font-weight: 600; font-size: 0.8rem; }
        .profile-email { color: rgba(255,255,255,0.7); font-size: 0.65rem; }
        
        .profile-dropdown {
            position: absolute;
            top: 48px;
            right: 0;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-md);
            min-width: 200px;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
            z-index: 1001;
            border: 1px solid var(--glass-border);
        }
        
        .desktop-profile-container.active .profile-dropdown { visibility: visible; opacity: 1; top: 52px; }
        
        .dropdown-item {
            padding: 0.75rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .dropdown-item:hover { background: var(--accent-light); padding-left: 1.5rem; }
        .logout-item { color: var(--error); }
        
        .btn-login, .btn-signup {
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .btn-login {
            background: rgba(255,255,245,0.15);
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .btn-login:hover { background: rgba(255,255,245,0.25); transform: translateY(-1px); }
        
        .btn-signup {
            background: var(--accent);
            color: #0b2b26;
        }
        
        .btn-signup:hover { background: var(--accent-dark); transform: translateY(-1px); }
        
        .dark-mode-toggle {
            background: rgba(255,255,245,0.15);
            border: none;
            border-radius: 40px;
            padding: 0.4rem 0.9rem;
            cursor: pointer;
            color: white;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .dark-mode-toggle:hover { background: rgba(255,255,245,0.25); transform: scale(1.02); }

        /* Desktop Navigation */
        .desktop-menu-nav {
            background: var(--menu-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 65px;
            z-index: 999;
        }
        
        .desktop-menu-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem 2rem;
        }
        
        .desktop-menu-item {
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        
        .desktop-menu-item i { font-size: 0.85rem; }
        .desktop-menu-item:hover { background: var(--accent-light); transform: translateY(-2px); }

        /* Mobile Sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }
        
        .sidebar-overlay.active { visibility: visible; opacity: 1; }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-xl);
            z-index: 2001;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .sidebar.active { left: 0; }
        
        .sidebar-header {
            background: var(--header-bg);
            padding: 2rem 1.5rem;
            text-align: center;
        }
        
        .sidebar-profile-circle {
            width: 70px;
            height: 70px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #f5b042, #ffd966);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #0b2b26;
            overflow: hidden;
            position: relative;
        }
        
        .sidebar-profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .sidebar-user-name { color: white; font-weight: 700; margin-bottom: 0.3rem; font-size: 0.9rem; }
        .sidebar-user-email { color: rgba(255,255,255,0.8); font-size: 0.7rem; }
        
        .sidebar-auth-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 1rem;
        }
        
        .sidebar-auth-buttons button {
            padding: 0.45rem 1rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        
        .sidebar-auth-buttons button:first-child {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .sidebar-auth-buttons button:last-child {
            background: var(--accent);
            color: #0b2b26;
        }
        
        .sidebar-menu { flex: 1; padding: 1rem 0; }
        
        .sidebar-menu-item {
            padding: 0.7rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .sidebar-menu-item:hover { background: var(--accent-light); padding-left: 2rem; }
        .sidebar-menu-item i { width: 24px; color: var(--accent); }
        
        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        
        .sidebar-dark-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .toggle-switch {
            position: relative;
            width: 46px;
            height: 22px;
            background: #cbd5e1;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .toggle-switch.active { background: var(--accent); }
        .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }
        
        .toggle-switch.active .toggle-slider { left: 26px; }
        
        .close-sidebar {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .close-sidebar:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }

        /* Main Content */
        .content-wrapper {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            min-height: calc(100vh - 200px);
        }

        /* Welcome Banner */
        .welcome-banner {
            background: linear-gradient(135deg, var(--accent-light), transparent);
            border-radius: var(--radius-xl);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent-light) 0%, transparent 70%);
            opacity: 0.3;
            pointer-events: none;
        }

        .welcome-banner h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .welcome-banner p {
            color: var(--text-secondary);
        }

        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--success);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.7rem;
            margin-top: 1rem;
        }

        .sync-status i {
            font-size: 0.7rem;
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        .menu-icon {
            width: 50px;
            height: 50px;
            background: var(--accent-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent);
        }

        .menu-content {
            flex: 1;
        }

        .menu-content h3 {
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }

        .menu-content p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .menu-arrow {
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        /* Login Required Section */
        .login-required-section {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-color);
        }

        .login-required-section i {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .login-required-section h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .login-required-section p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .login-large-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #0b2b26;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .login-large-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 176, 66, 0.3);
        }

        /* Popup Styles */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .popup-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .popup-container {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            animation: popupSlideIn 0.3s ease;
        }

        @keyframes popupSlideIn {
            from {
                transform: scale(0.9) translateY(-20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .close-popup {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .close-popup:hover {
            color: var(--error);
            transform: rotate(90deg);
        }

        .popup-container h2 {
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        button[type="submit"] {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #0b2b26;
            padding: 0.8rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s ease-in-out infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* About Us Content */
        .about-content {
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .about-content h3 {
            color: var(--accent);
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .about-content p {
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-item {
            text-align: center;
            padding: 1rem;
            background: var(--accent-light);
            border-radius: var(--radius-md);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Settings Styles */
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }

<script>
    // =====================================================
    // MYACCOUNT.HTML - WORKING AUTO-SYNC SYSTEM
    // Version: 3.0 (FIXED)
    // =====================================================

    const CONFIG = {
        SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzoDds81u8M5N8micA_hoIBgCS7aCFm0NUmwW6XLH4m_fRJ8R9pGqjgFGMeBxBd2dSL/exec",
        LOGIN_SPREADSHEET_ID: "13UD1vMsopDesYMuYF4ZgXwRGE25vaR-PWl9hIGml0OE",
        SHEET_NAME: "Login_Portal",
        VISITOR_SHEET_NAME: "Visitor",
        SYNC_INTERVAL_MS: 5000, // 5 seconds for faster testing
        FETCH_TIMEOUT_MS: 10000
    };

    let currentUser = null;
    let cachedUserData = null;
    let syncInterval = null;
    let isSyncing = false;
    let visitorRecorded = false;
	
	/* ==========================
   GET TODAY DATE
========================== */

function getTodayDate() {

    const d = new Date();

    const day =
        String(d.getDate()).padStart(2, "0");

    const month =
        String(d.getMonth() + 1)
        .padStart(2, "0");

    const year =
        d.getFullYear();

    return `${day}/${month}/${year}`;
}

/* ==========================
   CHECK ALREADY TRACKED
========================== */

function alreadyTrackedToday() {

    const savedDate =
        localStorage.getItem(
            VISITOR_CONFIG.STORAGE_KEY
        );

    return savedDate === getTodayDate();
}

/* ==========================
   MARK TRACKED
========================== */

function markTracked() {

    localStorage.setItem(
        VISITOR_CONFIG.STORAGE_KEY,
        getTodayDate()
    );
}

/* ==========================
   UPDATE VISITOR
========================== */

async function updateVisitor() {

    try {

        // Prevent duplicate count
        if (alreadyTrackedToday()) {

            console.log(
                "Visitor already counted today"
            );

            return;
        }

        const formData =
            new URLSearchParams();

        formData.append(
            "action",
            "visitor"
        );

        formData.append(
            "spreadsheetId",
            VISITOR_CONFIG.SPREADSHEET_ID
        );

        formData.append(
            "sheetName",
            VISITOR_CONFIG.VISITOR_SHEET_NAME
        );

        formData.append(
            "dateHeader",
            "Date"
        );

        formData.append(
            "countHeader",
            "My Account Page"
        );

        const response =
            await fetch(
                VISITOR_CONFIG.SCRIPT_URL,
                {
                    method: "POST",
                    body: formData.toString(),
                    headers: {
                        "Content-Type":
                        "application/x-www-form-urlencoded"
                    }
                }
            );

        const result =
            await response.json();

        console.log(result);

        if (
            result.status === "success"
        ) {

            markTracked();

            console.log(
                "Visitor counted successfully"
            );
        }

    }

    catch (err) {

        console.error(
            "Visitor Tracking Error:",
            err
        );
    }
}

/* ==========================
   START TRACKING
========================== */

document.addEventListener(
    "DOMContentLoaded",
    updateVisitor
);

    // =====================================================
    // UTILITY FUNCTIONS
    // =====================================================

    function showToast(message, type = 'info', title = '') {
        let container = document.getElementById('toastContainer');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'toast-container';
            document.body.appendChild(container);
        }
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        let icon = '';
        let defaultTitle = '';
        switch(type) {
            case 'success': icon = '<i class="fas fa-check-circle"></i>'; defaultTitle = 'Success'; break;
            case 'error': icon = '<i class="fas fa-exclamation-circle"></i>'; defaultTitle = 'Error'; break;
            case 'warning': icon = '<i class="fas fa-exclamation-triangle"></i>'; defaultTitle = 'Warning'; break;
            default: icon = '<i class="fas fa-info-circle"></i>'; defaultTitle = 'Info';
        }
        
        toast.innerHTML = `
            ${icon}
            <div class="toast-content">
                <div class="toast-title">${title || defaultTitle}</div>
                <div class="toast-message">${message}</div>
            </div>
            <div class="toast-progress"><div class="toast-progress-bar"></div></div>
        `;
        
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'toastSlideOut 0.3s ease';
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
        }, 3000);
        
        toast.addEventListener('click', () => {
            toast.style.animation = 'toastSlideOut 0.3s ease';
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
        });
    }

    function extractFileId(link) {
        if (!link) return null;
        const patterns = [
            /\/d\/([a-zA-Z0-9_-]{25,})/,
            /id=([a-zA-Z0-9_-]{25,})/,
            /\/file\/d\/([a-zA-Z0-9_-]{25,})/,
            /([a-zA-Z0-9_-]{25,})/
        ];
        for (let pattern of patterns) {
            const match = link.match(pattern);
            if (match && match[1] && match[1].length >= 25) return match[1];
        }
        return null;
    }

    function convertDriveLinkToImageUrl(link) {
        if (!link || link === '') return null;
        const fileId = extractFileId(link);
        return fileId ? `https://lh3.googleusercontent.com/d/${fileId}=s200-c` : null;
    }

    async function fetchWithTimeout(url, timeout = CONFIG.FETCH_TIMEOUT_MS) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            return response;
        } catch (error) {
            clearTimeout(timeoutId);
            throw error;
        }
    }

    async function fetchAllUsers() {
        try {
            const url = `${CONFIG.SCRIPT_URL}?spreadsheetId=${CONFIG.LOGIN_SPREADSHEET_ID}&sheetName=${CONFIG.SHEET_NAME}`;
            console.log('[Sync] Fetching users from Google Sheet...');
            const response = await fetchWithTimeout(url);
            const data = await response.json();
            if (data.status === 'success' && Array.isArray(data.data)) {
                console.log(`[Sync] Successfully fetched ${data.data.length} users`);
                return data.data;
            }
            return null;
        } catch (error) {
            console.error('[Sync] Fetch error:', error.message);
            return null;
        }
    }

    // =====================================================
    // VISITOR COUNTER SYSTEM
    // =====================================================

    async function recordVisitor() {
        if (visitorRecorded) return;
        
        try {
            const today = new Date().toLocaleDateString('en-CA');
            const formData = new URLSearchParams();
            formData.append('action', 'recordVisitor');
            formData.append('spreadsheetId', CONFIG.LOGIN_SPREADSHEET_ID);
            formData.append('sheetName', CONFIG.VISITOR_SHEET_NAME);
            formData.append('pageName', 'My Account Page');
            formData.append('date', today);
            
            const response = await fetch(CONFIG.SCRIPT_URL, { method: 'POST', body: formData });
            const result = await response.json();
            
            if (result.status === 'success') {
                visitorRecorded = true;
                console.log('[Visitor] Recorded visit for today');
            }
        } catch (error) {
            console.error('[Visitor] Failed to record:', error);
        }
    }

    // =====================================================
    // AUTO-SYNC FUNCTIONS - FIXED
    // =====================================================

    function compareUserData(oldUser, newUser) {
        if (!oldUser || !newUser) {
            return { hasChanges: true, changes: [], summary: 'Initial data load' };
        }
        
        const changes = [];
        const fieldsToCompare = [
            { key: 'First Name', label: 'First Name' },
            { key: 'Last Name', label: 'Last Name' },
            { key: 'Mobile Number', label: 'Mobile Number' },
            { key: 'Email Id', label: 'Email' },
            { key: 'Education Details', label: 'Education' },
            { key: 'College Name', label: 'College' },
            { key: 'Image', label: 'Profile Image' }
        ];
        
        for (let field of fieldsToCompare) {
            const oldValue = (oldUser[field.key] || '').toString().trim();
            const newValue = (newUser[field.key] || '').toString().trim();
            
            if (oldValue !== newValue) {
                changes.push({
                    field: field.key,
                    label: field.label,
                    oldValue: oldValue,
                    newValue: newValue
                });
                console.log(`[Sync] CHANGE DETECTED in ${field.label}: "${oldValue}" → "${newValue}"`);
            }
        }
        
        return {
            hasChanges: changes.length > 0,
            changes: changes,
            summary: changes.length > 0 ? `${changes.length} field(s) updated` : 'No changes'
        };
    }

    async function updateUserInterface(newUser, changes) {
        if (!newUser) return false;
        
        console.log('[Sync] Updating UI with new data...');
        
        const firstName = newUser['First Name'] || '';
        const lastName = newUser['Last Name'] || '';
        const fullName = `${firstName} ${lastName}`.trim() || 'User';
        const email = newUser['Email Id'] || '';
        const initial = firstName.charAt(0).toUpperCase() || 'U';
        const imageLink = newUser['Image'] || '';
        const imageUrl = convertDriveLinkToImageUrl(imageLink);
        
        // Update desktop profile
        const desktopName = document.getElementById('desktopName');
        const desktopEmail = document.getElementById('desktopEmail');
        const desktopInitial = document.getElementById('desktopInitial');
        const desktopCircle = document.getElementById('desktopProfileCircle');
        
        if (desktopName) desktopName.innerText = fullName;
        if (desktopEmail) desktopEmail.innerText = email;
        if (desktopInitial) desktopInitial.innerText = initial;
        
        if (desktopCircle) {
            if (imageUrl) {
                desktopCircle.innerHTML = `<img src="${imageUrl}" alt="Profile">`;
            } else {
                desktopCircle.innerHTML = `<span>${initial}</span>`;
            }
        }
        
        // Update sidebar
        const sidebarUserName = document.getElementById('sidebarUserName');
        const sidebarUserEmail = document.getElementById('sidebarUserEmail');
        const sidebarInitial = document.getElementById('sidebarInitial');
        const sidebarCircle = document.getElementById('sidebarProfileCircle');
        
        if (sidebarUserName) sidebarUserName.innerText = fullName;
        if (sidebarUserEmail) sidebarUserEmail.innerText = email;
        if (sidebarInitial) sidebarInitial.innerText = initial;
        
        if (sidebarCircle) {
            if (imageUrl) {
                sidebarCircle.innerHTML = `<img src="${imageUrl}" alt="Profile">`;
            } else {
                sidebarCircle.innerHTML = `<span>${initial}</span>`;
            }
        }
        
        // Update welcome banner if it exists
        const welcomeBanner = document.querySelector('.welcome-banner');
        if (welcomeBanner) {
            const titleElement = welcomeBanner.querySelector('h1');
            if (titleElement && !titleElement.innerText.includes(fullName)) {
                titleElement.innerHTML = `Welcome back, ${firstName}! 👋`;
            }
        }
        
        // Show notification for changes (excluding password)
        const importantChanges = changes.filter(c => c.label !== 'Password');
        if (importantChanges.length === 1) {
            showToast(`${importantChanges[0].label} updated to "${importantChanges[0].newValue}"`, 'success', 'Profile Updated');
        } else if (importantChanges.length > 1) {
            showToast(`${importantChanges.length} field(s) updated successfully`, 'success', 'Profile Synced');
        }
        
        console.log('[Sync] UI update complete');
        return true;
    }

    async function checkForProfileUpdates() {

    if (!currentUser || !currentUser['Email Id']) {
        console.log('[Sync] No logged user');
        return false;
    }

    if (isSyncing) {
        console.log('[Sync] Already syncing...');
        return false;
    }

    isSyncing = true;

    try {

        console.log('[Sync] Checking updates...');

        // FORCE FRESH FETCH
        const timestamp = Date.now();

        const url =
            `${CONFIG.SCRIPT_URL}` +
            `?spreadsheetId=${CONFIG.LOGIN_SPREADSHEET_ID}` +
            `&sheetName=${CONFIG.SHEET_NAME}` +
            `&_t=${timestamp}`;

        const response = await fetch(url, {
            method: 'GET',
            cache: 'no-store',
            headers: {
                'Cache-Control': 'no-cache'
            }
        });

        const result = await response.json();

        console.log('[Sync] Fresh sheet data:', result);

        if (
            !result ||
            result.status !== 'success' ||
            !Array.isArray(result.data)
        ) {
            console.log('[Sync] Invalid response');
            return false;
        }

        // FIND USER
        const latestData = result.data.find(row => {

            const rowEmail =
                String(row['Email Id'] || '')
                .trim()
                .toLowerCase();

            const currentEmail =
                String(currentUser['Email Id'] || '')
                .trim()
                .toLowerCase();

            return rowEmail === currentEmail;
        });

        console.log('[Sync] Current User:', currentUser);
        console.log('[Sync] Latest User:', latestData);

        if (!latestData) {
            console.log('[Sync] User not found');
            return false;
        }

        // DEBUG NAME CHECK
        console.log(
            '[Sync] Name Compare:',
            cachedUserData?.['First Name'],
            '→',
            latestData?.['First Name']
        );

        // CHECK CHANGES
        const hasChanged =
            JSON.stringify(cachedUserData) !==
            JSON.stringify(latestData);

        if (!hasChanged) {
            console.log('[Sync] No changes');
            return false;
        }

        console.log('[Sync] Changes detected');

        // UPDATE MEMORY
        currentUser = structuredClone(latestData);
        cachedUserData = structuredClone(latestData);

        // SAVE
        localStorage.setItem(
            'orryxa_current_user',
            JSON.stringify(currentUser)
        );

        // UPDATE FULL UI
        await updateAllUI();

        // RELOAD PAGE CONTENT
        await loadLoggedInContent();

        showToast(
            'Profile updated automatically',
            'success',
            'Auto Sync'
        );

        console.log('[Sync] UI updated successfully');

        return true;

    } catch (error) {

        console.error('[Sync] Error:', error);
        return false;

    } finally {

        isSyncing = false;
    }
}

    function startAutoSync() {
        if (syncInterval) {
            clearInterval(syncInterval);
            syncInterval = null;
        }
        
        if (currentUser && currentUser['Email Id']) {
            console.log(`[Sync] Starting auto-sync every ${CONFIG.SYNC_INTERVAL_MS / 1000} seconds`);
            
            // Initial sync after 2 seconds
            setTimeout(() => {
                console.log('[Sync] Performing initial sync...');
                checkForProfileUpdates();
            }, 2000);
            
            // Set up periodic sync
            syncInterval = setInterval(() => {
                console.log('[Sync] Timer triggered, checking for updates...');
                checkForProfileUpdates();
            }, CONFIG.SYNC_INTERVAL_MS);
            
            showToast('Auto-sync active. Profile will update automatically.', 'success', 'Auto-Sync Enabled');
        } else {
            console.log('[Sync] Cannot start auto-sync: No user logged in');
        }
    }

    function stopAutoSync() {
        if (syncInterval) {
            clearInterval(syncInterval);
            syncInterval = null;
            console.log('[Sync] Auto-sync stopped');
        }
    }

    // =====================================================
    // CONTENT LOADING
    // =====================================================

        const firstName = currentUser?.['First Name'] || '';
        const mainContent = document.getElementById('mainContent');
        mainContent.innerHTML = `
            <div class="welcome-banner">
                <h1>Welcome back, ${firstName}! 👋</h1>
                <p>Manage your account, track your progress, and continue your learning journey.</p>
                <div class="sync-status">
                    <i class="fas fa-sync-alt"></i>
                    <span>Auto-sync active (every 5 seconds)</span>
                </div>
            </div>
            <div class="menu-grid">
                <div class="menu-card" onclick="openEditProfile()">
                    <div class="menu-icon"><i class="fas fa-user-edit"></i></div>
                    <div class="menu-content">
                        <h3>Edit Profile</h3>

                    </div>
                    <div class="menu-arrow"><i class="fas fa-chevron-right"></i></div>
                </div>
                <div class="menu-card" onclick="navigateTo('order')">
                    <div class="menu-icon"><i class="fas fa-shopping-bag"></i></div>
                    <div class="menu-content">
                        <h3>My Order</h3>
                        <p>View your order history and track deliveries</p>
                    </div>
                    <div class="menu-arrow"><i class="fas fa-chevron-right"></i></div>
                </div>
                <div class="menu-card" onclick="navigateTo('bookmark')">

        if (isEnabled) {
            toggle.classList.remove('active');
            localStorage.setItem('autoSync', 'false');
            stopAutoSync();
            showToast('Auto-sync disabled', 'info', 'Settings');
        } else {
            toggle.classList.add('active');
            localStorage.setItem('autoSync', 'true');
            startAutoSync();
            showToast('Auto-sync enabled', 'success', 'Settings');

    async function handleLoginSubmit(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const msgDiv = document.getElementById('loginMessage');
        
        const submitBtn = document.getElementById('loginSubmitBtn');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = 'Logging in... <span class="spinner"></span>';
        submitBtn.disabled = true;
        
        const success = await loginUser(email, password);
        
        if (success) {
            msgDiv.innerHTML = '<div class="success-msg">✅ Login successful!</div>';
            setTimeout(() => {
                closePopup('loginPopup');
                loadLoggedInContent();
            }, 1500);
        } else {
            msgDiv.innerHTML = '<div class="error-msg">❌ Invalid email or password</div>';
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    }

    async function handleSignupSubmit(e) {
        e.preventDefault();
        
        const firstName = document.getElementById('signupFirstName').value;
        const lastName = document.getElementById('signupLastName').value;
        const mobile = document.getElementById('signupMobile').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const confirmPwd = document.getElementById('signupConfirmPwd').value;
        const msgDiv = document.getElementById('signupMessage');
        
        if (!/^[6-9][0-9]{9}$/.test(mobile)) {
            msgDiv.innerHTML = '<div class="error-msg">❌ Invalid mobile number</div>';
            return;
        }
        
        if (password !== confirmPwd) {
            msgDiv.innerHTML = '<div class="error-msg">❌ Passwords do not match</div>';
            return;
        }
        
        if (password.length < 6) {
            msgDiv.innerHTML = '<div class="error-msg">❌ Password must be at least 6 characters</div>';
            return;
        }
        
        const submitBtn = document.getElementById('signupSubmitBtn');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = 'Creating account... <span class="spinner"></span>';
        submitBtn.disabled = true;
        
        const formData = new URLSearchParams();
        formData.append('action', 'insert');
        formData.append('spreadsheetId', CONFIG.LOGIN_SPREADSHEET_ID);
        formData.append('sheetName', CONFIG.SHEET_NAME);
        formData.append('First Name', firstName);
        formData.append('Last Name', lastName);
        formData.append('Mobile Number', mobile);
        formData.append('Email Id', email);
        formData.append('Password', password);
        formData.append('Education Details', '');
        formData.append('College Name', '');
        formData.append('Image', '');
        
        try {
            const response = await fetch(CONFIG.SCRIPT_URL, { method: 'POST', body: formData });
            const result = await response.json();
            
            if (result.status === 'success') {
                msgDiv.innerHTML = '<div class="success-msg">✅ Account created! Please login.</div>';
                setTimeout(() => {
                    closePopup('signupPopup');
                    showLoginPopup();
                }, 2000);
            } else {
                msgDiv.innerHTML = `<div class="error-msg">❌ ${result.message || 'Signup failed'}</div>`;
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        } catch (err) {
            msgDiv.innerHTML = '<div class="error-msg">❌ Network error. Please try again.</div>';
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    }

    // =====================================================
    // AUTHENTICATION FUNCTIONS
    // =====================================================

    async function loginUser(email, password) {
        const users = await fetchAllUsers();
        if (!users) {
            showToast('Unable to connect to server', 'error', 'Connection Error');
            return false;
        }
        
        const user = users.find(u => {
            const userEmail = (u['Email Id'] || '').toString().trim().toLowerCase();
            const userPassword = (u['Password'] || '').toString().trim();
            return userEmail === email.toLowerCase() && userPassword === password;
        });
        
        if (user) {
            currentUser = JSON.parse(JSON.stringify(user));
            cachedUserData = JSON.parse(JSON.stringify(user));
            localStorage.setItem('orryxa_current_user', JSON.stringify(user));
            await updateAllUI();
            startAutoSync();
            await recordVisitor();
            showToast(`Welcome back, ${currentUser['First Name'] || 'User'}!`, 'success', 'Login Success');
            return true;
        }
        return false;
    }

    async function logout() {
        stopAutoSync();
        currentUser = null;
        cachedUserData = null;
        localStorage.removeItem('orryxa_current_user');
        await updateAllUI();
        await loadLoggedOutContent();
        showToast('Logged out successfully', 'success', 'Logged Out');
    }

    async function updateAllUI() {
        const isLoggedIn = currentUser !== null;
        const firstName = currentUser?.['First Name'] || '';
        const lastName = currentUser?.['Last Name'] || '';
        const fullName = `${firstName} ${lastName}`.trim();
        const email = currentUser?.['Email Id'] || '';
        const initial = firstName.charAt(0).toUpperCase() || 'U';
        const imageLink = currentUser?.['Image'] || '';
        const imageUrl = convertDriveLinkToImageUrl(imageLink);
        
        const desktopAuth = document.getElementById('desktopAuthButtons');
        const desktopProfile = document.getElementById('desktopProfileContainer');
        
        if (desktopAuth && desktopProfile) {
            if (isLoggedIn) {
                desktopAuth.style.display = 'none';
                desktopProfile.style.display = 'flex';
                const desktopName = document.getElementById('desktopName');
                const desktopEmail = document.getElementById('desktopEmail');
                const desktopCircle = document.getElementById('desktopProfileCircle');
                if (desktopName) desktopName.innerText = fullName || 'User';
                if (desktopEmail) desktopEmail.innerText = email || '';
                if (desktopCircle) {
                    if (imageUrl) {
                        desktopCircle.innerHTML = `<img src="${imageUrl}" alt="Profile">`;
                    } else {
                        desktopCircle.innerHTML = `<span>${initial}</span>`;
                    }
                }
            } else {
                desktopAuth.style.display = 'flex';
                desktopProfile.style.display = 'none';
            }
        }
        
        const sidebarAuth = document.getElementById('sidebarAuthButtons');
        const sidebarMyAccount = document.getElementById('sidebarMyAccount');
        const sidebarLogout = document.getElementById('sidebarLogout');
        const sidebarUserName = document.getElementById('sidebarUserName');
        const sidebarUserEmail = document.getElementById('sidebarUserEmail');
        const sidebarCircle = document.getElementById('sidebarProfileCircle');
        
        if (isLoggedIn) {
            if (sidebarAuth) sidebarAuth.style.display = 'none';
            if (sidebarUserName) sidebarUserName.innerText = fullName || 'User';
            if (sidebarUserEmail) sidebarUserEmail.innerText = email || '';
            if (sidebarCircle) {
                if (imageUrl) {
                    sidebarCircle.innerHTML = `<img src="${imageUrl}" alt="Profile">`;
                } else {
                    sidebarCircle.innerHTML = `<span>${initial}</span>`;
                }
            }
            if (sidebarMyAccount) sidebarMyAccount.style.display = 'flex';
            if (sidebarLogout) sidebarLogout.style.display = 'flex';
        } else {
            if (sidebarAuth) sidebarAuth.style.display = 'flex';
            if (sidebarUserName) sidebarUserName.innerText = 'Guest User';
            if (sidebarUserEmail) sidebarUserEmail.innerText = 'Please login';
            if (sidebarCircle) sidebarCircle.innerHTML = '<span>U</span>';
            if (sidebarMyAccount) sidebarMyAccount.style.display = 'none';
            if (sidebarLogout) sidebarLogout.style.display = 'none';
        }
    }

    // =====================================================

    // =====================================================

    function setupEventListeners() {
        const logoBtn = document.getElementById('logoHomeBtn');
        if (logoBtn) logoBtn.onclick = () => { window.location.href = 'index.html'; };
        
        const menuToggle = document.getElementById('menuToggleBtn');
        if (menuToggle) menuToggle.onclick = openSidebar;
        
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        if (closeSidebarBtn) closeSidebarBtn.onclick = closeSidebar;
        
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        if (sidebarOverlay) sidebarOverlay.onclick = closeSidebar;
        
        const sidebarDarkToggle = document.getElementById('sidebarDarkToggle');
        if (sidebarDarkToggle) sidebarDarkToggle.onclick = toggleDarkMode;
        
        const darkModeBtn = document.getElementById('darkModeToggleBtn');
        if (darkModeBtn) darkModeBtn.onclick = toggleDarkMode;
        
        const profileContainer = document.getElementById('desktopProfileContainer');
        if (profileContainer) {
            profileContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                profileContainer.classList.toggle('active');
            });
            document.addEventListener('click', () => {
                profileContainer.classList.remove('active');
            });
        }
        
        const desktopMyAccount = document.getElementById('desktopMyAccount');
        if (desktopMyAccount) {
            desktopMyAccount.onclick = () => {
                if (currentUser) {
                    showToast(`Name: ${currentUser['First Name']} ${currentUser['Last Name']}\nEmail: ${currentUser['Email Id']}`, 'info', 'My Account');
                }
            };
        }
        
        const desktopLogout = document.getElementById('desktopLogout');
        if (desktopLogout) desktopLogout.onclick = () => logout();
        
        const sidebarLoginBtn = document.getElementById('sidebarLoginBtn');
        if (sidebarLoginBtn) sidebarLoginBtn.onclick = () => { closeSidebar(); showLoginPopup(); };
        
        const sidebarSignupBtn = document.getElementById('sidebarSignupBtn');
        if (sidebarSignupBtn) sidebarSignupBtn.onclick = () => { closeSidebar(); showSignupPopup(); };
        
        const sidebarMyAccount = document.getElementById('sidebarMyAccount');
        if (sidebarMyAccount) {
            sidebarMyAccount.onclick = () => {
                if (currentUser) {
                    showToast(`Name: ${currentUser['First Name']} ${currentUser['Last Name']}\nEmail: ${currentUser['Email Id']}`, 'info', 'My Account');
                }
                closeSidebar();
            };
        }
        
        const sidebarLogout = document.getElementById('sidebarLogout');
        if (sidebarLogout) sidebarLogout.onclick = () => { logout(); closeSidebar(); };
        
        const openLoginBtn = document.getElementById('openLoginBtn');
        if (openLoginBtn) openLoginBtn.onclick = showLoginPopup;
        
        const openSignupBtn = document.getElementById('openSignupBtn');
        if (openSignupBtn) openSignupBtn.onclick = showSignupPopup;
        
        document.querySelectorAll('.desktop-menu-item, .sidebar-menu-item').forEach(el => {
            if (!el.hasAttribute('data-page')) return;
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const page = el.getAttribute('data-page');
                if (page) navigateToMainPage(page);
                closeSidebar();
            });
        });
        
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
        document.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].clientX;
            if (touchStartX < 30 && touchEndX > touchStartX + 50) openSidebar();
        });
    }

    // =====================================================
    // INITIALIZATION
    // =====================================================

    async function init() {
        console.log('[MyAccount] Initializing...');
        initDarkMode();
        setupEventListeners();
        
        const savedUser = localStorage.getItem('orryxa_current_user');
        if (savedUser) {
            try {
                currentUser = JSON.parse(savedUser);
                cachedUserData = JSON.parse(savedUser);
                await updateAllUI();
                await loadLoggedInContent();
                startAutoSync();
                await recordVisitor();
                showToast(`Welcome back, ${currentUser['First Name'] || 'User'}!`, 'success', 'Welcome');
                console.log('[MyAccount] Initialized with user:', currentUser['Email Id']);
            } catch(e) {
                console.error('Error parsing saved user:', e);
                await loadLoggedOutContent();
            }
        } else {
            await updateAllUI();
            await loadLoggedOutContent();
            console.log('[MyAccount] No user logged in');
        }
    }

    // Make functions global for onclick handlers
    window.showLoginPopup = showLoginPopup;
    window.showSignupPopup = showSignupPopup;
    window.showAboutUs = showAboutUs;
    window.showSettings = showSettings;
    window.openEditProfile = openEditProfile;
    window.navigateTo = navigateTo;
    window.closePopup = closePopup;
    window.toggleDarkModeFromSettings = toggleDarkModeFromSettings;
    window.toggleAutoSync = toggleAutoSync;
    window.toggleNotifications = toggleNotifications;
    
    init();
</script>
</body>
</html>
